trends for grain yield reached up to 138 kg ha−1 yr−1 in ESA, 118 kg ha−1 yr−1 South Asia and 143 kg ha−1 yr−1 in Latin America. Genetic trend was, in part, related to the extent of deployment of new breeding tools in each pipeline, strength of an extensive phenotyping network, and funding stability. Over the past decade, CIMMYT’s breeding pipelines have significantly evolved, incorporating new tools/technologies to increase selection accuracy and intensity, while reducing cycle time. The first pipeline, Eastern Africa Product Profile 1a (EA-PP1a), to implement marker-assisted forward-breeding for resistance to key diseases, coupled with rapid-cycle genomic selection for drought, recorded a genetic trend of 2.46% per year highlighting the potential for deploying new tools/technologies to increase genetic gain.","semantic_score":0.5275,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['tool']","coherence_flag":null,"trl_estimate":null},{"id":32,"title":"Expression of the CCCH-tandem zinc finger protein gene OsTZF5 under a stress-inducible promoter mitigates the effect of drought stress on rice grain yield under field conditions","authors":"Selvaraj, Michael Gomez; Jan, Asad; Ishizaki, Takuma; Valencia Ortiz, Milton Orlando; Dedicova, Beata; Maruyama, Kyonoshin; Ogata, Takuya; Todaka, Daisuke; Yamaguchi-Shinozaki, Kazuko; Nakashima, Kazuo; Ishitani, Manabu","collection":"CGIAR","abstract":"Increasing drought resistance without sacrificing grain yield remains an ongoing challenge in crop improvement. In this study, we report that Oryza sativa CCCH‐tandem zinc finger protein 5 (OsTZF5) can confer drought resistance and increase grain yield in transgenic rice plants. Expression of OsTZF5 was induced by abscisic acid, dehydration and cold stress. Upon stress, OsTZF5‐GFP localized to the cytoplasm and cytoplasmic foci. Transgenic rice plants overexpressing OsTZF5 under the constitutive maize ubiquitin promoter exhibited improved survival under drought but also growth retardation. By introducing OsTZF5 behind the stress‐responsive OsNAC6 promoter in two commercial upland cultivars, Curinga and NERICA4, we obtained transgenic plants that showed no growth retardation. Moreover, these plants exhibited significantly increased grain yield compared to non‐transgenic cultivars in different confined field drought environments. Physiological analysis indicated that OsTZF5 promoted both drought tolerance and drought avoidance. Collectively, our results provide strong evidence that OsTZF5 is a useful biotechnological tool to minimize yield losses in rice grown under drought conditions.","semantic_score":0.5557,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['tool']","coherence_flag":null,"trl_estimate":null},{"id":33,"title":"Maize genetic improvement for enhanced productivity gains in West and Central Africa","authors":"Ajala, S.; Badu-Apraku, Baffour; Menkir, A.","collection":"CGIAR Research Programme on Maize (CIMMYT)","abstract":"During the past 45 years, the genetic improvement programs of IITA and its partners have made spectacular progress in developing high-yielding crop varieties that offered best-bet solutions to major production constraints, such as, cassava mosaic, maize streak, Striga, soybean rust, insect pests, and even drought. These have led to dramatic increases in the production of cassava, maize, soybean, cowpea, and yam in sub-Saharan Africa that have directly contributed to increases in food availability and indirectly to improvements in national economies. This section presents the status, progress, and achievements, and also outlines future work on crop improvement by genetic enhancement in IITA's six crops.","semantic_score":0.5171,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['none']","coherence_flag":null,"trl_estimate":null},{"id":34,"title":"Agronomic traits associated with genetic gains in maize yield during three breeding eras in West Africa","authors":"Badu-Apraku, Baffour; Fakorede, M.A.B.; Oyekunle, M.","collection":"CGIAR Research Programme on Maize (CIMMYT)","abstract":"Studies on genetic gains in grain yield in maize (Zea mays L) is crucial to identify traits of potential value and the necessary modifications in breeding methodologies and strategies for increased progress in future breeding ef-forts. Fifty early-maturing maize cultivars developed during three breeding eras were evaluated for 2 yr in two field experiments involving 16 multiple stress (drought, Striga-infested, and low soil nitrogen) environments and 35 optimum environments to determine the changes in agronomic traits associated with the genetic gains in grain yield over three breeding eras. The average rate of increase in grain yield was 30 kg ha–1 yr-1 corresponding to 1.59% annual genetic gain across multiple stresses. Among the agronomic traits under stress, only ears per plant (0.32% year-1), ear aspect (-0.51% year-1), plant aspect (-0.24% year-1) and days to anthesis (0.11% year-1) changed significantly (P<0.05 or <0.01) during the three eras. The increase in grain yield from the first to the third generation cultivars across stress environments was associated with significant improvements in plant and ear aspects, increased ears per plant and stay green characteristic. Under optimal growing environments, the increase in grain yield from the first to the third generation cultivars was 1.24% per annum and the gain was associated with significant improvements in plant and ear heights, plant and ear aspects, husk cover, and increased ears per plant. The results indicated that substantial progress has been made in breeding for cultivars with combined tolerance/resistance to the three stresses during the past 22 years.","semantic_score":0.5725,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['method']","coherence_flag":null,"trl_estimate":null},{"id":35,"title":"COPO: a metadata platform for brokering FAIR data in the life sciences","authors":"Etuk, A.; Shaw, F.; González Beltran, A.; Johnson, D.; Laporte, Marie-Angélique; Rocca Serra, Philippe; Arnaud, Elizabeth; Devare, Medha; Kersey, Paul J.; Sansone, Susanna-Assunta; Davey, R.P.","collection":"CGIAR Initiative on Digital Innovation (Alliance/CIMMYT)","abstract":"Scientific innovation is increasingly reliant on data and computational resources. Much of today’s life science research involves generating, processing, and reusing heterogeneous datasets that are growing exponentially in size. Demand for technical experts (data scientists and bioinformaticians) to process these data is at an all-time high, but these are not typically trained in good data management practices. That said, we have come a long way in the last decade, with funders, publishers, and researchers themselves making the case for open, interoperable data as a key component of an open science philosophy. In response, recognition of the FAIR Principles (that data should be Findable, Accessible, Interoperable and Reusable) has become commonplace. However, both technical and cultural challenges for the implementation of these principles still exist when storing, managing, analysing and disseminating both legacy and new data. COPO is a computational system that attempts to address some of these challenges by enabling scientists to describe their research objects (raw or processed data, publications, samples, images, etc.) using community-sanctioned metadata sets and vocabularies, and then use public or institutional repositories to share it with the wider scientific community. COPO encourages data generators to adhere to appropriate metadata standards when publishing research objects, using semantic terms to add meaning to them and specify relationships between them. This allows data consumers, be they people or machines, to find, aggregate, and analyse data which would otherwise be private or invisible. Building upon existing standards to push the state of the art in scientific data dissemination whilst minimising the burden of data publication and sharing.","semantic_score":0.299,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['system']","coherence_flag":null,"trl_estimate":null},{"id":36,"title":"Machine learning technique unraveled subspecies-specific ionomic variation with the preferential mineral enrichment in rice","authors":"Tiozon, Rhowell N.; Buenafe, Reuben James; Jain, Vinay; Sen, Partha; Molina, Lilia R.; Anacleto, Roslen; Sreenivasulu, Nese","collection":"CGIAR Excellence in Breeding Platform (CIMMYT)","abstract":"To enrich micronutrients in rice through breeding and to identify biofortified donor lines, screening a large diversity panel of major subspecies of rice accessions for their ionomes is necessary.Inductively coupled plasma optical emission spectroscopy was deployed to profile grain ionomes from 1100 rice accessions. Classification models derived for multidimensional ionomics data using a random forest model, support vector machine, and artificial neural network predicted three distinct groups that differ in ionomic levels with higher prediction accuracy (76.8%–85.1%). While class A showed inferior lines in mineral content, class B and C represent superior lines with enriched multiple minerals. The identified contrasting lines from the modeling classifications were milled and profiled for minerals and toxic elements using inductively coupled plasma mass spectrometry and revealed donors with an elevated mineral content even higher than the Zn‐biofortified rice lines.Overall, the result of this study provided new insights into ionomic variation among subspecies with a preferential enrichment of minerals in temperate japonica and admixed populations coincided with increased grain protein content, while in indica median mineral content is low while selected for increased amylose content.Artificial intelligence models were developed to predict grains enriched with multiple minerals.","semantic_score":0.4111,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['model']","coherence_flag":null,"trl_estimate":null},{"id":37,"title":"From mobile crowdsourcing to crowd-trusted food price in Nigeria: statistical pre-processing and post-sampling","authors":"Arbia, G.; Solano-Hermosilla, G.; Nardelli, V.; Micale, F.; Genovese, G.; Amerise, I.L.; Adewopo, J.","collection":"CGIAR","abstract":"Timely and reliable monitoring of food market prices at high spatial and temporal resolution is essential to understanding market and food security developments and supporting timely policy and decision-making. Mostly, decisions rely on price expectations, which are updated with new information releases. Therefore, increasing the availability and timeliness of price information has become a national and international priority. We present two new datasets in which mobile app-based crowdsourced daily price observations, voluntarily submitted by self-selected participants, are validated in real-time within spatio-temporal markets (pre-processed data). Then, they are reweighted weekly using their geo-location to resemble a formal sample design and allow for more reliable statistical inference (post-sampled data). Using real-time data collected in Nigeria, we assess the accuracy and propose that our reweighted estimates are more accurate with respect to the unweighted version. Results have important implications for governments, food chain actors, researchers and other organisations.","semantic_score":0.3726,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['none']","coherence_flag":null,"trl_estimate":null},{"id":38,"title":"User Manual. Training Manual Terra-i.","authors":"Reymondin, Louis; Paz-García, Paula; Tello Dagua, Jhon Jairo; Coca-Castro, Alejandro; Bautista, Oscar; Menzinger, Bernadette","collection":"Forests, Trees and Agroforestry","abstract":"The user manual describes the installation process of the Terra-i system as well as the necessary tools for its functioning. Input data acquisition procedures used by Terra-i are also described. Finally, it shows the insights, methods and formats involved in each step of the pre-processing stage. \r\n\r\nDescription:  \r\nTerra-i is a tool that detects vegetal land cover changes product of human activities in near real time. It has the capability to produce data every 16 days. Nowadays, Terra-i is fully functional pan-tropically (Latin America, Caribbean, Asia and Oceania). The system is based on the premise that, from one date to the next, natural vegetation follows a predictable pattern of changes in greenness brought by site-specific land and climatic conditions over the same period. A computational neural network is ‘trained’ to understand the normal pattern of changes in vegetation greenness in relation to terrain and rainfall for a site and then marks areas as changed where the greenness suddenly changes well beyond these normal limits. Running on many computers, this analysis is refreshed with new imagery every 16 days and for every 250m square of land.","semantic_score":0.4024,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Training manual or practitioner guide — published knowledge product; not a protectable IP asset","coherence_flag":null,"trl_estimate":null},{"id":39,"title":"CGIAR Research Program on Roots, Tubers and Bananas - Plan of Work and Budget 2021","authors":"CGIAR Research Program on Roots, Tubers and Bananas","collection":"CGIAR Research Programme on Roots, Tubers and Bananas","abstract":"The CGIAR Research Program on Roots, Tubers and Bananas (RTB) is a partnership collaboration led by the International Potato Center implemented jointly with Bioversity International, the International Center for Tropical Agriculture (CIAT), the International Institute of Tropical Agriculture (IITA), and the Centre de Coopération Internationale en Recherche Agronomique pour le Développement (CIRAD), that includes a growing number of research and development partners. RTB brings together research on its mandate crops: bananas and plantains, cassava, potato, sweetpotato, yams, and minor roots and tubers, to improve nutrition and food security and foster greater gender equity especially among some of the world’s poorest and most vulnerable populations.","semantic_score":0.4007,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['none']","coherence_flag":null,"trl_estimate":null},{"id":40,"title":"Archetype for implementing Rapid Cycle Genomic Selection (RCGS) in CGIAR-NARES-SME breeding network pipelines: Examples for pure line crops; RTB crops and hybrid crops","authors":"CGIAR Initiative on Accelerated Breeding; International Maize and Wheat Improvement Center","collection":"CGIAR","abstract":"Accelerated Breeding Initiative’s aim is to develop a continuous stream of climate-resilient, preferred, inclusive, high-yielding, and nutritious varieties, against the present-day global challenges such as climate change and environmental degradation. We are committed to increasing genetic gains in farmer’s fields by developing and availing to seed systems new varieties that perform well under farmer conditions and have clear advantages in essential traits that can be recognized by farmers and end-users in order to incentivise the farmers to adopt the new varieties in lieu of their familiar varieties, and to do so at a pace that matches the increasingly erratic growing conditions. The rapid cycle genomic selection (RCGS) archetype seeks to enable selection and recycling of new parents as fast as possible – preferably two-to-three-year cycles, using data that is accurately representing the target population of environments (TPE) in which the future potential varieties will grow. This will ensure that breeding populations are continuously improved to provide high-value alleles and haplotypes for adaptation to biotic and abiotic stresses, and high-value parents from which superior products are identified and released as new varieties. To achieve this we need to: i) Take advantage of the BRS-procured genotyping services with mid-density marker panels that can estimate genomic relationships and marker effects; ii) Deploy new testing strategies that sample the TPE better, using relatively similar resources, e.g. by use of sparse testing where alleles are replicated across locations in the TPE without physical replications or with partial replications, and using the family structure and genomic relationships to provide connectivity, as well as the additional use of managed stress trials to mimic different environments; iii) Build and leverage on efficient CGIAR-NARES-SME breeding networks to scale up testing sites at Early Testing 1 and develop innovative ways for resource reallocation between Early Testing and later stages of testing; iv) Recycle new parents for population improvement faster using the improved accuracy from better testing strategies. In this document we: • Articulate a value proposition for working as a breeding network to CGIAR-NARESSME partners. • Provide clear steps on how to redesign existing pipelines to optimally implement a rapid cycle genomic selection scheme, with example breeding schemes in pure line crops, roots, tubers and bananas (RTB), and hybrid crops. • We identify the support and services needed by the CGIAR-NARES-SME breeding networks to implement this archetype.","semantic_score":0.6574,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['system']","coherence_flag":null,"trl_estimate":null},{"id":41,"title":"Highre-solution linkage map and chromosome-scale genome assembly for cassava (Manihot esculenta Crantz) from 10 populations","authors":"International Cassava Genetic Map Consortium","collection":"CGIAR Research Programme on Roots, Tubers and Bananas","abstract":"Cassava (Manihot esculenta Crantz) is a major staple crop in Africa, Asia, and South America,\r\nand its starchy roots provide nourishment for 800 million people worldwide. Although native to South\r\nAmerica, cassava was brought to Africa 400–500 years ago and is now widely cultivated across sub-Saharan\r\nAfrica, but it is subject to biotic and abiotic stresses. To assist in the rapid identification of markers for\r\npathogen resistance and crop traits, and to accelerate breeding programs, we generated a framework map\r\nfor M. esculenta Crantz from reduced representation sequencing [genotyping-by-sequencing (GBS)]. The\r\ncomposite 2412-cM map integrates 10 biparental maps (comprising 3480 meioses) and organizes 22,403\r\ngenetic markers on 18 chromosomes, in agreement with the observed karyotype. We used the map to\r\nanchor 71.9% of the draft genome assembly and 90.7% of the predicted protein-coding genes. The\r\nchromosome-anchored genome sequence will be useful for breeding improvement by assisting in the rapid\r\nidentification of markers linked to important traits, and in providing a framework for genomic selectionenhanced\r\nbreeding of this important crop.","semantic_score":0.5392,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['framework']","coherence_flag":null,"trl_estimate":null},{"id":42,"title":"Industry perspective, genetics and genomics of peanut blanchability","authors":"Shah, Priya; Wright, Graeme; Nwosu, Chigozie V.; O’Connor, Daniel; Satsos, Panagiota; Pasupuleti, Janila; Kona, Praveen; Singh, Kuldeep; Bera, Sandip K.; Thudi, Mahendar; Kole, Chittaranjan; Varshney, Rajeev K.; Pandey, Manish K.","collection":"CGIAR","abstract":"Blanching is the process of removing the testa or seed coat (skin) from peanuts, and a genotype's capacity to release its testa is referred to as its blanchability. The genotype, seed quality, harvest date, level of maturity, as well as the length of time and temperature of the post-harvest storage period, all influence peanut's blanchability. This characteristic holds significant value in the production of food items made from peanuts. However, major research on this economically significant trait in breeding programmes has been limited. Blanchability is reported to be a highly heritable and genetically regulated trait, thus breeding and selection should be effective. Blanchability reports to be fixed in the early generations due to its relatively simple genetic control, hence choice of parents which have good blanchability is of utmost importance in a breeding programme. Since blanching percentage possess high genetic control with very low genotype × environment (G×E) interactions, effective selection for improved blanchability can be conducted in early generations. In peanut, blanchability is a great target trait for marker-assisted selection (MAS), but possess few factors that makes it difficult breeding target. These factors, include the high cost operations to measure blanchability and the relatively large seed size in particular, prevent testing in early generations. In this review, we emphasize genetic research on this trait, its relationship to other traits, factors influencing it, methods of measurement, its industrial significance, as well as initiatives and difficulties related to its improvement.","semantic_score":0.365,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['method']","coherence_flag":null,"trl_estimate":null},{"id":43,"title":"Genome-wide association studies of Striga resistance in extra-early maturing quality protein maize inbred lines","authors":"Okunlola, G.; Badu-Apraku, Baffour; Ariyo, O.; Agre, A.P.; Offornedo, Q.N.; Ayo-Vaughan, M.A.","collection":"CGIAR Research Programme on Maize (CIMMYT)","abstract":"Identification of genes associated with Striga resistance is invaluable for accelerating genetic gains in breeding for Striga resistance in maize. We conducted a genome-wide association study to identify genomic regions associated with grain yield and other agronomic traits under artificial Striga field infestation. One hundred and forty-one extra-early quality protein maize inbred lines were phenotyped for key agronomic traits. The inbred lines were also genotyped using 49,185 DArTseq markers from which 8,143 were retained for population structure analysis and genome wide-association study. Cluster analysis and population structure revealed the presence of 3 well-defined genetic groups. Using the mixed linear model, 22 SNP markers were identified to be significantly associated with grain yield, Striga damage at 10 weeks after planting, number of emerged Striga plants at 8 and 10 weeks after planting and ear aspect. The identified SNP markers would be useful for breeders for marker-assisted selection to accelerate the genetic enhancement of maize for Striga resistance in sub-Saharan Africa after validation.","semantic_score":0.5273,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['model']","coherence_flag":null,"trl_estimate":null},{"id":44,"title":"Genotyping by sequencing advancements in barley","authors":"Rajendran, Nirmal Raj; Qureshi, Naeela; Pourkheirandish, Mohammad","collection":"CGIAR","abstract":"Barley is considered an ideal crop to study cereal genetics due to its close relationship with wheat and diploid ancestral genome. It plays a crucial role in reducing risks to global food security posed by climate change. Genetic variations in the traits of interest in crops are vital for their improvement. DNA markers have been widely used to estimate these variations in populations. With the advancements in next-generation sequencing, breeders could access different types of genetic variations within different lines, with single-nucleotide polymorphisms (SNPs) being the most common type. However, genotyping barley with whole genome sequencing (WGS) is challenged by the higher cost and computational demand caused by the large genome size (5.5GB) and a high proportion of repetitive sequences (80%). Genotyping-by-sequencing (GBS) protocols based on restriction enzymes and target enrichment allow a cost-effective SNP discovery by reducing the genome complexity. In general, GBS has opened up new horizons for plant breeding and genetics. Though considered a reliable alternative to WGS, GBS also presents various computational difficulties, but GBS-specific pipelines are designed to overcome these challenges. Moreover, a robust design for GBS can facilitate the imputation to the WGS level of crops with high linkage disequilibrium. The complete exploitation of GBS advancements will pave the way to a better understanding of crop genetics and offer opportunities for the successful improvement of barley and its close relatives.","semantic_score":0.6506,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['protocol']","coherence_flag":null,"trl_estimate":null},{"id":45,"title":"Cassava breeding: past, present and future","authors":"Ceballos, Hernan; Fenstemaker, Sean","collection":"Chinese Academy of Tropical Agriculture Sciences","abstract":"Cassava is a remarkable crop with immense significance. Its role extends from being a key staple ensuring food security in Africa to serving as a competitive source for industrial starch production in Southeast Asia. The broad range of uses for cassava roots and leaves has led to a diverse set of breeding objectives. Varieties of cassava intended for starch and animal feed production require a few clearly defined traits. On the other hand, ethnic products for human consumption involve various root quality characteristics that remain poorly understood. Over the past three decades, investments in cassava breeding have increased significantly. Despite the rapid and successful integration of new technologies into breeding programs, significant knowledge gaps persist. The lack of critical protocols has limited the full potential of these technologies. Research progress in cassava, therefore, has been uneven: while genetic transformation and the development of the first molecular map occurred in the 1990s, the implementation of proper flowering control—a key breeding protocol—was only widely adopted by 2020. Cassava is one of the few major crops whose breeding relies on heterozygous progenitors, which has considerably hindered the impact of marker-assisted and genomic selections. This review outlines past achievements in cassava research, identifies critical research gaps, underscores the need for integrating conventional and advanced technologies, and emphasizes the importance of prioritizing impact-driven investments over technology-driven ones.","semantic_score":0.5421,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['protocol']","coherence_flag":null,"trl_estimate":null},{"id":46,"title":"Genomic prediction of agronomic traits in common bean (Phaseolus vulgaris L.) under environmental stress","authors":"Keller, Beat; Ariza-Suárez, Daniel; Hoz, Juan Fernando de la; Aparicio, Johan Steven; Portilla, Benavides Ana Elisabeth; Buendia, Hector Fabio; Mayor, Victor Manuel; Studer, Bruno; Raatz, Bodo","collection":"Grain Legumes and Dryland Cereals","abstract":"In plant and animal breeding, genomic prediction models are established to select new lines based on genomic data, without the need for laborious phenotyping. Prediction models can be trained on recent or historic phenotypic data and increasingly available genotypic data. This enables the adoption of genomic selection also in under-used legume crops such as common bean. Beans are an important staple food in the tropics and mainly grown by smallholders under limiting environmental conditions such as drought or low soil fertility. Therefore, genotype-by-environment interactions (G × E) are an important consideration when developing new bean varieties. However, G × E are often not considered in genomic prediction models nor are these models implemented in current bean breeding programs. Here we show the prediction abilities of four agronomic traits in common bean under various environmental stresses based on twelve field trials. The dataset includes 481 elite breeding lines characterized by 5,820 SNP markers. Prediction abilities over all twelve trials ranged between 0.6 and 0.8 for yield and days to maturity, respectively, predicting new lines into new seasons. In all four evaluated traits, the prediction abilities reached about 50–80% of the maximum accuracies given by phenotypic correlations and heritability. Predictions under drought and low phosphorus stress were up to 10 and 20% improved when G × E were included in the model, respectively. Our results demonstrate the potential of genomic selection to increase the genetic gain in common bean breeding. Prediction abilities improved when more phenotypic data was available and G × E could be accounted for. Furthermore, the developed models allowed us to predict genotypic performance under different environmental stresses. This will be a key factor in the development of common bean varieties adapted to future challenging conditions.","semantic_score":0.6117,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['model']","coherence_flag":null,"trl_estimate":null},{"id":47,"title":"Dissecting the genomic regions, candidate genes and pathways using multi-locus genome-wide association study for stem rot disease resistance in groundnut","authors":"Veerendrakumar, H.V.; Sudini, Hari Kishan; Kiranmayee, Bangaru; Devika, Talwar; Gangurde, Sunil S.; Vasanthi, R.P.; Nirmal Kumar, A.R; Bera, Sandip K.; Baozhu Guo; Liao, Boshou; Varshney, Rajeev K.; Pandey, Manish","collection":"CGIAR","abstract":"Stem rot, caused by Sclerotium rolfsii Sacc., is a devastating soil-borne disease causing up to 80% yield losses in groundnut globally. To dissect the genetic basis of resistance, we evaluated a diverse minicore germplasm panel over 3 years in stem rot sick-field conditions. Multi-locus genome-wide association study with the 58K single nucleotide polymorphisms (SNPs) Axiom_Arachis array genotyping identified 13 significant genomic regions associated with resistance across eight chromosomes with logarithm of the odds (LOD) scores ranging from 4.5 to 12.4 and R2 values between 6.9% and 58%. Within these regions, 145 candidate genes were implicated, including wall-associated receptor kinases, lucine-rich repeat and NB-ARC domain proteins, and peroxidase superfamily proteins. These genes orchestrate resistance through pathogen perception (e.g., receptor-like kinases), direct inhibition (R genes), toxin detoxification, and activation of transcription factors driving protective compound synthesis for cell recovery. If these defenses are compromised, a hypersensitive response-mediated apoptosis is triggered. Notably, resistance was exclusive to Virginia-type groundnut. The identified candidate genes showed strong correlation with RNA-seq data from stem rot-infected plants, reinforcing their role in the transcriptional defense response. Three kompetitive allele-specific PCR markers, namely, SnpAH00614 (on auxin-related gene AhSR001), SnpAH00625 (on histidine triad protein gene AhSR002), and SnpAH00626 (on E3 ubiquitin ligase gene AhSR003), were validated, confirming their significant contribution to stem rot resistance. These markers may facilitate the development of stem rot-resistant varieties through direct application in breeding programs through marker-assisted selection.","semantic_score":0.3793,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['application']","coherence_flag":null,"trl_estimate":null},{"id":48,"title":"Genome wide association studies in yam reveal the challenge of high heterozygosity","authors":"Agre, A.P.; Darkwa, K.; Kohtaro, I.; Matsumoto, R.; Asfaw, A.","collection":"CGIAR Research Programme on Roots, Tubers and Bananas","abstract":"Yam (Dioscorea spp.) is a herbaceous vine crop valued for its starchy tubers, which are rich in essential nutrients. Its genome is highly heterozygous, contributing to considerable genetic diversity and adaptability. Understanding the polymorphism information content (PIC) of genetic markers is critical for enhancing key agronomic traits such as yield. In this study, we conducted a genome-wide association analysis that accounts for heterozygosity to investigate fresh tuber yield variation in white Guinea yam (Dioscorea rotundata Poir). A total of 173 genotypes including 86 elite breeding clones, 77 genebank accessions, and 10 farmer varieteies were genotyped through whole-genome resequencing, yielding approximately 1.6 million single nucleotide polymorphism (SNP) markers. Association analysis was performed using a multi-locus mixed linear model (MLM), incorporating kinship matrices derived from marker subsets grouped by PIC levels (≤ 0.1, 0.1–0.2, 0.2–0.4, and > 0.4), alongside population structure. The analysis revealed that high-PIC markers had greater influence on trait associations. Twelve stable SNPs were significantly associated with fresh tuber yield. Functional annotation of these markers revealed putative genes related to plant growth and cellular regulation. Notably, markers located in heterozygosity-rich genomic regions were linked to high-yielding genotypes, while those in homozygous regions were associated with lower yields. These findings underscore the potential of PIC-based marker selection and highlight the value of integrating heterozygosity metrics into genomic-assisted breeding strategies for improving fresh tuber yield in white Guinea yam.","semantic_score":0.5668,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['model']","coherence_flag":null,"trl_estimate":null},{"id":49,"title":"CGIAR Report to the Eleventh Session of the Intergovernmental Technical Working Group on Plant Genetic Resources for Food and Agriculture","authors":"CGIAR","collection":"CGIAR","abstract":"This report was prepared by CGIAR in response to an invitation from the Secretariat of the FAO Commission on Genetic Resources for Food and Agriculture. It is structured to correspond, in general, to agenda items 3-7 of the Eleventh Session of the Intergovernmental Technical Working Group on Plant Genetic Resources (ITWG-PGRFA). Some sections of this report were previously included in the CGIAR submission to the Ninth Session of the Governing Body of the International Treaty on Plant Genetic Resources for Food and Agriculture (Plant Treaty), in September 2022; where possible, we have updated statistics (for example, genebank holdings) in those sections.","semantic_score":0.5183,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['none']","coherence_flag":null,"trl_estimate":null},{"id":50,"title":"Genetic and phenotypic characterization of rice grain quality traits to define research strategies for improving rice milling, appearance, and cooking qualities in Latin America and the Caribbean","authors":"Cruz, Maribel; Arbeláez Vélez, Juan D.; Loaiza, Katherine; Cuásquer, Juan B.; Rosas, Juan; Graterol Matute, Eduardo Jose","collection":"CGIAR Research Programme on Rice (IRRI)","abstract":"Rice (Oryza sativa L.) grain quality is a set of complex interrelated traits that include grain milling, appearance, cooking, and edible properties. As consumer preferences in Latin America and the Caribbean evolve, determining what traits best capture regional grain quality preferences is fundamental for breeding and cultivar release. In this study, a genome-wide association study (GWAS), marker-assisted selection (MAS), and genomic selection (GS) were evaluated to help guide the development of new breeding strategies for rice grain quality improvement. For this purpose, 284 rice lines representing over 20 yr of breeding in Latin America and the Caribbean were genotyped and phenotyped for 10 different traits including grain milling, appearance, cooking, and edible quality traits. Genetic correlations among the 10 traits ranged from −0.83 to 0.85. A GWAS identified 19 significant marker/trait combinations associated with eight grain quality traits. Four functional markers, three located in the Waxy and one in the starch synthase IIa genes, were significantly associated with six grain-quality traits. These markers individually explained 51–75% of the phenotypic variance depending on the trait, clearly indicating their potential utility for MAS. Cross-validation studies to evaluate predictive abilities of four different GS models for each of the 10 quality traits were conducted and predictive abilities ranged from 0.3 to 0.72. Overall, the machine learning model random forest had the highest predictive abilities and was especially effective for traits where large effect quantitative trait loci were identified. This study provides the foundation for deploying effective molecular breeding strategies for grain quality in Latin American rice breeding programs.","semantic_score":0.5506,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['model']","coherence_flag":null,"trl_estimate":null},{"id":51,"title":"Genetic diversity and population structure of African sorghum (Sorghum bicolor L. moench) accessions assessed through single nucleotide polymorphisms markers","authors":"Ahmad Yahaya, Muhammad; Shimelis, Hussein; Nebie. Baloua; Ojiewo, Christopher Ochieng; Rathore, Abhishek; Das, Roma Rani","collection":"CGIAR","abstract":"Assessing the genetic diversity and population structure of cultivated sorghum is important for heterotic grouping, breeding population development, marker-assisted cultivar development, and release. The objectives of the present study were to assess the genetic diversity and deduce the population structure of 200 sorghum accessions using diversity arrays technology (DArT)-derived single nucleotide polymorphism (SNP) markers. The expected heterozygosity values ranged from 0.10 to 0.50 with an average of 0.32, while the average observed heterozygosity (0.15) was relatively low, which is a typical value for autogamous crops species like sorghum. Moderate polymorphic information content (PIC) values were identified with a mean of 0.26, which indicates the informativeness of the chosen SNP markers. The population structure and cluster analyses revealed four main clusters with a high level of genetic diversity among the accessions studied. The variation within populations (41.5%) was significantly higher than that among populations (30.8%) and between samples within the structure (27.7%). The study identified distantly related sorghum accessions such as SAMSORG 48, KAURA RED GLUME; Gadam, AS 152; CSRO1, ICNSL2014-062; and YALAI, KAFI MORI. The accessions exhibited wide genetic diversity that will be useful in developing new gene pools and novel genotypes for West Africa sorghum breeding programs.","semantic_score":0.4531,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['none']","coherence_flag":null,"trl_estimate":null},{"id":52,"title":"Identification of high blanchability donors, candidate genes and markers in groundnut","authors":"Shah, Priya; Gangurde, Sunil S.; Ramachandran, Senthil; Singam, Prashant; Ovais Hamid Peerzada; Janila, Pasupuleti; Singh, Kuldeep; Mayes, Sean; Pandey, Manish K.","collection":"CGIAR","abstract":"Blanchability is the ability of seeds to shed their seed coat (testa) and is a trait of economic importance in the food processing industry, yet remains underexplored in breeding programs. In this study, blanchability was evaluated in 184 groundnut accessions from the ICRISAT minicore collection to identify associated genomic regions, candidate genes, and molecular markers. Significant variability was observed over two seasons, with values ranging from 3.98 to 70.08%. Ten genotypes, including ICG10890, ICG9507, ICG13982, and ICG297, showed high blanchability, with ICG297 emerging as a promising donor based on cluster analysis of blanchability and agronomic traits. Genome-wide associations study (GWAS) using the 58 K ‘Axiom_Arachis’ SNP array revealed 58 significant SNP-trait associations, highlighting important genes such as isocitrate dehydrogenase and ubiquitin ligase, which influence seed coat structure and cell wall integrity thereby affecting blanchability. Further, nine SNPs were selected via allele mining, among these four SNPs, on chromosomes A01 (snpAH00551, AhBL01), A06 (snpAH00554, AhBL02), B04 (snpAH00558, AhBL03), and B07 (snpAH00559, AhBL04), effectively distinguishing between high and low blanchability genotypes. These validated SNPs present valuable tools for genomics-assisted breeding. Overall, the finding contributes towards better understanding of the genetic basis of blanchability in groundnut, providing key genomic resources for improving processing-related traits.","semantic_score":0.4683,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['tool']","coherence_flag":null,"trl_estimate":null},{"id":53,"title":"Genome-wide association study of Striga resistance in early maturing white tropical maize inbred lines","authors":"Adewale, Samuel A.; Badu-Apraku, Baffour; Akinwale, R.O.; Agre, A.P.; Gedil, Melaku A; Garcia-Oliveira, A.L.","collection":"CGIAR Research Programme on Maize (CIMMYT)","abstract":"Background: Striga hermonthica (Benth.) parasitism militates against increased maize production and productivity in savannas of sub-Saharan Africa (SSA). Identification of Striga resistance genes is important in developing genotypes with durable resistance. So far, there is only one report on the existence of QTL for Striga resistance on chromosome 6 of maize. The objective of this study was to identify genomic regions significantly associated with grain yield and other agronomic traits under artificial Striga field infestation. A panel of 132 early-maturing maize inbreds were phenotyped for key agronomic traits under Striga-infested and Striga-free conditions. The inbred lines were also genotyped using 47,440 DArTseq markers from which 7224 markers were retained for population structure analysis and genome-wide association study (GWAS).\n\nResults: The inbred lines were grouped into two major clusters based on structure analysis as well as the neighborjoining\nhierarchical clustering. A total of 24 SNPs significantly associated with grain yield, Striga damage at 8 and 10 weeks after planting (WAP), ears per plant and ear aspect under Striga infestation were detected. Under Striga-free conditions, 11 SNPs significantly associated with grain yield, number of ears per plant and ear aspect were identified. Three markers physically located close to the putative genes GRMZM2G164743 (bin 10.05), GRMZM2G060216 (bin 3.06) and GRMZM2G103085 (bin 5.07) were detected, linked to grain yield, Striga damage at 8 and 10 WAP and number of ears per plant under Striga infestation, explaining 9 to 42% of the phenotypic variance. Furthermore, the S9_154,978,426 locus on chromosome 9 was found at 2.61 Mb close to the ZmCCD1\ngene known to be associated with the reduction of strigolactone production in the maize roots. Conclusions: Presented in this study is the first report of the identification of significant loci on chromosomes 9 and 10 of maize that are closely linked to ZmCCD1 and amt5 genes, respectively and may be related to plant defense mechanisms against Striga parasitism. After validation, the identified loci could be targets for breeders for marker-assisted selection (MAS) to accelerate genetic enhancement of maize for Striga resistance in the tropics, particularly in SSA, where the parasitic weed is endemic.","semantic_score":0.4369,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['none']","coherence_flag":null,"trl_estimate":null},{"id":54,"title":"Genome-wide association analysis reveals genetic architecture and candidate genes associated with grain yield and other traits under low soil nitrogen in early-maturing white quality protein maize inbred lines","authors":"Bhadmus, O.O.; Badu-Apraku, Baffour; Adeyemo, O.; Agre, A.P.; Queen, O.N.; Ogunkanmi, L.A.","collection":"CGIAR Research Programme on Maize (CIMMYT)","abstract":"Maize production in the savannas of sub-Saharan Africa (SSA) is constrained by the low nitrogen in the soils. The identification of quantitative trait loci (QTL) conferring tolerance to low soil nitrogen (low-N) is crucial for the successful breeding of high-yielding QPM maize genotypes under low-N conditions. The objective of this study was to identify QTLs significantly associated with grain yield and other low-N tolerance-related traits under low-N. The phenotypic data of 140 early-maturing white quality protein maize (QPM) inbred lines were evaluated under low-N. The inbred lines were genotyped using 49,185 DArTseq markers, from which 7599 markers were filtered for population structure analysis and genome-wide association study (GWAS). The inbred lines were grouped into two major clusters based on the population structure analysis. The GWAS identified 24, 3, 10, and 3 significant SNPs respectively associated with grain yield, stay-green characteristic, and plant and ear aspects, under low-N. Sixteen SNP markers were physically located in proximity to 32 putative genes associated with grain yield, stay-green characteristic, and plant and ear aspects. The putative genes GRMZM2G127139, GRMZM5G848945, GRMZM2G031331, GRMZM2G003493, GRMZM2G067964, GRMZM2G180254, on chromosomes 1, 2, 8, and 10 were involved in cellular nitrogen assimilation and biosynthesis, normal plant growth and development, nitrogen assimilation, and disease resistance. Following the validation of the markers, the putative candidate genes and SNPs could be used as genomic markers for marker-assisted selection, to facilitate genetic gains for low-N tolerance in maize production.","semantic_score":0.4961,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['none']","coherence_flag":null,"trl_estimate":null},{"id":55,"title":"Genomics, genetics and breeding of common bean in Africa: A review of tropical legume project","authors":"Mukankusi, Clare Mugisha; Raatz, Bodo; Nkalubo, Stanley T.; Berhanu, Fenta; Binagwa, Papias; Kilango, Michael; Williams, Magdalena; Katungi, Enid M.; Chirwa, Rowland; Beebe, Stephen E.","collection":"CGIAR","abstract":"Common bean (Phaseolus vulgaris L.) is an important legume crop worldwide. The International Centre for Tropical Agriculture (CIAT) and its national partners in Africa aim to overcome production constraints of common bean and address the food, nutrition needs and market demands through development of multitrait bean varieties. Breeding is guided by principles of market‐driven approaches to develop client‐demanded varieties. Germplasm accessions from especially two sister species, P. coccineus and P. acutifolius, have been utilized as sources of resistance to major production constraints and interspecific lines deployed. Elucidation of plant mechanisms governing pest and disease resistance, abiotic stress tolerance and grain nutritional quality guides the selection methods used by the breeders. Molecular markers are used to select for resistance to key diseases and insect pests. Efforts have been made to utilize modern genomic tools to increase scale, efficiency, accuracy and speed of breeding. Through gender‐responsive participatory variety selection, market‐demanded varieties have been released in several African countries. These new bean varieties are a key component of sustainable food systems in the tropics.","semantic_score":0.4646,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Review/survey title — 'review of' detected","coherence_flag":null,"trl_estimate":null},{"id":56,"title":"Digital imaging outperforms traditional scoring methods for spittlebug tolerance in Urochloa humidicola hybrids","authors":"Hernández, Luis Miguel; Espitia, Paula A.; Cardoso Arango, Juan Andrés","collection":"International Center for Tropical Agriculture","abstract":"American spittlebug species (Hemiptera: Cercopidae) are major pests in Urochloa humidicola (syn. Brachiaria humidicola) cultivars in the neotropics. The U. humidicola breeding program of the Alliance Bioversity-CIAT aims to increase tolerance to spittlebugs. To develop tolerant U. humidicola genotypes, adequate screening methods are needed. Currently, visual scores of plant damage by spittlebugs is the standard method to screen for variation in plant tolerance. However, visual scoring is prone to human bias, is of medium throughput and relies on the expertise of well-trained personnel. In this study, estimations of plant damage from SPAD chlorophyll meter measurements and digital images with visual scoring from an inexpert evaluator and visual scoring from an expert were compared. This information should inform if different methods could be implemented in the U. humidicola breeding program. Time needed to evaluate damage was recorded for each method. Lin’s correlation coefficient, Pearson’s correlation coefficient and broad sense heritability values were calculated. Damage estimated from digital images showed the highest throughput (twice as fast as visual scoring from an expert), high correlations with visual scoring (r>0.80, P<0.0001) and heritability values for plant damage as good or better (>0.7) than those obtained by visual scoring from an expert. Results indicate that digital imaging could improve the efficiency of phenotyping in breeding for increased tolerance to spittlebugs in U. humidicola.","semantic_score":0.4357,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['method']","coherence_flag":null,"trl_estimate":null},{"id":57,"title":"Use of low cost near‑infrared spectroscopy, to predict pasting properties of high quality cassava flour","authors":"Abubakar, M.; Wasswa, P.; Masumba, E.; Ongom, P.; Mkamilo, G.; Kanju, E.; Abincha, W.; Edema, R.; Sichalwe, K.; Tukamuhabwa, P.; Kayondo, S.; Rabbi, I.; Kulembeka, H.","collection":"CGIAR Research Programme on Roots, Tubers and Bananas","abstract":"Determination of pasting properties of high quality cassava flour using rapid visco analyzer is expensive and time consuming. The use of mobile near infrared spectroscopy (SCiO™) is an alternative high throughput phenotyping technology for predicting pasting properties of high quality cassava flour traits. However, model development and validation are necessary to verify that reasonable expectations are established for the accuracy of a prediction model. In the context of an ongoing breeding effort, we investigated the use of an inexpensive, portable spectrometer that only records a portion (740–1070 nm) of the whole NIR spectrum to predict cassava pasting properties. Three machine-learning models, namely glmnet, lm, and gbm, implemented in the Caret package in R statistical program, were solely evaluated. Based on calibration statistics (R2, RMSE and MAE), we found that model calibrations using glmnet provided the best model for breakdown viscosity, peak viscosity and pasting temperature. The glmnet model using the first derivative, peak viscosity had calibration and validation accuracy of R2 = 0.56 and R2 = 0.51 respectively while breakdown had calibration and validation accuracy of R2 = 0.66 and R2 = 0.66 respectively. We also found out that stacking of pre-treatments with Moving Average, Savitzky Golay, First Derivative, Second derivative and Standard Normal variate using glmnet model resulted in calibration and validation accuracy of R2 = 0.65 and R2 = 0.64 respectively for pasting temperature. The developed calibration model predicted the pasting properties of HQCF with sufficient accuracy for screening purposes. Therefore, SCiO™ can be reliably deployed in screening early-generation breeding materials for pasting properties.","semantic_score":0.4612,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['model']","coherence_flag":null,"trl_estimate":null},{"id":58,"title":"A European perspective on opportunities and demands for field-based crop phenotyping","authors":"Morisse, Merlijn; Wells, Darren M.; Millet, Emilie J.; Lillemo, Morten; Fahrner, Sven; Cellini, Francesco; Lootens, Peter; Müller, Onno; Herrera, Juan M.; Bentley, Alison R.; Janni, Michela","collection":"CGIAR","abstract":"The challenges of securing future food security will require deployment of innovative technologies to accelerate crop production. Plant phenotyping methods have advanced significantly, spanning low-cost hand-held devices to large-scale satellite imaging. Field-based phenotyping aims to capture plant response to the environment, generating data that can be used to inform breeding and selection requirements. This in turn requires access to multiple representative locations and capacities for collecting useful information. In this paper we identify the current challenges in access to field phenotyping in multiple locations in Europe based on stakeholder feedback. We present a map of current infrastructure and propose opportunities for greater integration of existing facilities for meeting different user requirements. We also review the currently available technology and data requirements for effective multi-location field phenotyping and provide recommendations for ensuring future access and co-ordination. Taken together we provide an overview of the current status of European field phenotyping capabilities and provides a roadmap for their future use to support crop improvement. This provides a wider framework for the analysis and planning of field phenotyping activities for crop improvement worldwide.","semantic_score":0.6136,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Review/survey title — 'perspective on' detected","coherence_flag":null,"trl_estimate":null},{"id":59,"title":"Adaptive responses of biofortified common bean lines to acidic soil and high temperatures in the Colombian Amazon region","authors":"Suárez, Juan Carlos; Contreras, Amara T.; Urban, Milan O.; Grajales, Miguel A.; Beebe, Stephen Edgar; Rao, Idupulapati M.","collection":"CGIAR","abstract":"One of the strategies to combat micronutrient malnutrition is by developing biofortified common bean lines (Phaseolus vulgaris L.) capable of tolerating different stress conditions. In this study, the adaptive responses of different biofortified bean lines grown under combined stress of acidic soil and high-temperatures were evaluated in the Colombian Amazon. A total of 247 common bean lines from the Mesoamerican gene pool were used to determine the adaptive response in terms of phenological, physiological, and agronomic behavior under combined stress conditions. The lines tested were obtained from different single crosses, double crosses, and backcrosses between different bean materials, of which 146 were obtained from F4 families with high iron (Fe) content in seed and 99 common bean lines from F5 families. Different bean lines had grain yields (GY) higher than 1400 kg ha−1 from the F5 (lines: 859, 805, 865, and 657) and F4 (lines: 2853 and 2796) families. The superior performance of these lines was related to a higher photosynthate partitioning that has allowed an increase in pod formation (pod partitioning index, PPI) from the canopy biomass (CB) and grain filling (pod harvest index, PHI; harvest index, HI), resulting in higher values of GY. Values of GY were correlated with CB (r = 0.36), PPI (r = 0.6), PHI (r = 0.68), and HI (r = 0.8, p < 0.001). This increase in agronomic performance is due to a greater allocation of energy to the photosynthetic machinery (ΦII) and its dissipation in the form of heat (ΦNPQ), with increases in the leaf temperature difference (LTD). Based on the results obtained, six biofortified lines of common bean (lines F5: 859, 805, 865, and 657; lines F4: 2853 and 2796) showed traits of tolerance to combined stress and can serve as progenitors to increase Fe and Zn concentration in the seeds of lines that tolerate the combined stress from acidic soil and high temperature in the Colombian Amazon region.","semantic_score":0.4558,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['none']","coherence_flag":null,"trl_estimate":null},{"id":60,"title":"Biofortification in underutilized staple crops for nutrition in Asia and Africa","authors":"Pfeiffer, Wolfgang H.; Andersson, Meike S.; Govindaraj, Mahalingam; Parminder, Virk; Cherian, Binu; Illona, Paul; Magezi, Sylvia Ruhweza; Mulambu, Joseph","collection":"IFPRI — Agriculture for Nutrition & Health","abstract":"Malnutrition is one of the biggest public health challenges of the century with about 2 billion people affected by it globally. Biofortification is the process of breeding micronutrients traits into staple food crops, which is bioavailable to make a positive measurable impact to the population that eats such staples on a daily basis. It is a cost-effective, sustainable strategy and complementary in nature to the existing market interventions. Iron pearl millet, iron beans, vitamin A cassava and orange sweet potato can contribute to increase household nutrition in the Asia and Africa. Over the years evidences gathered by partners in crop breeding, nutrition studies and delivery experiences will help to build the foundation for scaling out further to reach millions who need the most.","semantic_score":0.6492,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['none']","coherence_flag":null,"trl_estimate":null},{"id":61,"title":"Performance of testers with contrasting provitamin A content to evaluate provitamin A maize for resistance to Aspergillus flavus infection and aflatoxin production","authors":"Mboup, M.; Aduramigba-Modupe, A.O.; Sayadi Maazou, A.R.; Olasanmi, B.; Mengesha Abera, W.; Meseka, S.K.; Dieng, I.; Bandyopadhyay, R.; Menkir, A.; Ortega-Beltran, A.","collection":"IFPRI — Agriculture for Nutrition & Health","abstract":"In sub-Saharan Africa (SSA), millions of people depend on maize as a primary staple. However, maize consumers in SSA may be exposed to malnutrition due to vitamin A deficiency (VAD) and unsafe aflatoxin levels, which can lead to serious economic and public health problems. Provitamin A (PVA) biofortified maize has been developed to alleviate VAD and may have additional benefits such as reduced aflatoxin contamination. In this study, maize inbred testers with contrasting PVA content in grain were used to identify inbred lines with desirable combining ability for breeding to enhance their level of resistance to aflatoxin. Kernels of 120 PVA hybrids generated by crossing 60 PVA inbreds with varying levels of PVA (5.4 to 51.7 µg/g) and two testers (low and high PVA, 14.4 and 25.0 µg/g, respectively) were inoculated with a highly toxigenic strain of Aspergillus flavus. Aflatoxin had a negative genetic correlation with β-carotene (r = −0.29, p < 0.0001) and PVA (r = −0.23, p < 0.0001), indicating that hybrids with high PVA content accumulated less aflatoxin than those with low to medium PVA. Both general combining ability (GCA) and specific combining ability (SCA) effects of lines and testers were significant for aflatoxin accumulation, number of spores, PVA, and other carotenoids, with additive gene actions playing a prominent role in regulating the mode of inheritance (GCA/SCA ratio >0.5). Eight inbreds had combined significant negative GCA effects for aflatoxin accumulation and spore count with significant positive GCA effects for PVA. Five testcrosses had combined significant negative SCA effects for aflatoxin with significant positive SCA effects for PVA. The high PVA tester had significant negative GCA effects for aflatoxin, lutein, β-carotene, and PVA. The study identified lines that can be used as parents to develop superior hybrids with high PVA and reduced aflatoxin accumulation. Overall, the results point out the importance of testers in maize breeding programs to develop materials that can contribute to controlling aflatoxin contamination and reducing VAD.","semantic_score":0.4901,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['none']","coherence_flag":null,"trl_estimate":null},{"id":62,"title":"Zinc and provitamin A biofortified maize genotypes exhibited potent to reduce hidden-hunger in Nepal","authors":"Dhakal, Krishna; Magar, Amar Bahadur Pun; Pokhrel, Keshab Raj; Baral, Bandhu Raj; Issa, Abdurahman Beshir; Shrestha, Hari Kumar; Vista, Shree Prasad","collection":"CGIAR","abstract":"Zinc deficiency affects one third of the population worldwide, and vitamin A deficiency is a prevalent public health issue in Sub-Saharan Africa and South-Asia, including Nepal. Crop biofortification is the sustainable solution to these health—related problems, thus we conducted two different field trials in an alpha lattice design to identify zinc and provitamin A biofortified maize genotypes consistent and competitive in performance over the contrasting seasons (Season 1: 18 February to 6 July 2020 and Season 2: 31 August to 1 February, 2020/21). In our study, the performance of introduced maize genotypes (zinc—15 and provitamin A biofortified—24) were compared with that of the local check, focusing on the overall agro-morphology, yield attributes, yield, and kernel zinc and total carotenoid content. Zinc and total carotenoid in the tested genotypes were found in the range between 14.2 and 24.8 mg kg−1 and between 1.8 and 3.6 mg 100 g−1. Genotypes A1831-8 from zinc and EEPVAH-46 from provitamin A biofortified maize trial recorded kernel zinc and total carotenoid as high as 52.3, and 79.5%, respectively, compared to the local check (DMH849). The provitamin A genotypes EEPVAH-46 and EEPVAH-51 (total carotenoid: 3.6 and 3.3 mg 100 g−1), and zinc biofortified genotypes A1847-10 and A1803-42 (20.4 and 22.4 mg kg−1 zinc) were identified as superior genotypes based on their yield consistency over the environments and higher provitamin A and zinc content compared to the check. In addition, farmers can explore August sowing to harvest green cobs during December-January to boost up the emerging green cob business.","semantic_score":0.5145,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['none']","coherence_flag":null,"trl_estimate":null},{"id":63,"title":"Enhancing health benefits of milled rice: current status and future perspectives","authors":"Kasote, Deepak; Sreenivasulu, Nese; Acuin, Cecilia; Regina, Ahmed","collection":"CGIAR Excellence in Breeding Platform (CIMMYT)","abstract":"Milled rice is an essential part of the regular diet for approximately half of the world’s population. Its remarkable commercial value and consumer acceptance are mostly due to its promising cooking qualities, appealing sensory properties, and longer shelf life. However, the significant loss of the nutrient-rich bran layer during milling makes it less nutritious than the whole grain. Thus, enhancing the nutritive value of milled rice is vital in improving the health and wellbeing of rice consumers, particularly for those residing in the low-economic zones where rice is the primary source of calories and nutrition. This article provides a critical review on multiple frontiers of recent interventions, such as (1) infusing the genetic diversity to enrich amylose and resistant starch to reduce glycaemic index, (2) enhancing the minerals and vitamins through complementary fortification and biofortification as short and long-term interventions, and (3) developing transgenic solutions to improve the nutrient levels of milled rice. Additionally, the review highlights the benefits of functional ingredients of milled rice to human health and the potential of enhancing them in rice to address the triple burden of malnutrition. The potential merit of milled rice concerning food safety is also reviewed in this article.","semantic_score":0.4303,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['sensor']","coherence_flag":null,"trl_estimate":null},{"id":64,"title":"Development of NIRS calibration curves for sugars in baked sweetpotato","authors":"Amankwaah, Victor A.; Williamson, Sharon; Reynolds, Rong; Ibrahem, Ragy; Pecota, Kenneth V.; Zhang, Xiaofei; Olukolu, Bode A.; Truong, Van‐Den; Carey, Edward; Zum Felde, Thomas; Ssali, R.T.; Yencho, George Craig","collection":"CGIAR","abstract":"Variability in sugar content between raw and cooked sweetpotato storage roots impact nutritional and dietary importance with implications for consumer preference. High-throughput phenotyping is required to breed varieties that satisfy consumer preferences.Near-infrared reflectance spectroscopy (NIRS) calibration curves were developed for analyzing sugars in baked storage roots using 147 genotypes from a population segregating for sugar content and other traits. The NIRS prediction curves had high coefficients of determination in calibration (R2c ) of 0.96 (glucose), 0.93 (fructose), 0.96 (sucrose), and 0.96 (maltose). The corresponding coefficients of determination for cross validation (R2cv ) were 0.92 (glucose), 0.89 (fructose), 0.96 (sucrose) and 0.93 (maltose) and were similar to the R2c for all sugars measured. The ratios of the standard deviation of the reference set to the standard error of cross validation were greater than three for all sugars. These results confirm the applicability of the NIRS curves in efficiently determining sugar content in baked sweetpotatoes storage roots. External validation was performed on an additional 70 genotypes. Coefficients of determination (r2 ) were 0.88 (glucose), 0.88 (fructose), 0.86 (sucrose) and 0.49 (maltose). The results were comparable to those found for the calibration and cross validation in fructose, glucose, and sucrose, but were moderate for maltose due to the low variability of maltose content in the population.NIRS can be used for screening sugar content in baked sweetpotato storage roots in breeding programs and can be used to assist with the development of improved sweetpotato varieties that better meet consumer preferences. This article is protected by copyright. All rights reserved.","semantic_score":0.4604,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['none']","coherence_flag":null,"trl_estimate":null},{"id":65,"title":"Artificial intelligence in plant breeding","authors":"Farooq, Muhammad Amjad; Shang Gao; Hassan, Muhammad Adeel; Zhangping Huang; Awais Rasheed; Hearne, Sarah; Prasanna, Boddupalli M.; Xinhai Li; Huihui Li","collection":"CGIAR","abstract":"Harnessing cutting-edge technologies to enhance crop productivity is a pivotal goal in modern plant breeding. Artificial intelligence (AI) is renowned for its prowess in big data analysis and pattern recognition, and is revolutionizing numerous scientific domains including plant breeding. We explore the wider potential of AI tools in various facets of breeding, including data collection, unlocking genetic diversity within genebanks, and bridging the genotype–phenotype gap to facilitate crop breeding. This will enable the development of crop cultivars tailored to the projected future environments. Moreover, AI tools also hold promise for refining crop traits by improving the precision of gene-editing systems and predicting the potential effects of gene variants on plant phenotypes. Leveraging AI-enabled precision breeding can augment the efficiency of breeding programs and holds promise for optimizing cropping systems at the grassroots level. This entails identifying optimal inter-cropping and crop-rotation models to enhance agricultural sustainability and productivity in the field.","year":"2024","semantic_score":0.6844,"commercial_score":4,"reasoning":"Early-stage or context-specific research — near-term licensing unlikely without further applied development and validation.","invention_description":"Moreover, AI tools also hold promise for refining crop traits by improving the precision of gene-editing systems and predicting the potential effects of gene variants on plant phenotypes.","org_types":["Agricultural research institutes","Development finance institutions","Government agriculture ministries"],"disclosure":null,"topic":"general","excluded_reason":null,"coherence_flag":true,"trl_estimate":"Concept (TRL 1-3)"},{"id":66,"title":"GA-GBLUP: leveraging the genetic algorithm to improve the predictability of genomic selection","authors":"Yang Xu; Yuxiang Zhang; Yanru Cui; Kai Zhou; Guangning Yu; Wenyan Yang; Xin Wang; Furong Li; Xiusheng Guan; Xuecai Zhang; Zefeng Yang; Shizhong Xu; Chenwu Xu","collection":"CGIAR","abstract":"Genomic selection (GS) has emerged as an effective technology to accelerate crop hybrid breeding by enabling early selection prior to phenotype collection. Genomic best linear unbiased prediction (GBLUP) is a robust method that has been routinely used in GS breeding programs. However, GBLUP assumes that markers contribute equally to the total genetic variance, which may not be the case. In this study, we developed a novel GS method called GA-GBLUP that leverages the genetic algorithm (GA) to select markers related to the target trait. We defined four fitness functions for optimization, including AIC, BIC, R2, and HAT, to improve the predictability and bin adjacent markers based on the principle of linkage disequilibrium to reduce model dimension. The results demonstrate that the GA-GBLUP model, equipped with R2 and HAT fitness function, produces much higher predictability than GBLUP for most traits in rice and maize datasets, particularly for traits with low heritability. Moreover, we have developed a user-friendly R package, GAGBLUP, for GS, and the package is freely available on CRAN (https://CRAN.R-project.org/package=GAGBLUP).","year":"2024","semantic_score":0.6794,"commercial_score":5,"reasoning":"Early-stage or context-specific research — near-term licensing unlikely without further applied development and validation.","invention_description":"The results demonstrate that the GA-GBLUP model, equipped with R2 and HAT fitness function, produces much higher predictability than GBLUP for most traits in rice and maize datasets, particularly for traits with low heritability.","org_types":["Agricultural research institutes","Development finance institutions","Government agriculture ministries"],"disclosure":null,"topic":"general","excluded_reason":null,"coherence_flag":true,"trl_estimate":"Concept (TRL 1-3)"},{"id":67,"title":"Developing automated machine learning approach for fast and robust crop yield prediction using a fusion of remote sensing, soil, and weather dataset","authors":"Kheir, Ahmed M.S.; Govind, Ajit; Nangia, Vinay; Devkota Wasti, Mina Kumari; Elnashar, Abdelrazek; Omar, Mohie; Feike, Til","collection":"CGIAR","abstract":"Estimating smallholder crop yields robustly and timely is crucial for improving agronomic practices,\ndetermining yield gaps, guiding investment, and policymaking to ensure food security. However,\nthere is poor estimation of yield for most smallholders due to lack of technology, and field scale data,\nparticularly in Egypt. Automated machine learning (AutoML) can be used to automate the machine\nlearning workflow, including automatic training and optimization of multiple models within a userspecified\ntime frame, but it has less attention so far. Here, we combined extensive field survey yield\nacross wheat cultivated area in Egypt with diverse dataset of remote sensing, soil, and weather to\npredict field-level wheat yield using 22 Ml models in AutoML. The models showed robust accuracies\nfor yield predictions, recording Willmott degree of agreement, (d>0.80) with higher accuracy when\nsuper learner (stacked ensemble) was used (R2=0.51, d=0.82). The trained AutoML was deployed to\npredict yield using remote sensing (RS) vegetative indices (VIs), demonstrating a good correlation\nwith actual yield (R2=0.7). This is very important since it is considered a low-cost tool and could be\nused to explore early yield predictions. Since climate change has negative impacts on agricultural\nproduction and food security with some uncertainties, AutoML was deployed to predict wheat yield\nunder recent climate scenarios from the Coupled Model Intercomparison Project Phase 6 (CMIP6).\nThese scenarios included single downscaled General Circulation Model (GCM) as CanESM5 and two\nshared socioeconomic pathways (SSPs) as SSP2-4.5and SSP5-8.5during the mid-term period (2050).\nThe stacked ensemble model displayed declines in yield of 21% and5%under SSP5-8.5 and SSP2-4.5\nrespectively during mid-century, with higher uncertainty under the highest emission scenario (SSP5-\n8.5). The developed approach could be used as a rapid, accurate and low-cost method to predict yield\nfor stakeholder farms all over the world where ground data is scarce.","year":"2024","semantic_score":0.6565,"commercial_score":7,"reasoning":"Applied tool or model with identifiable industry interest — commercial pathway requires packaging and broader validation.","invention_description":"The trained AutoML was deployed to\npredict yield using remote sensing (RS) vegetative indices (VIs), demonstrating a good correlation\nwith actual yield (R2=0.7).","org_types":["Precision agriculture platforms","Crop insurance underwriters","National extension and early-warning services"],"disclosure":{"invention_title":"Yield prediction and agronomy decision-support model for wheat production systems","problem_solved":"Estimating smallholder crop yields robustly and timely is crucial for improving agronomic practices,\ndetermining yield gaps, guiding investment, and policymaking to ensure food security.","technical_approach":"However,\nthere is poor estimation of yield for most smallholders due to lack of technology, and field scale data,\nparticularly in Egypt. Automated machine learning (AutoML) can be used to automate the machine\nlearning workflow, including automatic training and optimization of multiple models within a userspecified\ntime frame, but it has less attention so far. Here, we combined extensive field survey yield\nacross wheat cultivated area in Egypt with diverse dataset of remote sensing, soil, and weather to\npredict field-level wheat yield using 22 Ml models in AutoML.","novelty":"The tool or algorithm addresses a documented need in agricultural decision-support; novelty relative to prior art requires assessment — not
