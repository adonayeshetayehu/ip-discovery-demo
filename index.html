<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>IP Discovery Dashboard — CGIAR Research Network</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
     background:#f3f4f6;color:#111827;line-height:1.5;min-height:100vh}

/* Header */
header{background:linear-gradient(135deg,#064e3b 0%,#065f46 50%,#047857 100%);
       padding:32px 48px;color:#fff}
header h1{font-size:1.5rem;font-weight:700;letter-spacing:-.3px}
header p{font-size:.85rem;opacity:.75;margin-top:4px}

/* Overview cards */
.overview{display:flex;gap:20px;padding:32px 48px 0;flex-wrap:wrap}
.stat-card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;
           padding:24px 32px;flex:1;min-width:160px;
           box-shadow:0 1px 3px rgba(0,0,0,.06)}
.stat-card .num{font-size:2.8rem;font-weight:800;line-height:1;color:#065f46}
.stat-card .lbl{font-size:.78rem;font-weight:600;color:#6b7280;
                text-transform:uppercase;letter-spacing:.6px;margin-top:6px}
.stat-card .sub{font-size:.75rem;color:#9ca3af;margin-top:2px}

/* Table section */
.table-section{padding:28px 48px 48px}
.table-controls{display:flex;gap:12px;align-items:center;
                margin-bottom:16px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;max-width:440px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);
                 color:#9ca3af;pointer-events:none}
#search{width:100%;padding:9px 12px 9px 34px;border:1px solid #d1d5db;
        border-radius:8px;font-size:.88rem;background:#fff;color:#111827}
#search:focus{outline:none;border-color:#059669;
              box-shadow:0 0 0 3px rgba(5,150,105,.15)}
.sort-wrap{display:flex;align-items:center;gap:8px}
.sort-wrap label{font-size:.82rem;color:#6b7280;white-space:nowrap}
#sort-select{padding:8px 12px;border:1px solid #d1d5db;border-radius:8px;
             font-size:.85rem;background:#fff;color:#111827;cursor:pointer}
#sort-select:focus{outline:none;border-color:#059669}
.result-count{font-size:.78rem;color:#9ca3af;margin-left:auto}

/* Table */
.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;
      overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
table{width:100%;border-collapse:collapse;font-size:.875rem}
thead tr{background:#f9fafb;border-bottom:2px solid #e5e7eb}
th{padding:12px 16px;text-align:left;font-size:.72rem;font-weight:700;
   color:#6b7280;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
td{padding:14px 16px;border-bottom:1px solid #f3f4f6;vertical-align:top}
.paper-row{cursor:pointer;transition:background .12s}
.paper-row:hover{background:#f0fdf4}
.paper-row.expanded{background:#ecfdf5;border-left:3px solid #059669}
.paper-row.excluded-row{background:#fafafa;cursor:default;opacity:.65}
.paper-row.excluded-row:hover{background:#fafafa}
.paper-row:last-child td{border-bottom:none}
.row-toggle{color:#9ca3af;font-size:.7rem;transition:transform .2s;
            display:inline-block;margin-right:8px}
.row-toggle.open{transform:rotate(90deg)}
.title-text{font-weight:500;color:#111827;line-height:1.4}
.authors-text{font-size:.75rem;color:#9ca3af;margin-top:3px}
.center-badge{display:inline-block;background:#d1fae5;color:#065f46;
              border-radius:20px;padding:3px 10px;font-size:.71rem;
              font-weight:600;max-width:200px;overflow:hidden;
              text-overflow:ellipsis;white-space:nowrap}

/* Score circle */
.score-circle{width:38px;height:38px;border-radius:50%;display:inline-flex;
              align-items:center;justify-content:center;font-weight:800;
              font-size:.95rem;color:#fff;flex-shrink:0}
.score-high{background:#059669}
.score-mid{background:#d97706}
.score-low{background:#dc2626}
.score-xlow{background:#9ca3af}
.score-label{font-size:.68rem;color:#9ca3af;margin-top:3px;text-align:center}
.score-cell{text-align:center}

/* TRL badges */
.trl-badge{display:inline-block;border-radius:20px;padding:3px 9px;
           font-size:.68rem;font-weight:700;white-space:nowrap}
.trl-concept{background:#f3f4f6;color:#6b7280;border:1px solid #d1d5db}
.trl-prototype{background:#dbeafe;color:#1d4ed8;border:1px solid #bfdbfe}
.trl-validated{background:#dcfce7;color:#15803d;border:1px solid #bbf7d0}

/* Coherence badges */
.coherence-badge{display:inline-block;border-radius:20px;padding:3px 9px;
                 font-size:.68rem;font-weight:700;white-space:nowrap;margin-top:4px}
.coherence-ok{background:#dcfce7;color:#15803d}
.coherence-warn{background:#fef3c7;color:#92400e}

/* Exclusion badge */
.excl-badge{display:inline-block;background:#fee2e2;color:#991b1b;
            border-radius:4px;font-size:.65rem;font-weight:700;
            padding:2px 7px;margin-left:6px;vertical-align:middle}
.disc-badge{display:inline-block;background:#ede9fe;color:#7c3aed;
            border-radius:4px;font-size:.65rem;font-weight:700;
            padding:1px 6px;margin-left:6px;vertical-align:middle}

.summary-text{font-size:.82rem;color:#4b5563;line-height:1.5;max-width:260px}

/* Disclosure panel */
.disc-row td{padding:0;border-bottom:none}
.disc-panel{display:none;background:#f0fdf4;
            border-top:2px solid #059669;
            border-bottom:2px solid #e5e7eb;
            animation:slideDown .18s ease}
.disc-panel.open{display:block}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
.disc-inner{padding:24px 28px}

/* Legal disclaimer banner */
.legal-banner{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;
              padding:12px 16px;margin-bottom:20px;
              font-size:.8rem;color:#991b1b;font-weight:600;
              display:flex;align-items:flex-start;gap:8px}
.legal-banner svg{flex-shrink:0;margin-top:1px}

/* TRL pill in disclosure */
.trl-pill{display:inline-flex;align-items:center;gap:6px;
          border-radius:20px;padding:5px 14px;font-size:.8rem;font-weight:700}
.trl-pill-concept{background:#f3f4f6;color:#374151;border:1px solid #d1d5db}
.trl-pill-prototype{background:#dbeafe;color:#1e40af;border:1px solid #93c5fd}
.trl-pill-validated{background:#dcfce7;color:#14532d;border:1px solid #86efac}

/* IP risk flags */
.flag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.flag-pill{display:inline-block;border-radius:20px;padding:3px 10px;
           font-size:.72rem;font-weight:600;white-space:nowrap}
.flag-warn{background:#fef3c7;color:#92400e;border:1px solid #fde68a}
.flag-ok{background:#dcfce7;color:#14532d;border:1px solid #86efac}

/* Mandatory filing fields section */
.mandatory-section{margin-top:20px;padding-top:16px;border-top:2px dashed #d1fae5}
.mandatory-section h3{font-size:.7rem;font-weight:700;text-transform:uppercase;
                      letter-spacing:.8px;color:#059669;margin-bottom:12px}
.field-incomplete{background:#fffbeb;border:1px solid #fde68a;border-radius:6px;
                  padding:6px 10px;font-size:.78rem;color:#92400e;font-style:italic}

/* Disclosure header + grid */
.disc-header{font-size:1rem;font-weight:700;color:#064e3b;
             margin-bottom:16px;padding-bottom:14px;
             border-bottom:1px solid #d1fae5}
.disc-meta-row{display:flex;align-items:center;gap:12px;
               margin-bottom:20px;flex-wrap:wrap}
.disc-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:768px){.disc-grid{grid-template-columns:1fr}}
.disc-card{background:#fff;border:1px solid #d1fae5;border-radius:8px;padding:16px 18px}
.disc-card.full{grid-column:1/-1}
.disc-card h4{font-size:.68rem;font-weight:700;text-transform:uppercase;
              letter-spacing:.6px;color:#059669;margin-bottom:8px}
.disc-card p{font-size:.85rem;color:#374151;line-height:1.65;white-space:pre-line}

/* Empty state */
.empty-state{text-align:center;padding:64px 20px;color:#9ca3af}
.empty-state p{margin-top:10px;font-size:.9rem}
</style>
</head>

      </svg>
      <p>No papers match your filters.</p>
    </div>
  </div>
</div>

<script>
const PAPERS  = [{"id":1,"title":"Loop-mediated isothermal amplification assay: A novel disease diagnostics tool in sweetpotato seed quality assurance","authors":"Wanjala, Bramwel W.; Kreuze, Jan F.; McEwan, M.","collection":"CGIAR","abstract":"Sweetpotato is an important food crop in global production. However, sweetoptato viruses pose a threat to sustainable agriculture and cause significant economic loss. More than 30 viruses have been reported to date, with sweet potato feathery mottle virus (SPFMV) and sweet potato chlorotic stunt virus (SPCSV) occurring frequently and in combination, causing sweetpotato virus disease. The detection of viruses directly from sweetpotato is still a challenge, and efforts are being made toward this front. Therefore, rapid detection of viruses is critical for effective control. Current diagnostic tests are not sufficiently sensitive to reliably detect viruses directly from sweetpotato and require expensive laboratory equipment and a high level of skilled experience. Loop-mediated isothermal amplification (LAMP) is sensitive and specific for both DNA/RNA amplification; it is affordable and its characteristics make it potentially suitable for on-site testing. LAMP assays have been developed for several sweetpotato viruses: SPCSV, SPFMV, and sweet potato leaf curl virus (and related sweepoviruses). Laboratory validation showed a 100% diagnostic sensitivity for all three viruses. The LAMP on-site testing results were comparable to those of polymerase chain reaction and reverse transcriptase polymerase chain reaction confirmatory laboratory tests. Interlab validation and packaging into affordable kits will ensure high adoption in sub-Saharan Africa. The LAMP assay can be used for field surveys and monitoring the phytosanitary status of pre-basic seed production in quarantine or certification program. This guarantees pathogen-free planting material enters the seed system. We discuss opportunities for LAMP as a diagnostic assay for the rapid detection of sweetpotato viruses and its adoption as a quality control system for planting materials. Sweet potato feathery mottle virus (SPFMV), sweet potato chlorotic stunt virus (SPCSV), and sweet potato leaf curl virus (SPLCV) are the most common viruses known to cause disease in sweetpotato. Field deployable loop-mediated isothermal amplification (LAMP) assay for the rapid detection of SPFMV, SPCSV, and SPLCV. Adoption of the LAMP assay by field inspectors for field surveys and monitoring the phytosanitary status of pre-basic seed production in quarantine or certification programs.","semantic_score":0.5052,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['system']","coherence_flag":null,"trl_estimate":null},{"id":2,"title":"Rapid and specific detection of Yam mosaic virus by reverse-transcription recombinase polymerase amplification","authors":"Silva, G.; Bömer, M.; Nkere, C.; Kumar, P. Lava; Seal, S.E.","collection":"CGIAR Research Programme on Roots, Tubers and Bananas","abstract":"Yam mosaic virus (YMV; genus Potyvirus ) is considered to cause the most economically important viral disease of yams ( Dioscorea spp.) in West Africa which is the dominant region for yam production globally. Yams are a vegetatively propagated crop and the use of virus-free planting material forms an essential component of disease control. Current serological and PCR-based diagnostic methods for YMV are time consuming involving a succession of target detection steps. In this study, a novel assay for specific YMV detection is described that is based on isothermal reverse transcription-recombinase polymerase ampli- fication (RT-exoRPA). This test has been shown to be reproducible and able to detect as little as 14 pg/ l of purified RNA obtained from an YMV-infected plant, a sensitivity equivalent to that obtained with the reverse transcription-polymerase chain reaction (RT-PCR) in current general use. The RT-exoRPA assay has, however, several advantages over the RT-PCR; positive samples can be detected in less than 30 min, and amplification only requires a single incubation temperature (optimum 37 ? C). These features make the RT-exoRPA assay a promising candidate for adapting into a field test format to be used by yam breeding programmes or certification laboratoriesYam mosaic virus (YMV; genus Potyvirus ) is considered to cause the most economically important viral disease of yams ( Dioscorea spp.) in West Africa which is the dominant region for yam production globally. Yams are a vegetatively propagated crop and the use of virus-free planting material forms an essential component of disease control. Current serological and PCR-based diagnostic methods for YMV are time consuming involving a succession of target detection steps. In this study, a novel assay for specific YMV detection is described that is based on isothermal reverse transcription-recombinase polymerase ampli- fication (RT-exoRPA). This test has been shown to be reproducible and able to detect as little as 14 pg/ l of purified RNA obtained from an YMV-infected plant, a sensitivity equivalent to that obtained with the reverse transcription-polymerase chain reaction (RT-PCR) in current general use. The RT-exoRPA assay has, however, several advantages over the RT-PCR; positive samples can be detected in less than 30 min, and amplification only requires a single incubation temperature (optimum 37 ? C). These features make the RT-exoRPA assay a promising candidate for adapting into a field test format to be used by yam breeding programmes or certification laboratories","semantic_score":0.4646,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['method']","coherence_flag":null,"trl_estimate":null},{"id":3,"title":"Rapid detection of potyviruses from crude plant extracts","authors":"Silva, G.; Oyekanmi, J.; Nkere, C.K.; Bömer, M.; Kumar, P. Lava; Seal, S.E.","collection":"CGIAR Research Programme on Maize (CIMMYT)","abstract":"Potyviruses (genus Potyvirus; family Potyviridae) are widely distributed and represent one of the most economically important genera of plant viruses. Therefore, their accurate detection is a key factor in developing efficient control strategies. However, this can sometimes be problematic particularly in plant species containing high amounts of polysaccharides and polyphenols such as yam (Dioscorea spp.). Here, we report the development of a reliable, rapid and cost-effective detection method for the two most important potyviruses infecting yam based on reverse transcription-recombinase polymerase amplification (RT-RPA).\r\n\r\nThe developed method, named ‘Direct RT-RPA’, detects each target virus directly from plant leaf extracts prepared with a simple and inexpensive extraction method avoiding laborious extraction of high-quality RNA. Direct RT-RPA enables the detection of virus-positive samples in under 30 min at a single low operation temperature (37 °C) without the need for any expensive instrumentation.\r\n\r\nThe Direct RT-RPA tests constitute robust, accurate, sensitive and quick methods for detection of potyviruses from recalcitrant plant species. The minimal sample preparation requirements and the possibility of storing RPA reagents without cold chain storage, allow Direct RT-RPA to be adopted in minimally equipped laboratories and with potential use in plant clinic laboratories and seed certification facilities worldwide.","semantic_score":0.5402,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['method']","coherence_flag":null,"trl_estimate":null},{"id":4,"title":"Witches' broom disease of cassava is associated with a fastidious fungal pathogen in Southeast Asia","authors":"Arinaitwe, W; Vongphachanh, P; Chittarath, K; HangLe, T; Oeurn, S; Malik, I; Newby, J; Sophearith, S; Youabee, L; Leiva, A; Pardo, J; Cuellar, W","collection":"CGIAR","abstract":"Cassava Witches' Broom Disease (CWBD) is a threat to cassava (Manihot esculenta) in  mainland Southeast Asia (SEA). The prevalence of CWBD in the region, which had been low in the previous 5 years, has reached a critical point. CWBD incidence in Lao PDR, Cambodia, Vietnam, and Thailand has been reported at 75% in some cases. CWBD was previously suspected to be caused by a phytoplasma, with limited-to-no detection. There is no biological evidence linking phytoplasma and CWBD. We recently used shotgun sequencing to examine pathogen communities in CWBD-infected and healthy plants. We found that a fungus in the genus Ceratobasidium, 98.3-99.7%, similar to C. theobromae, was conspicuously present in contigs from diseased but not healthy plants. C. theobromae causes vascular streak disease (VSD), one of the major cacao diseases in SEA and challenging \r\nto culture in-vitro. We have developed a robust PCR-based assay based on the latest sequence data to support the multiplication of disease-free planting materials and regional wide surveillance. Currently, we are investigating CWBD diversity, disease progression, host range, and transmission pathways to accelerate the development of integrated management options, including breeding for resistance and biochemical control.","semantic_score":0.5228,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['none']","coherence_flag":null,"trl_estimate":null},{"id":5,"title":"The development of a multiplex PCR assay for the detection of Fusarium oxysporum f. sp. cubense lineage VI strains in East and Central Africa","authors":"Ndayihanzamaso, Privat; Karangwa, Patrick; Mostert, Diane; Mahuku, George S.; Blomme, Guy; Beed, Fenton D.; Swennen, Rony L.; Viljoen, Altus","collection":"CGIAR Research Programme on Roots, Tubers and Bananas","abstract":"Banana is a staple food and cash crop grown in East and Central Africa (ECA). The main banana varieties grown in ECA are the East African highland bananas (EAHB), although dessert/beer bananas such as Sukari Ndizi, Kayinja (Pisang Awak) and Gros Michel are also produced due to their high value at local markets. The Fusarium wilt fungus Fusarium oxysporum f. sp. cubense (Foc) causes disease of susceptible dessert/beer bananas, which significantly reduces yields. Banana Fusarium wilt is managed by excluding the pathogen from disease-free areas and by planting disease-resistant varieties in infested fields. Six phylogenetically closely-related vegetative compatibility groups (VCGs) of Foc, VCGs 0124, 0125, 0128, 01212, 01220 and 01222 are present in ECA, which all group together in Foc Lineage VI. Rapid and accurate detection of Foc Lineage VI strains is thus important to prevent its spread to disease-free areas. In this study, molecular markers specific to Foc Lineage VI were therefore developed. Primer sets were then combined in a multiplex PCR assay, and validated on a worldwide population of 623 known Foc isolates, other formae speciales and non-pathogenic Fusarium oxysporum isolates. The Foc Lineage VI multiplex PCR was used to identify Foc isolates collected in banana fields at five locations in Uganda and Tanzania. Foc Lineage VI DNA was detected at a concentration as low as 0.1 ng/μl, both in the absence and presence of banana DNA, and can therefore be used as an accurate diagnostic tool for Foc Lineage VI strains.","semantic_score":0.4413,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['tool']","coherence_flag":null,"trl_estimate":null},{"id":6,"title":"Plant pest surveillance: from satellites to molecules","authors":"Silva, G.; Tomlinson, J.; Onkokesung, N.; Sommer, S.; Mrisho, L.; Legg, James P.; Adams, I.P.; Gutierrez Vazquez, Y.; Howard, T.P.; Laverick, A.; Hossain, O.; Wei, Q.; Gold, K.M.; Boonham, N.","collection":"CGIAR Research Programme on Roots, Tubers and Bananas","abstract":"Plant pests and diseases impact both food security and natural ecosystems, and the impact has been accelerated in recent years due to several confounding factors. The globalisation of trade has moved pests out of natural ranges, creating damaging epidemics in new regions. Climate change has extended the range of pests and the pathogens they vector. Resistance to agrochemicals has made pathogens, pests, and weeds more difficult to control. Early detection is critical to achieve effective control, both from a biosecurity as well as an endemic pest perspective. Molecular diagnostics has revolutionised our ability to identify pests and diseases over the past two decades, but more recent technological innovations are enabling us to achieve better pest surveillance. In this review, we will explore the different technologies that are enabling this advancing capability and discuss the drivers that will shape its future deployment.","semantic_score":0.6497,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['system']","coherence_flag":null,"trl_estimate":null},{"id":7,"title":"Germplasm Seed Movement and Global Plant Health","authors":"Kumar, Lava; Kumari, Safaa","collection":"CGIAR","abstract":"Global seed transfers through trade, and collection and distribution of genetic resources by\ngenebanks are important pathways for the transboundary spread of seed-borne pests,\nespecially viruses that the insect vectors can further transmit upon introduction. Various\nphytosanitary procedures, including the IPPC International Standard Phytosanitary\nMeasures, have been established to minimize the risk of seed transmission and provide\naccess to quality seeds crucial for food production and biodiversity conservation. This\nsession will summarize the current state of efforts in minimizing the seed-transmission risk\nand measures to overcome bottlenecks to comply with phytosanitary standards.\nPresentations will cover pest risk to seed pathways and implications to global plant health, strategies for minimizing seed-transmission risk, advances in diagnostic techniques for\ncharacterization and sensitive detection of seed-borne pests, and efforts to enhance\nphytosanitary capacity, especially in low- and middle-income countries to enable safe seed\nexchanges. The session will also highlight policy and regulatory limitations/bottlenecks\nnecessary to improve safe exchange of germplasm and boost seed trade.","semantic_score":0.4919,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['technique']","coherence_flag":null,"trl_estimate":null},{"id":8,"title":"DNA barcodes for pathogens of African food crops","authors":"Kumar, L.; Sharma, K.","collection":"CGIAR","abstract":"Studies were conducted to characterize pathogen populations and recognize unique stretches of sequences, known as DNA barcodes, that can be used as genetic markers for the rapid diagnosis of the pathogens and pests affecting the African food crops. The fungal pathogen causing anthracnose (Glomerella cingulata), the most destructive disease of yam and cassava in West Africa, were characterized. Various isolates of this fungus were identified and their genetic relatedness and diversity were determined through molecular analysis. They were grouped into spot (S) and blight (B) isolates based on symptoms they induce. The genetic diversity of these isolates was assessed by nucleotide sequencing and cluster analysis of the 540 base pair (bp) nuclear ribosomal internal transcribed spacer region (ITS1, ITS2 and the 5.8S gene) and partial gene sequences of actin (240 bp) and histone (370 bp). Phylogenetic cluster analysis grouped the 25 isolates into 2 major clades and 2 subclades within the major clades. Both the S and B isolates were distributed between the 2 clades. All the isolates in clade 1 were unique to yam. Seven of these isolates formed a genetically distinct lineage, indicating that they could be new strains unique to yam. Isolates in clade 2 infected both cassava and yam, suggesting their capability to infect a wide range of plants. Unique sequence motifs were recognized and diagnostic PCR primers directly from infected plant tissues were designed for the specific amplification of G. cingulata affecting yam and cassava. Using a similar approach, the fungal agent associated with gray leaf spot (GLS), the most destructive disease of maize, was characterized. It was found that GLS in Nigeria was caused by a distinct species of Cercospora. This work allowed the establishment of a unique set of primers for the specific identification of the GLS pathogen prevalent in Nigeria. Through comparative genomics, common genome regions were identified in African cassava mosaic begomoviruses occurring in sub-Saharan Africa. A simple multiplex PCR assay was developed that can detect all the major viruses in cassava mosaic disease aetiology. This test was adopted for virus indexing of cassava propagated in vitro. To aid in the diagnostics research, a simple and cost-effective procedure suitable for extraction of DNA from seeds, leaves, stems, tubers and even roots was developed. The resultant DNA was suitable for PCR-based diagnoses of fungi, bacteria and viruses in the infected tissues of a wide range of plant species.","semantic_score":0.478,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['approach']","coherence_flag":null,"trl_estimate":null},{"id":9,"title":"Challenge of virus disease threats to ensuring sustained uptake of vitamin-A-rich sweetpotato in Africa","authors":"Kreuze, Jan F.; Cuéllar, Wilmer Jose; Low, Jan W.","collection":"CGIAR Research Programme on Roots, Tubers and Bananas","abstract":"Orange-fleshed sweetpotatoes (OFSP) are a rich source of pro-vitamin A and can alleviate vitamin A deficiency in the developing world. In Africa, traditional varieties have been almost exclusively white-fleshed and introduction and breeding of orange-fleshed varieties into Africa has been severely hampered by virus diseases to which many varieties are susceptible. Breeding progress to generate resistant varieties has been slow due to rare and recessive occurrence of resistance in breeding populations. Production of virus-free seed is complicated by the fact that most sweetpotato viruses show no or only limited symptoms and very low virus concentrations when infected by individual viruses, making them difficult to detect. Even single infections can lead to significant yield losses, but when they combine severe disease complexes are generated, which can lead to total crop failure. Significant efforts have been made in characterizing and understanding virus interactions in sweetpotato over the last two decades to address this challenge; they are reviewed in this chapter. We also review the state of the art in detection of viruses in support of seed systems and breeding. We conclude with recommendations for the most urgent future research directions needed to address virus problems in sweetpotatoes.","semantic_score":0.3979,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['system']","coherence_flag":null,"trl_estimate":null},{"id":10,"title":"Assessment of yam mild mosaic virus coat protein gene sequence diversity reveals the prevalence of cosmopolitan and African group of isolates in Ghana and Nigeria","authors":"Nkere, C.K.; Otto, E.; Atiri, G.I.; Onyeka, J.; Silva, G.; Bömer, M.; Seal, S.E.; Kumar, P. Lava","collection":"CGIAR Research Programme on Maize (CIMMYT)","abstract":"This study analyzed the genetic diversity of 18 Yam mild mosaic virus (YMMV, genus Potyvirus) isolates collected from field surveys in Ghana (N = 8) and Nigeria (N = 10) in 2012−13. The full coat protein (CP) encoding region of the virus genome was sequenced and used for comparison and phylogenetic analysis of the YMMV isolates available in the NCBI nucleotide database. The mean nucleotide (nt) diversity was 13.4% among the 18 isolates (17 from D. alata and one from D. rotundata), 11.4% within the isolates of Ghana and 7.4% within the isolates of Nigeria. The phylogenetic clustering of the 18 YMMV isolates did not show correlation with the country of origin, and they aligned with the reference sequences of four of the 11 YMMV monophyletic groups representing the cosmopolitan group and the African group of YMMV isolates. High sequence homology of 99% between the YMMV sequence from Nigeria (CP12-DaN6-1) and a previously reported sequence from Togo (GenBank Accession Number AF548514) suggests a prevalence of seed-borne virus spread within the region. Understanding YMMV sequence diversity in West Africa aid in the improvement of diagnostic assays necessary for virus indexing and seed certification.","semantic_score":0.3154,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['none']","coherence_flag":null,"trl_estimate":null},{"id":11,"title":"perspectives on the application of next generation sequencing to the improvement of Africa's staple food crops","authors":"Gedil, Melaku A; Ferguson, Morag E.; Girma Tessema, G.; Gisel, A.; Stavolone, L.; Rabbi, Ismail Y.","collection":"IFPRI — Agriculture for Nutrition & Health","abstract":"The persistent challenge of insufficient food, unbalanced nutrition, and deteriorating natural resources in the most vulnerable nations, characterized by fast population growth, calls for utilization of innovative technologies to curb constraints of crop production. Enhancing genetic gain by using a multipronged approach that combines conventional and genomic technologies for the development of stress-tolerant varieties with high yield and nutritional quality is necessary. The advent of next-generation sequencing (NGS) technologies holds the potential to dramatically impact the crop improvement process. NGS enables whole-genome sequencing (WGS) and re-sequencing, transcriptome sequencing, metagenomics, as well as high-throughput genotyping, which can be applied for genome selection (GS). It can also be applied to diversity analysis, genetic and epigenetic characterization of germplasm and pathogen detection, identification, and elimination. High-throughput phenotyping, integrated data management, and decision support tools form the necessary supporting environment for effective utilization of genome sequence information. It is important that these opportunities for mainstreaming innovative breeding strategies, enabled by cutting-edge “Omics” technologies, are seized in Africa; however, several constraints must be addressed before the benefit of NGS can be fully realized. African breeding programs must have access to high-throughput genotyping facilities, capacity in the application of genome selection and marker-assisted breeding must be built and supported by capacity in genomic analysis and bioinformatics. This chapter demonstrates how interventions with NGS-enabled innovative strategies can be applied to increase genetic gain with insights from the Consortium of International Agricultural Research (CGIAR) in general and the International Institute of Tropical Agriculture (IITA) in particular.","semantic_score":0.6268,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Review/survey title — 'perspectives on' detected","coherence_flag":null,"trl_estimate":null},{"id":12,"title":"Cassava Witches’ Broom Disease in Southeast Asia: A review of its distribution and associated symptoms","authors":"Pardo, Juan Manuel; Chittarath, Khonesavanh; Vongphachanh, Pinkham; Hang, Le Thi; Oeurn, Samoul; Arinaitwe, Warren; Rodríguez, Rafael; Sok, Sophearith; Malik, Al Imran; Cuéllar, Wilmer Jose","collection":"CGIAR","abstract":"Cassava witches' broom disease (CWBD) is one of the main diseases of cassava in Southeast Asia (SEA). Affected cassava plants show reduced internodal length and proliferation of leaves (phyllody) in the middle and top part of the plant, which results in reduced root yields of 50% or more. It is thought to be caused by phytoplasma; however, despite its widespread distribution in SEA still little is known about CWBD pathology. The overarching goal of this study was to review and corroborate published information on CWBD biology and epidemiology considering recent field observations. We report the following: (1) CWBD symptoms are conserved and persistent in SEA and are distinct from what has been reported as witches' broom in Argentina and Brazil. (2) In comparison with cassava mosaic disease, another major disease of cassava in SEA, symptoms of CWBD develop later. (3) Phytoplasma detected in CWBD-affected plants belong to different ribosomal groups and there is no association study available indicating phytoplasma as the causing agent of CWBD. These findings are essential clues for designing surveillance and management strategies and for future studies to better understand the biology, tissue localization and spatial spread of CWBD in SEA and other potential risk areas.","semantic_score":0.3933,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Review/survey title — 'review of' detected","coherence_flag":null,"trl_estimate":null},{"id":13,"title":"Transboundary animal diseases","authors":"Grace, Delia; Dessie, Tadelle; Dione, Michel M.; Kiara, Henry K.; Liljander, Anne M.; Mariner, Jeffrey C.; Naessens, Jan; Okoth, Edward; Patel, Ekta; Steinaa, Lucilla; Toye, Philip G.; Wieland, Barbara","collection":"CAB International","abstract":"Transboundary animal diseases (TADs) are highly contagious epidemics with the potential for very rapid spread, causing serious economic and sometimes public health consequences while threatening farmers' livelihoods. TADs often cause high morbidity and mortality in susceptible animal populations. Some TADs are also emerging infectious diseases, food-borne diseases and/or zoonoses: these are covered in other chapters. This chapter covers those high-impact, highly contagious animal diseases, such as foot-andmouth disease (FMD), that do not infect humans but do affect food and nutrition security and trade that the International Livestock Research Institute (ILRI) has been working on since the 1990s. These are: African swine fever (ASF), mycoplasma disease (both contagious bovine pleuropneumonia (CBPP) and contagious caprine pleuropneumonia (CCPP)), peste des petits ruminants (PPR) and Newcastle disease (ND). Other TADs, which were to a lesser degree the focus of ILRI research, are briefly mentioned (including FMD, classical swine fever (CSF) and rinderpest).","semantic_score":0.3283,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['none']","coherence_flag":null,"trl_estimate":null},{"id":14,"title":"Validation of diagnostic markers for streak virus disease resistance in maize","authors":"Sime, S.S.; Menkir, A.; Adetimirin, Victor O.; Gedil, Melaku A; Kumar, P.","collection":"CGIAR Research Programme on Maize (CIMMYT)","abstract":"Maize streak virus (MSV) is responsible for streak disease of maize and poses a serious threat to maize production in sub-Saharan Africa. Polygenic resistance to MSV has become an essential requirement in modern maize cultivars to mitigate yield losses. Many single nucleotide polymorphism (SNP) markers linked to putative MSV resistance loci have been identified for use in forward breeding. This study aimed to validate, using the high-throughput kompetitive allele specific PCR (KASP) assay, the diagnostic ability of the three SNP markers linked to the loci for the Msv1 resistance trait in 151 early generations inbred lines with diverse genetic backgrounds, together with nine MSV-resistant elite lines and a susceptible check (cv. Pool-16). The phenotypic responses were determined by MSV inoculation using viruliferous leafhoppers (Cicadulina triangular) under screenhouse conditions. Based on an established MSV disease rating system, the maize lines were categorized into resistant, moderately resistant, susceptible, and highly susceptible. The three SNPs associated with MSV resistance were detected in 133 lines, which were categorized as resistant (54), moderately resistant (76), and susceptible (1). The 18 early generation lines without these SNPs were classified as moderately resistant (10), susceptible (5), and highly susceptible (3). This study confirms the strong association of SNPs with MSV resistance and their usefulness for forward breeding in maize while emphasizing the need to identify additional markers to screen lines for MSV resistance without any ambiguity.","semantic_score":0.4473,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['system']","coherence_flag":null,"trl_estimate":null},{"id":15,"title":"Diversity of viruses and viroids infecting Taro in Kenya based on small RNA sequencing and pcr detection","authors":"Muruu, David; Kinyua, J.; Kepue, M.; Kerubo, L.; Njaci, I.; Mware, Bernard","collection":"CGIAR","abstract":"Purpose: Viral diseases cause severe yield losses and quality decline in crops worldwide. Despite their economic significance, the occurrence and distribution of the major viruses and viroids infecting Taro in Kenya remain poor, limiting the development of robust disease management strategies to mitigate their spread. This study thus aimed to identify the viruses and viroids infecting Taro in Kenya as a basis for developing effective management strategies to support the prevention and control of Taro viruses. Methodology: Viral surveys and sampling were conducted across nine Taro-growing counties with diverse agroecological conditions in Kenya to determine the incidence and distribution of viruses affecting Taro. Leaf and whole plant samples of symptomatic edible and wild Taro were collected for PCR, RT-PCR, and small RNA sequencing assays to determine the diversity of viruses and viroids infecting Taro. Results: Disease-like symptoms, including stunting, leaf rolling, shrinkage, deformed leaves with mosaic and yellow veins, and dwarfism, were observed. An overall mean disease incidence of 32-60% was recorded in all sites surveyed. Small RNA sequencing revealed the presence of both DNA and RNA viruses. Detected DNA viruses included the Taro Bacilliform Virus (TaBV) and Taro Bacilliform CH Virus (TaBCHV), badnaviruses specific to Taro, the sweet potato Badnavirus B, sugarcane bacilliform virus, and sweet potato leaf curl virus. The RNA viruses included the sweet potato feathery mottle and Phaseolus vulgaris alphaendornavirus. A Citrus exocortis viroid was also detected. Interestingly, the wild relatives of Taro displayed very few viral sequence hits. This study reports the Taro viruses and viroids circulating in Kenya and is the first to describe the incidence, distribution, and sequence variability of TaBV in Kenya. Recommendations: Future studies should focus on developing effective management strategies to support the prevention and control of Taro viruses, including genetic resources for virus-Taro interactions, removing infected crops, controlling insect vectors, and developing virus-free planting materials.","semantic_score":0.4684,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['method']","coherence_flag":null,"trl_estimate":null},{"id":16,"title":"Accuracy of a smartphone-based object detection model, PlantVillage Nuru, in identifying the foliar symptoms of the viral diseases of cassava-CMD and CBSD","authors":"Mrisho, L.; Mbilinyi, N.; Ndalahwa, M.; Ramcharan, A.; Kehs, A.K.; McCloskey, P.; Murithi, H.; Hughes, D.P.; Legg, James P.","collection":"CGIAR Research Programme on Roots, Tubers and Bananas","abstract":"Nuru is a deep learning object detection model for diagnosing plant diseases and pests developed as a public good by PlantVillage (Penn State University), FAO, IITA, CIMMYT, and others. It provides a simple, inexpensive and robust means of conducting in-field diagnosis without requiring an internet connection. Diagnostic tools that do not require the internet are critical for rural settings, especially in Africa where internet penetration is very low. An investigation was conducted in East Africa to evaluate the effectiveness of Nuru as a diagnostic tool by comparing the ability of Nuru, cassava experts (researchers trained on cassava pests and diseases), agricultural extension officers and farmers to correctly identify symptoms of cassava mosaic disease (CMD), cassava brown streak disease (CBSD) and the damage caused by cassava green mites (CGM). The diagnosis capability of Nuru and that of the assessed individuals was determined by inspecting cassava plants and by using the cassava symptom recognition assessment tool (CaSRAT) to score images of cassava leaves, based on the symptoms present. Nuru could diagnose symptoms of cassava diseases at a higher accuracy (65% in 2020) than the agricultural extension agents (40–58%) and farmers (18–31%). Nuru’s accuracy in diagnosing cassava disease and pest symptoms, in the field, was enhanced significantly by increasing the number of leaves assessed to six leaves per plant (74–88%). Two weeks of Nuru practical use provided a slight increase in the diagnostic skill of extension workers, suggesting that a longer duration of field experience with Nuru might result in significant improvements. Overall, these findings suggest that Nuru can be an effective tool for in-field diagnosis of cassava diseases and has the potential to be a quick and cost-effective means of disseminating knowledge from researchers to agricultural extension agents and farmers, particularly on the identification of disease symptoms and their management practices.","semantic_score":0.4937,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Comparative evaluation study — assesses existing tools/methods; no novel invention described","coherence_flag":null,"trl_estimate":null},{"id":17,"title":"Loop-mediated Isothermal Amplification (LAMP): Potato virus detection CIP – SOPXXX, v.1.1.","authors":"Fuentes, S.","collection":"International Potato Center","abstract":"This standard operational procedure (SOP) for LAMP testing covers the steps on how to use a field-deployable LAMP assay in the diagnosis of the major viruses infecting potato worldwide: Potato leaf roll virus (PLRV), Potato virus Y (PVY), and Potato virus X (PVX). It includes different steps from collecting samples, processing of them for nucleic acid extraction, preparing LAMP reaction, setting the Genie instrument, and recording of results. LAMP test can be rapidly adopted to detect different pathogens in different plants by just replacing the specific primers (for those pathogens) in the reaction, which makes it broadly applicable and adjustable to new pathogens.","semantic_score":0.626,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['none']","coherence_flag":null,"trl_estimate":null},{"id":18,"title":"Study on phytoplasma causing Napier grass stunt disease (NGSD) in different farmers’ fields in Ada Woreda, Ethiopia","authors":"Melesse, A.","collection":"Addis Ababa University","abstract":"Napier or elephant grass (Pennisetum purpureum) is a perennial grass grown widely in East Africa as a fodder crop. It is being promoted in Ethiopia for use by cut and carry (zero grazing) smallholder livestock keepers. The International Livestock Research Institute (ILRI) in Ethiopia maintains a germplasm collection of Napier at its field stations in Debre Zeit and Zewai. ILRI distributed apparently clean cuttings to the farmers, however it was only recently a disease, phytoplasma was identified in these stations. Therefore, this study was initiated to detect Napier grass stunt disease (NGSD) causing agent (Phytoplasma) and the extent of its distribution in Ada woreda through Nucleic acid spot hybridization (NASH) technique, Polymerase chain reaction (PCR) and PCR- RFLP (Restriction Fragment Length Polymorphism). A total of 603 Napier grass leaf samples from 15 farmers’ field of 5 villages, ILRI/Debre Zeit gene bank, Ethiopian Institute of Agricultural Research (EIAR/Debre Zeit) and Genesis farm were screened for the presence of phytoplasma and its symptoms. Following this the effect of cutting on the prevalence of the disease was studied on Napier grass accessions 14984, 16786, 16837 and 16835. Passive transmission of the disease was also studied in a screen house with phytoplasma inoculated plants. Out of the total samples 4.3% were phytoplasma positive and only 0.8% showed the symptom. Cutting increased the prevalence of the pathogen in all accessions, however accessions 16786 and 16835 were more affected than the others. In the screen house, symptom development was correlated with the presence of Phytoplasma in 60% of the analyzed leaf samples. Out of the 19 NASH positive samples screened for the presence of phytoplasma 18 were found to be positive by PCR. PCR- RFLP result showed that digestion with Rsa I restriction enzyme had a similar banding pattern to 16Sr XI phytoplasma group found in Kenya. Therefore, the phytoplasma identified in this study seems to differ from 16SrIII group that was previously found in Zewai and Debre Zeit ILRI fields. Therefore, this study confirmed the presence of phytoplasma infection of Napier grass in Ada woreda. Further characterization of the phytoplasma using sequence analysis is needed to specifically identify the phytoplasma group.","semantic_score":0.4478,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['technique']","coherence_flag":null,"trl_estimate":null},{"id":19,"title":"Molecular characterization and detection of African oil palm ringspot virus","authors":"Lozano Potes, Iván; Morales, Francisco José; Martínez, A.K.; Pena, E.","collection":"CGIAR","abstract":"African oil palm ringspot virus (AOPRV) had been previously described as a fovea-like virus associated with a lethal disease of African oil palm (Elaeis guineensis) in South America. The original report was based on partial sequence and a distant relationship between AOPRV and Apple stem pitting virus, Apricot latent virus and Grapevine rupestris stem pitting-associated virus, definitive species of the genus Foveavirus, family Flexiviridae. We report the full sequence of the RNA genome of AOPRV, and demonstrate that this virus is more closely related to two unassigned virus species of the family Flexiviridae (Cherry green ring mottle virus and Cherry necrotic rusty mottle virus) than to any definitive species of the genus Foveavirus. Thus, AOPRV should be considered as a new species of the Flexiviridae until the International Committee on Taxonomy of Viruses (ICTV) resolves the taxonomic status of the increasing number of unassigned species in this family. The molecular characterization of AOPRV has provided a highly sensitive and reliable RT-PCR assay for the early detection of AOPRV in different genotypes of African, American (E. oleifera) and hybrid oil palms.","semantic_score":0.4403,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['none']","coherence_flag":null,"trl_estimate":null},{"id":20,"title":"Detection of Banana Mild Mosaic Virus in musa in vitro plants: High-throughput sequencing presents higher diagnostic sensitivity than (IC)-RT-PCR and identifies a new betaflexiviridae species","authors":"Hanafi, Marwa; Rong, Wei; Tamisier, Lucie; Berhal, Chadi; Roux, Nicolas Stephan M.; Massart, Sébastien","collection":"Genebanks","abstract":"The banana mild mosaic virus (BanMMV) (Betaflexiviridae, Quinvirinae, unassigned species) is a filamentous virus that infects Musa spp. and has a very wide geographical distribution. The current BanMMV indexing process for an accession requires the testing of no less than four plants culti-vated in a greenhouse for at least 6 months and causes a significant delay for the distribution of the germplasm. We evaluated the sensitivity of different protocols for BanMMV detection from in vitro plants to accelerate the testing process. We first used corm tissues from 137 in vitro plants and obtained a diagnostic sensitivity (DSE) of only 61% when testing four plants per accession. After thermotherapy was carried out to eliminate BanMMV infection, the meristem was recovered and further grown in vitro. The same protocol was evaluated in parallel on the corm tissue surrounding the meristem, as a rapid screening to evaluate virus therapy success, and was compared to the results obtained following the standard protocol. The obtained results showed 28% false negatives when conducting testing from corm tissues, making this protocol unsuitable in routine processes. Furthermore, RT-PCR and high-throughput sequencing (HTS) tests were applied on tissues from the base (n = 39) and the leaves (n = 36). For RT-PCR, the average DSE per sample reached 65% from either the base or leaves. HTS was applied on 36 samples and yielded 100% diagnostic specificity (DSP) and 100% DSE, whatever the sampled tissue, allowing the identification of a new Betaflex-iviridae species infecting Musa. These results suggest that a reliable diagnostic of BanMMV from in vitro plants using RT-PCR or HTS technologies might represent an efficient alternative for testing after greenhouse cultivation.","semantic_score":0.5705,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['protocol']","coherence_flag":null,"trl_estimate":null},{"id":21,"title":"Genetic variation associated with increased lambda-cyhalothrin resistance in Spodoptera frugiperda (Lepidoptera: Noctuidae) in West Africa","authors":"Tossou, E.; Tepa-Yotto, G.; Goergen, G.; Tchigossou, G.; Tchouakui, M.; Nguete, D.N.; Amadou, L.; Noussourou, M.; Bokonon-Ganta, A.; Wondji, C.S.; Tamò, Manuele; Djouaka, R.F.","collection":"IFPRI — Agriculture for Nutrition & Health","abstract":"The fall armyworm Spodoptera frugiperda (J.E. Smith) is a new serious destructive and widespread pest of corn which recently invaded subtropical regions worldwide. As this invasive species is spreading across the continent, it is vital to assess its susceptibility to currently used insecticides and establish the potential underlying resistance mechanism to better inform control programmes. In this study, we characterized the strains from eighteen fall armyworm populations from different countries in West Africa, established their susceptibility profiles to the main insecticides and genotyped the target site resistance alleles. The RFLP-PCR method showed that the majority of the population tested was a corn strain (72.5–100%) compared to the probable rice strain (0–27.5%). Tpi sequencing of the suspected rice strains revealed that almost all the samples analysed were from corn (> 97%). Additionally, the three insecticides tested, λ-cyhalothrin, chlorpyrifos and emamectin benzoate induced susceptible to moderate toxicity against this pest. Synergism tests performed to investigate the biochemical mechanism used by fall armyworm to breakdown λ-cyhalothrin indicated that metabolic enzymes (oxydases, esterase and the glutathion-S-transferase) play moderate roles in the resistance of λ-cyhalothrin observed in western Africa. Target mutation tests (qPCR) combined with previous synergetic tests showed that resistance to organophosphates and pyrethroids could be due to a biochemical mechanism + amino acid mutations (presence of the F290V mutation) or a biochemical mechanism (absence of the T929I mutation), respectively. The results of this study provide valuable information for supporting decisions related to sustainable fall armyworm control and applied resistance management.","semantic_score":0.3325,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['method']","coherence_flag":null,"trl_estimate":null},{"id":22,"title":"Widespread occurrence of cassava torradovirus 2 and cassava frogskin associated oryzavirus characterized the 2020–2023 outbreak of severe cassava frogskin disease in the Orinoquia region of Colombia","authors":"Marín, Jaime; Vargas-Berdugo, Angela; Sierra-González, María Camila; López-Romero, Laura Paola; Rosero, Amparo; Leiva, Ana Maria; Jimenez, Jenyfer; Cuellar, Wilmer Jose","collection":"CGIAR","abstract":"Severe root symptoms of Cassava Frogskin Disease (CFSD) remerged in Colombia during 2020–2023 significantly impacting cassava yield in Orinoquia, one of the main cassava producing regions. Using a finite population sampling strategy (ca. 136 fields with ~30 observations per field = 4620 observations), field surveys in the main cassava-producing provinces showed high prevalence values of severe root symptoms. The upper limits of prevalence values were observed in Fuente de Oro (66.67%), Granada (63.33%), Vista Hermosa (56.67%), Puerto Lleras (46.67%), and El Castillo (23.33%). Molecular diagnostics of a subsample (n=149) identified torradovirus species 2 (CsTLV-2) and the oryzavirus CsFSaV as the most frequent pathogens (27.63% and 57.89%, respectively) in this region. The overall prevalence of CsTLV was 27.63%. Notably, among the torradoviruses, CsTLV-2 (100%) showed a clear dominance over CsTLV-1 (9.52%). In contrast, samples collected in the Department of Cauca—where the disease has been endemic and reported since the early 1970s—exhibited a distinct torradovirus profile. The total prevalence of CsTLV was 46.58%, with CsTLV-1 and CsTLV-2 detected at frequencies of 52.94% and 85.29%, respectively. In contrast, the incidence of CsFSaV was approximately threefold lower than that observed in Orinoquia. It is noteworthy that the diversity of torradoviruses was higher in Cauca and that in Orinoquia CsTLV-2 showed characteristics consistent with a recent population expansion. Altogether, the data presented here indicate that the 2020–2023 outbreak of CFSD was characterized by a high prevalence of severe roots symptoms and widespread infections by CsTLV-2 and the oryzavirus CsFSaV, in comparison with other pathogens detected in the analyzed samples.","semantic_score":0.3819,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['none']","coherence_flag":null,"trl_estimate":null},{"id":23,"title":"Participatory plant breeding in water-limited environment","authors":"Ceccarelli, Salvatore; Grando, Stefania; Baum, M","collection":"CGIAR","abstract":"For the past years since the Consultative Group of International Agricultural Research\r\n(CGIAR) Systemwide Initiative on Participatory Research and Gender Analysis (PRGA)\r\nwas initiated, guides for impact assessment of PRGA have been developed (Lilja and\r\nAshby 1999; Johnson et.al., 2000; Lilja and Johnson 2001). However, according to\r\nFarnworth and Jiggins (2003) while there is rapidly growing literature on the impacts of\r\nPPB on farmers, this is not further differentiated by sex. Despite the immense literature\r\non the impacts of production, post production technologies on women farmers,\r\nsystematic studies on the impacts of PPB on women in any category, either in terms of\r\nthe effects of being a participant in a participatory plant breeding process (PPB) process,\r\nor in terms of the impact of the new materials generated is few. There is practically no\r\nliterature that examines the effects of PPB – either as process or in terms of the impacts\r\nof the emergent materials – on gender relations at the household, community or any\r\nother relevant social or geographic scale along the food chain. Even with women’s active\r\ninvolvement in rice production, post harvest and seed management, scientists who are\r\nmostly male often talk with the male farmers only. Ignoring women’s knowledge and\r\npreference for rice varieties may be an obstacle to adoption of improved varieties,\r\nparticularly in areas with gender-specific tasks, and in farm activities where women have\r\nconsiderable influence. Feldstein (1996) cited three different ways in which gender\r\nanalysis can be considered in participatory research. These are: the efficiency argument,\r\nequity oriented, and empowerment. This study attempts to fill in these research gaps.\r\nThe objectives of this paper are to: a) discuss the process used in integrating\r\nparticipatory research and gender analysis in breeding for drought prone and\r\nsubmergence prone environment; b) assess how gender analysis contributed to the\r\ndesign and implementation of the research and development outcomes; c) assess the\r\nimpacts of PVS on poor women farmers, particularly on women’s empowerment; and d)\r\nrecommend strategies to further enhance women’s roles in ensuring household food\r\n(rice) food security and improving their social status within the household and the\r\ncommunity.","semantic_score":0.3611,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['system']","coherence_flag":null,"trl_estimate":null},{"id":24,"title":"Stacking tolerance to drought and resistance to a parasitic weed in tropical hybrid maize for enhancing resilience to stress combinations","authors":"Menkir, A.; Crossa, J.; Meseka, S.; Bossey, B.; Muhyideen, O.; Riberio, P.F.; Coulibaly, M.; Yacoubou, A.B.; Olaoye, G.; Haruna, A.","collection":"CGIAR Research Programme on Maize (CIMMYT)","abstract":"Maize is a food security crop cultivated in the African savannas that are vulnerable to the occurrence of drought stress and Striga hermonthica infestation. The co-occurrence of these stresses can severely damage crop growth and productivity of maize. Until recently, maize breeding in International Institute of Tropical Agriculture (IITA) has focused on the development of either drought tolerant or S. hermonthica resistant germplasm using independent screening protocols. The present study was therefore conducted to examine the extent to which maize hybrids simultaneously expressing resistance to S. hermonthica and tolerance to drought (DTSTR) could be developed through sequential selection of parental lines using the two screening protocols. Regional trials involving 77 DTSTR and 22 commercial benchmark hybrids (STR and non-DTSTR) were then conducted under Striga-infested and non-infested conditions, managed drought stress and fully irrigated conditions as well as in multiple rainfed environments for 5 years. The observed yield reductions of 61% under managed drought stress and 23% under Striga-infestation created desirable stress levels leading to the detection of significant differences in grain yield among hybrids at individual stress and non-stress conditions. On average, the DTSTR hybrids out-yielded the STR and non-DTSTR commercial hybrids by 13–19% under managed drought stress and fully irrigated conditions and by −4 to 70% under Striga-infested and non-infested conditions. Among the DTSTR hybrids included in the regional trials, 33 were high yielders with better adaptability across environments under all stressful and non-stressful testing conditions. Twenty-four of the 33 DTSTR hybrids also yielded well across diverse rainfed environments. The genetic correlations of grain yield under managed drought stress with yield under Striga-infestation and multiple rainfed environments were 0.51 and 0.57, respectively. Also, a genetic correlation between yields under Striga-infestation with that recorded in multiple rainfed environments was 0.58. These results suggest that the sequential selection scheme offers an opportunity to accumulate desirable stress-related traits in parents contributing to superior agronomic performance in hybrids across stressful and diverse rainfed field environments that are commonly encountered in the tropical savannas of Africa.","semantic_score":0.5616,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['protocol']","coherence_flag":null,"trl_estimate":null},{"id":25,"title":"Mitigating Striga hermonthica parasitism and damage in maize using soybean rotation, nitrogen application, and Striga-resistant varieties in the Nigerian savannas","authors":"Kamara, A.; Menkir, A.; Chikoye, David; Tofa, A.I.; Fagge, A.A.; Dahiru, R.; Solomon, R.; Ademulegun, T.; Omoigui, L.; Aliyu, K.T.; Kamai, N.","collection":"CGIAR Research Programme on Maize (CIMMYT)","abstract":"Striga hermonthica infestation causes significant losses of maize yield in the Nigerian savannas and several technologies have been developed and promoted to control Striga in maize. However, since no single technology has been found to be effective against Striga, integrated management is needed to achieve satisfactory and sustainable Striga control. Both on-station and on-farm trials were undertaken from 2013 to 2015 in Bauchi and Kano States of Nigeria to evaluate the performance of integrated Striga control technologies. In the on-station trials, a soybean–maize rotation did not suppress Striga in maize in either location. However, nitrogen application suppressed and reduced Striga infection, except in Bauchi in 2014. The soybean–maize rotation accompanied by N application reduced Striga damage in both locations. On farmers’ fields, rotating soybean with maize significantly reduced Striga infection. At the same time, the use of maize varieties with a combined tolerance to drought and resistance to Striga parasitism also increased maize grain yield on farmers’ fields, probably due to three factors: a reduction in Striga infection, reduced effects of a mid-season moisture deficit, and increased uptake of nutrients from the soil. We concluded that the use of Striga-resistant maize varieties in combination with the application of N fertilizer and rotation with soybean could increase the productivity of maize in Striga-infested fields in the Nigerian savannas.","semantic_score":0.3684,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['application']","coherence_flag":null,"trl_estimate":null},{"id":26,"title":"Cassava breeding and cultivation challenges in Thailand: Past, present, and future perspectives","authors":"Kongsil, Pasajee; Ceballos, Hernan; Siriwan, Wanwisa; Vuttipongchaikij, Supachai; Kittipadakul, Piya; Phumichai, Chalermpol; Wannarat, Wannasiri; Kositratana, Wichai; Vichukit, Vichan; Sarobol, Ed; Rojanaridpiched, Chareinsak","collection":"CGIAR","abstract":"Cassava (Manihot esculenta Crantz) was introduced to Southeast Asia in the 16th–17th centuries and has since flourished as an industrial crop. Since the 1980s, Thailand has emerged as the leading producer and exporter of cassava products. This growth coincided with the initiation of cassava breeding programs in collaboration with the International Center for Tropical Agriculture (CIAT), focusing on root yield and starch production. The success of Thai cassava breeding programs can be attributed to the incorporation of valuable genetic diversity from international germplasm resources to cross with the local landraces, which has become the genetic foundation of many Thai commercial varieties. Effective evaluation under diverse environmental conditions has led to the release of varieties with high yield stability. A notable success is the development of Kasetsart 50. However, extreme climate change poses significant challenges, including abiotic and biotic stresses that threaten cassava root yield and starch content, leading to a potential decline in starch-based industries. Future directions for cassava breeding must include hybrid development, marker-assisted recurrent breeding, and gene editing, along with high-throughput phenotyping and flower induction. These strategies are essential to achieve breeding objectives focused on drought tolerance and disease resistance, especially for CMD and CBSD.","semantic_score":0.4914,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['none']","coherence_flag":null,"trl_estimate":null},{"id":27,"title":"Yield and Response of Bean Breeding Lines for Drought Tolerance to Field Diseases","authors":"Amongi, Winnyfred; Mukankusi, Clare Mugisha; Sebuliba, Sulaiman; Nakyanzi, Brenda; Naluwooza, Claire; Baguma, Gerald","collection":"Canadian Center of Science and Education","abstract":"Climate change has resulted in an increase in the intensity of droughts and rains, and higher temperatures which\r\nare adversely affecting crop production in Africa. It has also influenced the distribution and increased the occurrence of disease and pest epidemics. Common bean (Phaseolus vulgaris L.) is especially sensitive to these changes. Most released varieties are not well adapted to environmental extremes and extended periods of drought in particular has become a major constraint. In this study, 462 advanced breeding lines developed for drought tolerance were evaluated for yield, agronomic traits and disease response in two contrasting agro-ecologies, Kawanda in the Lake Victoria crescent and Kachwekano in the southwestern highlands. Analysis of variance indicated significant differences (P < 0.05) among lines for most variables and environments (P <0.001). Performance was better at Kachwekano than Kawanda with mean yields ranging from 928 to 2251 kg ha-1, and 698 to 2036 kg ha-1 respectively. Angular leafspot, common bacterial blight and rust diseases varied between locations, and among lines with no visible to sever symptoms. Based on Wricke’s ecovalence estimates for stability, SCN20, SCN13, SEN114, SEC40 and SEC35 expressed yield stability and superiority. Of the 462 lines, 6.3 % maintained >1500 kg ha-1, the minimum anticipated commercial yield of new varieties, in all the trials, both seasons and in each year; 5.0 % also maintained above average yields. The most outstanding (1629-3944 kg ha-1) were; DAB299, DAB291, DAB234, DAD34, DAB478, DAB487, DAB543, DAB231, SCN20, SCR66, SCR60, and SER335. These are recommended for development of new varieties.","semantic_score":0.5361,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['none']","coherence_flag":null,"trl_estimate":null},{"id":28,"title":"Participatory crop breeding reaps benefits for Eritrea","authors":"Grando, Stefania","collection":"CGIAR","abstract":"Few countries are in such acute need of agricultural\r\ndevelopment as Eritrea,a nation plagued by recurring\r\ndrought.Its soils are largely parched and\r\nunproductive,leading to chronic hunger and poverty for\r\nmany of its people.Increasing the water productivity of\r\nthe country ’s most widely grown crops is a priority for\r\ngovernment and national researchers.\r\nA CPWF project is building on previous work in this\r\nfield to do just that.Its focus is the Setit-Tekeze River\r\nBasin in the western corner of Eritrea.(This is also\r\ncalled the Atbara Basin,Atbara being the name for the\r\nTekeze Riveras it winds through Sudan before joining\r\nthe Nile).\r\nThe project,“Improving water productivity of\r\ncereals and food legumes in the Atbara River\r\nBasin of Eritrea ”,aims to develop and disseminate\r\nvarieties of barley,wheat,chickpea,lentil,faba\r\nbean, cowpea and grass pea that combine\r\ndrought tolerance with good nutritional characteristics\r\nand resistance to diseases and pests.It is\r\nalso exploring optimum blends for mixed\r\ncropping,a risk avoidance strategy that mitigates\r\nagainst the worst effects of drought.","semantic_score":0.4301,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['none']","coherence_flag":null,"trl_estimate":null},{"id":29,"title":"Evaluation of early-generation tropical maize testcrosses for grain-yield potential and weevil (Sitophilus zeamais Motschulsky) resistance","authors":"Sserumaga, Julius P.; Makumbi, Dan; Oikeh, Sylvester O.; Otim, Michael; Machida, Lewis; Anani, Bruce Y.; Nhamucho, Egas; Beyene, Yoseph; Mugo, Stephen","collection":"CGIAR Research Programme on Maize (CIMMYT)","abstract":"Smallholder maize farmers in Africa experience pre- and post-harvest production stresses either individually or in combination at different stages of the crop cycle. The maize weevil is among the major post-harvest storage pests. A strategy to address this problem is to develop and promote high yielding maize germplasm with resistance to multiple stresses. A study was conducted to: 1) assess yield and agronomic performance of testcross hybrids developed from early generation lines; and 2) assess the response of the testcross hybrids to infestation with Sitophilus zeamais. Fifty-eight drought-tolerant testcross hybrids were evaluated for agronomic performance and weevil resistance at four environments in Uganda in 2016. Hybrid G39 (L2/T2) had the best grain yield performance; it significantly out-performed the best check by 11.4% in all environments. Hybrid grain from field trials was subjected to Sitophilus zeamais infestation in a choice and no choice test under laboratory conditions. Hybrids G56 (L49/T2) and G58 (L51/T2) had the least weevil damage and were rated as resistant to Sitophilus zeamais. The numbers of damaged kernels, number of exit holes and ear aspect were positively correlated with the grain weight loss. The results suggest possibilities for simultaneous selection for high grain yield and storage insect pest resistance among drought-tolerant genotypes. Use of high-yielding and resistant maize hybrids to storage insect pest should be promoted for increased maize production and managing post-harvest losses due to the maize weevil in smallholder farming communities in Africa.","semantic_score":0.4347,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['none']","coherence_flag":null,"trl_estimate":null},{"id":30,"title":"Farmers' adoption of newly released climate-resilient rice varieties in the coastal ecosystem of Bangladesh: Effectiveness of a head-to-head adaptive trial","authors":"Akter, Tahmina; Afrad, Md. Safiul Islam; Habib, Muhammad Ashraful; Zhang, Yating; Sarkar, Md Abdur Rouf; Nayak, Swati; Qin, Xiaodi; McKenzie, Andrew M.; Kamal, Mohammed Zia Uddin","collection":"CGIAR","abstract":"The adoption of newly released rice varieties in Bangladesh remains slow, particularly in coastal ecosystems, where multiple stressors reduce productivity. Limited knowledge transfer on climate‐resilient varieties has led farmers to favor traditional cultivars over newer ones. Head‐to‐Head Adaptive Trials (HHATs) were introduced to promote the dissemination of improved varieties, but their effectiveness has not been fully assessed. This study evaluates farmers' trait preferences, varietal selection criteria, adoption patterns, key determinants, and the impact of HHATs on varietal adoption in coastal Bangladesh. HHATs were conducted in 2021–2022 and 2022–2023, with data collected from April to June 2023. Using purposive sampling, 50 participant farmers were selected, while 150 neighboring farmers were systematically sampled based on geographic proximity. Findings indicate that yield, taste, and resilience to salinity and drought were the most important traits influencing varietal selection. While farmers valued the superior grain quality and resilience of newer varieties, concerns over yield consistency and climate adaptability led many to continue adopting older varieties. HHATs created spillover effects, encouraging broader adoption among neighboring farmers. Education, farming as a primary occupation, income, commercial farming, extension services, training, social networks, seed access, grain quality, varietal resilience, and market price significantly influenced adoption, while age, low soil fertility, high input costs, and large landholdings were barriers. Propensity score matching analysis confirmed that HHATs increased adoption rates by 11.25%–17.71%, though limited seed distribution hindered widespread adoption. The study highlights the need for targeted policy measures to enhance seed access, extension services, and farmer support to scale up the adoption of climate‐resilient rice varieties.","semantic_score":0.5664,"commercial_score":2,"reasoning":"Excluded by pre-screening.","invention_description":"Excluded — not an invention candidate.","org_types":[],"disclosure":null,"topic":"excluded","excluded_reason":"Too few invention signals — only found: ['system']","coherence_flag":null,"trl_estimate":null},{"id":31,"title":"Genetic trends in CIMMYT’s tropical maize breeding pipelines","authors":"Boddupalli, P.M.; Burgueño, Juan; Beyene, Yoseph; Makumbi, Dan; Asea, Godfrey; Woyengo, Vincent; Amsal Tesfaye Tarekegne; Magorokosho, Cosmos; Dagne Wegary Gissa; Thokozile Ndhlela; Zaman-Allah, Mainassara; Matova, Prince M.; Mwansa, Kabamba; Mashingaidze, Kingstone; Fato, Pedro; Chere, Adefris Teklewold; Vivek, Bindiganavile Sampath; Zaidi, Pervez Haider; Vinayan, Madhumal Thayil; Patne, Nagesh; Rakshit, Sujay; Kumar, Ramesh; Jat, Shankar Lal; Singh, Shyam Bir; Kuchanur, Prakash H.; Lohithaswa, H. Chandappa; Singh, Narendra K.; Koirala, Keshab Babu; Ahmed, Salahuddin; San Vicente, Felix M.; Dhliwayo, Thanda; Cairns, Jill E.","collection":"CGIAR Research Programme on Maize (CIMMYT)","abstract":"Fostering a culture of continuous improvement through regular monitoring of genetic trends in breeding pipelines is essential to improve efficiency and increase accountability. This is the first global study to estimate genetic trends across the International Maize and Wheat Improvement Center (CIMMYT) tropical maize breeding pipelines in eastern and southern Africa (ESA), South Asia, and Latin America over the past decade. Data from a total of 4152 advanced breeding trials and 34,813 entries, conducted at 1331 locations in 28 countries globally, were used for this study. Genetic
