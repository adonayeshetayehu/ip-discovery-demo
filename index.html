 determinable from abstract alone.","commercial_applications":"- Mobile Application available for commercial licensing, deployed to agri-advisory platforms and extension services serving smallholder farmers in smallholder farming systems in LMICs\n- Embedded analytics module for agri-fintech, crop insurance, and digital extension platforms requiring wheat management recommendations\n- Licensed to national wheat programmes and NARS partners as a low-cost calibration and optimisation tool, already piloted across smallholder farming systems in LMICs","licensing_model":"Open-source core licence (e.g. MIT or Apache 2.0) consistent with CGIAR open-access obligations; commercial SaaS or embedded-module licence for enterprise deployments. Free access maintained for public research institutions and smallholder-focused NGOs.","trl_estimate":"Prototype (TRL 4-6)","ip_risk_flags":"Prior art risk — published 2024; US 12-month grace period has expired. EPO/most jurisdictions apply immediate novelty bars. Verify whether a patent application was filed before or within 12 months of publication.\nSoftware/data tool — check CGIAR open-access licensing obligations\nSingle-location validation only — TRL may be overstated","legal_disclaimer":"MACHINE-GENERATED DRAFT — For internal screening only. Not validated by IP counsel. Not for external distribution without author confirmation and legal review.","inventor_names":"Kheir, Ahmed M.S.; Govind, Ajit; Nangia, Vinay; Devkota Wasti, Mina Kumari; Elnashar, Abdelrazek; Omar, Mohie; Feike, Til","institutional_affiliation":"CGIAR","first_public_disclosure":"2024 (journal publication date — verify submission date for priority claim)","funding_source":"Not identified in abstract — requires manual completion before any IP filing","tto_contact":"Centre affiliation unclear from metadata — contact the corresponding author directly or email cgiar-ip@cgiar.org for routing assistance"},"topic":"model","excluded_reason":null,"coherence_flag":true,"trl_estimate":"Prototype (TRL 4-6)"},{"id":68,"title":"Comparison of sequencing-based and array-based genotyping platforms for genomic prediction of maize hybrid performance","authors":"Yu, Guangning; Cui, Yanru; Jiao, Yuxin; Zhou, Kai; Xin Wang; Yang, Wenyan; Xu, Yiyi; Yang, Kun; Zhang, Xuecai; Pengcheng Li; Zefeng Yang; Yang Xu; Chenwu Xu","collection":"CGIAR","abstract":"Genomic selection (GS) is a powerful tool for improving genetic gain in maize breeding. However, its routine application in large-scale breeding pipelines is limited by the high cost of genotyping platforms. Although sequencing-based and array-based genotyping platforms have been used for GS, few studies have compared prediction performance among platforms. In this study, we evaluated the predictabilities of four agronomic traits in 305 maize hybrids derived from 149 parental lines subjected to genotyping by sequencing (GBS), a 40K SNP array, and target sequence capture (TSC) using eight GS models. The GBS marker dataset yielded the highest predictabilities for all traits, followed by TSC and SNP array datasets. We investigated the effect of marker density and statistical models on predictability among genotyping platforms and found that 1K SNPs were sufficient to achieve comparable predictabilities to 10K and all SNPs, and BayesB, GBLUP, and RKHS performed well, while XGBoost performed poorly in most cases. We also selected significant SNP subsets using genome-wide association study (GWAS) analyses in three panels to predict hybrid performance. GWAS facilitated selecting effective SNP subsets for GS and thus reduced genotyping cost, but depended heavily on the GWAS panel. We conclude that there is still room for optimization of the existing SNP array, and using genotyping by target sequencing (GBTS) techniques to integrate a few functional markers identified by GWAS into the 1K SNP array holds great promise of being an effective strategy for developing desirable GS breeding arrays.","year":"2023","semantic_score":0.6508,"commercial_score":6,"reasoning":"Applied tool or model with identifiable industry interest — commercial pathway requires packaging and broader validation.","invention_description":"We investigated the effect of marker density and statistical models on predictability among genotyping platforms and found that 1K SNPs were sufficient to achieve comparable predictabilities to 10K and all SNPs, and BayesB, GBLUP, and RKHS performed well, while XGBoost performed poorly in most cases","org_types":["Agri-advisory platform companies","Precision agriculture software vendors","Development finance institutions requiring decision-support tools"],"disclosure":null,"topic":"software","excluded_reason":null,"coherence_flag":true,"trl_estimate":"Concept (TRL 1-3)"},{"id":69,"title":"Sensitive detection of Xanthomonas oryzae Pathovars oryzae and oryzicola by loop-mediated isothermal amplification","authors":"Lang, Jillian M.; Langlois, Paul; Nguyen, Marian Hanna R.; Triplett, Lindsay R.; Purdie, Laura; Holton, Timothy A.; Djikeng, Appolinaire; Vera Cruz, Casiana M.; Verdier, Valérie; Leach, Jan E.","collection":"CGIAR","abstract":"Molecular diagnostics for crop diseases can enhance food security by enabling the rapid identification of threatening pathogens and providing critical information for the deployment of disease management strategies. Loop-mediated isothermal amplification (LAMP) is a PCR-based tool that allows the rapid, highly specific amplification of target DNA sequences at a single temperature and is thus ideal for field-level diagnosis of plant diseases. We developed primers highly specific for two globally important rice pathogens, Xanthomonas oryzae pv. oryzae, the causal agent of bacterial blight (BB) disease, and X. oryzae pv. oryzicola, the causal agent of bacterial leaf streak disease (BLS), for use in reliable, sensitive LAMP assays. In addition to pathovar distinction, two assays that differentiate X. oryzae pv. oryzae by African or Asian lineage were developed. Using these LAMP primer sets, the presence of each pathogen was detected from DNA and bacterial cells, as well as leaf and seed samples. Thresholds of detection for all assays were consistently 10 4 to 10 5 CFU ml −1 , while genomic DNA thresholds were between 1 pg and 10 fg. Use of the unique sequences combined with the LAMP assay provides a sensitive, accurate, rapid, simple, and inexpensive protocol to detect both BB and BLS pathogens.","year":"2014","semantic_score":0.6443,"commercial_score":6,"reasoning":"Plausible detection methodology — commercial pathway exists but broader multi-context validation needed before licensing.","invention_description":"Use of the unique sequences combined with the LAMP assay provides a sensitive, accurate, rapid, simple, and inexpensive protocol to detect both BB and BLS pathogens.","org_types":["Agri-diagnostic kit manufacturers","Plant health regulatory agencies","AgriTech startups"],"disclosure":null,"topic":"detection","excluded_reason":null,"coherence_flag":true,"trl_estimate":"Concept (TRL 1-3)"},{"id":70,"title":"Advances and prospects of genomic-assisted breeding in roots, tubers, and banana crops","authors":"Agre, A.P.; Uwimana, B.; Mbanjo, E.G.N.; Ferguson, M.; Bhattacharjee, R.; Nyine, M.; Banda, V.; Peteti, P.; Mouritala, S.; Kayondo, S.I.; Amah, D.; Kolombia, Y.; Batte, M.; Tripathi, J.N.; Nakoto, V.; Shah, T.; Swennen, R.; Asfaw, A.; Rabbi, I.Y.; Tripathi, L.; Mushoriwa, H.","collection":"CGIAR Research Programme on Roots, Tubers and Bananas","abstract":"Roots, Tubers, and Bananas (RTB), including banana and plantain, cassava, yam, sweetpotato, and potato crops, share several defining features that set them apart from cereals and legumes. They are essential for food and nutritional security for hundreds of millions of people, especially in developing countries. Despite their significance, RTB crop breeding has lagged due to the complexity of genetics and the use of vegetative propagation. Recent advancements in genomics-assisted breeding (GAB) offer opportunities to accelerate genetic gains. This review provides an updated synthesis of genomic tools and associated strategies applied in RTB breeding, with a focus on banana and plantain, cassava, and yam. It spans the recent development and application of genomic tools, from diversity studies and trait discovery to marker-assisted selection, genomic selection, pan-genomics, and gene editing. It also highlights the efforts to modernize RTB breeding through program optimization and digital tool integration. The review concludes by suggesting future directions for sustainable impact.","year":"2026","semantic_score":0.6437,"commercial_score":6,"reasoning":"Applied tool or model with identifiable industry interest — commercial pathway requires packaging and broader validation.","invention_description":"It spans the recent development and application of genomic tools, from diversity studies and trait discovery to marker-assisted selection, genomic selection, pan-genomics, and gene editing.","org_types":["Agri-advisory platform companies","Precision agriculture software vendors","Development finance institutions requiring decision-support tools"],"disclosure":null,"topic":"software","excluded_reason":null,"coherence_flag":true,"trl_estimate":"Concept (TRL 1-3)"},{"id":71,"title":"Response to early generation genomic selection for yield in wheat","authors":"Bonnett, David G.; Yongle Li; Crossa, José; Dreisigacker, Susanne; Basnet, Bhoja Raj; Pérez Rodriguez, Paulino; Alvarado Beltrán, Gregorio; Jannink, Jean-Luc; Poland, Jesse A.; Sorrells, Mark Earl","collection":"CGIAR","abstract":"We investigated increasing genetic gain for grain yield using early generation genomic selection (GS). A training set of 1,334 elite wheat breeding lines tested over three field seasons was used to generate Genomic Estimated Breeding Values (GEBVs) for grain yield under irrigated conditions applying markers and three different prediction methods: (1) Genomic Best Linear Unbiased Predictor (GBLUP), (2) GBLUP with the imputation of missing genotypic data by Ridge Regression BLUP (rrGBLUP_imp), and (3) Reproducing Kernel Hilbert Space (RKHS) a.k.a. Gaussian Kernel (GK). F2 GEBVs were generated for 1,924 individuals from 38 biparental cross populations between 21 parents selected from the training set. Results showed that F2 GEBVs from the different methods were not correlated. Experiment 1 consisted of selecting F2s with the highest average GEBVs and advancing them to form genomically selected bulks and make intercross populations aiming to combine favorable alleles for yield. F4:6 lines were derived from genomically selected bulks, intercrosses, and conventional breeding methods with similar numbers from each. Results of field-testing for Experiment 1 did not find any difference in yield with genomic compared to conventional selection. Experiment 2 compared the predictive ability of the different GEBV calculation methods in F2 using a set of single plant-derived F2:4 lines from randomly selected F2 plants. Grain yield results from Experiment 2 showed a significant positive correlation between observed yields of F2:4 lines and predicted yield GEBVs of F2 single plants from GK (the predictive ability of 0.248, P < 0.001) and GBLUP (0.195, P < 0.01) but no correlation with rrGBLUP_imp. Results demonstrate the potential for the application of GS in early generations of wheat breeding and the importance of using the appropriate statistical model for GEBV calculation, which may not be the same as the best model for inbreds.","year":"2022","semantic_score":0.636,"commercial_score":5,"reasoning":"Early-stage or context-specific research — near-term licensing unlikely without further applied development and validation.","invention_description":"Grain yield results from Experiment 2 showed a significant positive correlation between observed yields of F2:4 lines and predicted yield GEBVs of F2 single plants from GK (the predictive ability of 0.248, P < 0.001) and GBLUP (0.195, P < 0.01) but no correlation with rrGBLUP_imp.","org_types":["Precision agriculture platforms","Crop insurance underwriters","National extension and early-warning services"],"disclosure":null,"topic":"model","excluded_reason":null,"coherence_flag":true,"trl_estimate":"Concept (TRL 1-3)"},{"id":72,"title":"Role of microbes in plant protection using intersection of nanotechnology and biology","authors":"Kaushal, M.","collection":"CGIAR Research Programme on Roots, Tubers and Bananas","abstract":"Plant pathogens are one of the dominating components which restrain crop productivity. Preliminary step headed for managing plant disease is to accurately recognize the pathogen under lab, glasshouse, and field conditions. Modern approach, such as culture-based, antibody-based rapid methods and quantitative polymerase chain reaction (Q-PCR), entrusts on multiple assays to precisely identify the specific plant pathogens which are further time-consuming and lack high sensitivity. Nanobiotechnology ameliorates crop productivity through transmission of genes to target sites for breeding of varieties resistant to different plant pathogens with focus on improving sensitivity. Intersection of nanotechnology and biology also improves specificity and agility of pathogen detection which further facilitates crop disease management. Bio-fabrication of nanoparticles like silver (Ag) and copper (Cu) is used as novel antimicrobials for the management of pathogenic microorganisms that inhibits fungal hyphae and conidial germination in agricultural crops. Biological agents reduce metal which leads to capping of nanoparticles through the secretion of various enzymes. A modern class of protein nanocompartments called as encapsulins that encapsulate cargo proteins are found in bacteria and archaea. Nanobiotechnology also reduces detection times of crop pathogens and cost by the development of biosensors and phage proteins. In this chapter we emphasize on microbial semblance in nanobiotechnology applications that precede to integrated disease management of agricultural crops including precise diagnostic layout of plant diseases and modification of crop environments to adversely affect crop pathogens.","year":"2018","semantic_score":0.6143,"commercial_score":7,"reasoning":"Plausible detection methodology — commercial pathway exists but broader multi-context validation needed before licensing.","invention_description":"Nanobiotechnology also reduces detection times of crop pathogens and cost by the development of biosensors and phage proteins.","org_types":["Agri-diagnostic kit manufacturers","Plant health regulatory agencies","AgriTech startups"],"disclosure":null,"topic":"detection","excluded_reason":null,"coherence_flag":true,"trl_estimate":"Prototype (TRL 4-6)"},{"id":73,"title":"Innovative digital technologies to monitor and control pest and disease threats in Root, Tuber, and Banana (RT&B) cropping systems: progress and prospects","authors":"Kreuze, Jan F.; Adewopo, Julius; Selvaraj, Michael; Mwanzia, Leroy; Kumar, P. Lava; Cuéllar, Wilmer Jose; Legg, James P.; Hughes, D.P.; Blomme, Guy","collection":"CGIAR Research Programme on Maize (CIMMYT)","abstract":"This chapter provides the first comprehensive review of digital tools and technologies available for the identification, monitoring, and control of pests and diseases, with an emphasis on root, tuber, and banana (RT&B) crops. These tools include systems based on identification keys, human and artificial intelligence-based identification based on smart applications, web interfaces, short messages services (SMS), or combinations thereof. We also present ideas on the use of image recognition from smartphones or unmanned aerial vehicles (UAVs) for pest and disease monitoring and data processing for modeling, predictions, and forecasting regarding climate change. These topics will be presented in the context of their current\ndevelopment and future potential but also the challenges, limitations, and innovative approaches taken to reach end users, particularly smallholder farmers, and achieve impacts at scale. Finally, the scope and limitation of private sector involvement demonstrates the need of publicly funded initiatives to maximize sharing of data and resources to ensure sustainability of unbiased advice to farmers through information and communication technology (ICT) systems.","year":"2022","semantic_score":0.6137,"commercial_score":5,"reasoning":"Early-stage or context-specific research — near-term licensing unlikely without further applied development and validation.","invention_description":"These topics will be presented in the context of their current\ndevelopment and future potential but also the challenges, limitations, and innovative approaches taken to reach end users, particularly smallholder farmers, and achieve impacts at scale.","org_types":["Agricultural research institutes","Development finance institutions","Government agriculture ministries"],"disclosure":null,"topic":"general","excluded_reason":null,"coherence_flag":true,"trl_estimate":"Concept (TRL 1-3)"},{"id":74,"title":"Genomic resources for water yam (Dioscorea alata L.): analyses of EST sequences, De Novo sequencing and GBS libraries","authors":"Saski, C.A.; Bhattacharjee, Ranjana; Scheffler, Brian E.; Asiedu, Robert","collection":"CGIAR Research Programme on Roots, Tubers and Bananas","abstract":"The reducing cost and rapid progress in next-generation sequencing techniques coupled with high performance computational approaches have resulted in large-scale discovery of advanced genomic resources in several model and non-model plant species. Yam (Dioscorea spp.) is a major food and cash crop in many countries but research efforts have been limited to understand the genetics and generate genomic information for the crop. The availability of a large number of genomic resources including genome-wide molecular markers will accelerate the breeding efforts and application of genomic selection in yams. In the present study, several methods including expressed sequence tags (EST)-sequencing, de novo sequencing, and genotyping-by-sequencing (GBS) profiles on two yam (Dioscorea alata L.) genotypes (TDa 95/00328 and TDa 95-310) was performed to generate genomic resources for use in its improvement programs. This includes a comprehensive set of EST-SSRs, genomic SSRs, whole genome SNPs, and reduced representation SNPs. A total of 1,152 EST-SSRs were developed from >40,000 EST-sequences generated from the two genotypes. A set of 388 EST-SSRs were validated as polymorphic showing a polymorphism rate of 34% when tested on two diverse parents targeted for anthracnose disease. In addition, approximately 40X de novo whole genome sequence coverage was generated for each of the two genotypes, and a total of 18,584 and 15,952 genomic SSRs were identified for TDa 95/00328 and TDa 95-310, respectively. A custom made pipeline resulted in the selection of 573 genomic SSRs common across the two genotypes, of which only eight failed, 478 being polymorphic and 62 monomorphic indicating a polymorphic rate of 83.5%. Additionally, 288,505 high quality SNPs were also identified between these two genotypes. Genotyping by sequencing reads on these two genotypes also revealed 36,790 overlapping SNP positions that are distributed throughout the genome. Our efforts in using different approaches in generating genomic resources provides a non-biased glimpse into the publicly available EST-sequences, yam genome, and GBS profiles with affirmation that the genomic complexity can be methodically unraveled and constitute a critical foundation for future studies in linkage mapping, germplasm analysis, and predictive breeding.","year":"2015","semantic_score":0.6133,"commercial_score":5,"reasoning":"Early-stage or context-specific research — near-term licensing unlikely without further applied development and validation.","invention_description":"A custom made pipeline resulted in the selection of 573 genomic SSRs common across the two genotypes, of which only eight failed, 478 being polymorphic and 62 monomorphic indicating a polymorphic rate of 83.5%.","org_types":["Agricultural research institutes","Development finance institutions","Government agriculture ministries"],"disclosure":null,"topic":"general","excluded_reason":null,"coherence_flag":true,"trl_estimate":"Prototype (TRL 4-6)"},{"id":75,"title":"Genomic prediction from multi-environment trials of wheat breeding","authors":"Garcia Barrios, Guillermo; Crespo Herrera, Leonardo A.; Cruz-Izquierdo, Serafín; Vitale, Paolo; Sandoval-Islas, José Sergio; Gerard, Guillermo Sebastián; Aguilar Rincón, Víctor Heber; Corona-Torres, Tarsicio; Crossa, José; Pacheco Gil, Rosa Angela","collection":"CGIAR","abstract":"Genomic prediction relates a set of markers to variability in observed phenotypes of cultivars and allows for the prediction of phenotypes or breeding values of genotypes on unobserved individuals. Most genomic prediction approaches predict breeding values based solely on additive effects. However, the economic value of wheat lines is not only influenced by their additive component but also encompasses a non-additive part (e.g., additive x additive epistasis interaction). In this study, genomic prediction models were implemented in three target populations of environments (TPE) in South Asia. Four models that incorporate genotype x environment interaction (G x E) and genotype x genotype (GG) were tested: Factor Analytic (FA), FA with genomic relationship matrix (FA + G), FA with epistatic relationship matrix (FA + GG), and FA with both genomic and epistatic relationship matrices (FA + G + GG). Results show that the FA + G and FA + G + GG models displayed the best and a similar performance across all tests, leading us to infer that the FA + G model effectively captures certain epistatic effects. The wheat lines tested in sites in different TPE were predicted with different precisions depending on the cross-validation employed. In general, the best prediction accuracy was obtained when some lines were observed in some sites of particular TPEs and the worse genomic prediction was observed when wheat lines were never observed in any site of one TPE.","year":"2024","semantic_score":0.6113,"commercial_score":4,"reasoning":"Early-stage or context-specific research — near-term licensing unlikely without further applied development and validation.","invention_description":"Results show that the FA + G and FA + G + GG models displayed the best and a similar performance across all tests, leading us to infer that the FA + G model effectively captures certain epistatic effects.","org_types":["Agricultural research institutes","Development finance institutions","Government agriculture ministries"],"disclosure":null,"topic":"general","excluded_reason":null,"coherence_flag":true,"trl_estimate":"Concept (TRL 1-3)"},{"id":76,"title":"Hybridization of process-based models, remote sensing, and machine learning for enhanced spatial predictions of wheat yield and quality","authors":"Kheir, Ahmed M.S.; Govind, Ajit; Nangia, Vinay; El-Maghraby, Maher A.; Elnashar, Abdelrazek; Ahmed, Mukhtar; Aboelsoud, Hesham; Mostafa, Rania; Feike, Til","collection":"CGIAR","abstract":"Ensuring accurate predictions of wheat yield and nutritional content is vital for enhancing agricultural pro\nductivity and food security. This study aims to improve wheat yield prediction by integrating process-based \nmodels (PBM), machine learning (ML), and remote sensing (RS) techniques. Three Decision Support System \nfor Agrotechnology Transfer (DSSAT) wheat models were calibrated and evaluated using field data from three \nwheat cultivars grown over three seasons in diverse environments. We developed a hybrid PBM-ML-RS approach \nusing polynomial regression to generate iron (Fe) and zinc (Zn) content from nitrogen predictions. The DSSAT \nwheat models slightly overestimated wheat yield but accurately predicted nitrogen content. The hybrid PBM-ML- \nRS approach closely estimated Fe and Zn content with a root mean square error (RMSE) of 0.42 t/ha for yield and \n0.89 % for nitrogen content. The integration of ML and RS improved the prediction accuracy for Fe and Zn, \nachieving RMSE values of 0.35 % and 0.28 % respectively. Spatial simulations provided detailed geographic \nestimations of wheat yield and nutrient content, supporting site-specific management practices. This study \ndemonstrates the potential of combining PBM, ML, and RS for comprehensive yield and nutrition prediction. The \nf\n indings indicate a modest decrease in protein, Fe, and Zn concentrations with increasing grain yield, exhibiting \nhigh variability across different sites and cultivars. Future research should integrate additional data sources to \nenhance model robustness and applicability to other crops and regions, contributing to sustainable agriculture \nand food security.","year":"2025","semantic_score":0.6104,"commercial_score":6,"reasoning":"Applied tool or model with identifiable industry interest — commercial pathway requires packaging and broader validation.","invention_description":"The integration of ML and RS improved the prediction accuracy for Fe and Zn, \nachieving RMSE values of 0.35 % and 0.28 % respectively.","org_types":["Precision agriculture platforms","Crop insurance underwriters","National extension and early-warning services"],"disclosure":null,"topic":"model","excluded_reason":null,"coherence_flag":true,"trl_estimate":"Concept (TRL 1-3)"},{"id":77,"title":"Estimating genetic gains for tolerance to stress combinations in tropical maize hybrids","authors":"Menkir, A.; Dieng, I.; Meseka, S.K.; Bossey, B.; Mengesha, W.; Muhyideen, O.; Riberio, P.F.; Coulibaly, M.; Yacoubou, A.M.; Bankole, F.A.; Adu, G.B.; Ojo, T.","collection":"CGIAR Research Programme on Maize (CIMMYT)","abstract":"Maize is a strategic food crop in sub-Saharan Africa. However, most maize growing tropical savannas particularly in West and Central African experience the occurrence of frequent droughts and Striga infestation, resulting in 30–100% yield losses. This production zones need maize cultivars that combine tolerance to the two stresses. IITA in collaboration with national partners has thus employed a sequential selection scheme to incorporate both drought tolerance and Striga resistance in topical maize hybrids using reliable screening protocols. The main objective of the present study was therefore to use grain yield and other agronomic traits recorded in regional collaborative hybrid trials conducted for 8 years under manged stressful and non-stressful conditions and across rainfed field environments to estimate genetic gains in grain yields using mixed model analyses. The results showed significant (p < 0.05) annual yield gains of 11.89 kg ha−1 under manged drought stress (MDS) and 86.60 kg ha−1 under Striga infestation (STRIN) with concomitant yield increases of 62.65 kg ha−1 under full irrigation (WW), 102.44 kg ha−1 under Striga non-infested (STRNO) conditions and 53.11 kg ha−1 across rainfed field environments. Grain yield displayed significant but not strong genetic correlation of 0.41 ± 0.07 between MDS and STRIN, indicating that gene expression was not consistent across the two stress conditions. Furthermore, grain yield recorded in MET had significant moderate genetic correlations of 0.58 ± 0.06 and 0.44 ± 0.07It with MDS and STRIN, respectively. These results emphasize the need to screen inbred linens under both stress conditions to further enhance the rate of genetic gain in grain yield in hybrids for areas where the two stresses co-occur. Nonetheless, this study demonstrated that the sequential selection scheme has been successful in generating hybrids with dependable yields that can reduce chronic food deficits in rural communities experiencing simultaneous presence of drought and S. hermonthica infestation in their production fields.","year":"2022","semantic_score":0.6096,"commercial_score":4,"reasoning":"Early-stage or context-specific research — near-term licensing unlikely without further applied development and validation.","invention_description":"The results showed significant (p < 0.05) annual yield gains of 11.89 kg ha−1 under manged drought stress (MDS) and 86.60 kg ha−1 under Striga infestation (STRIN) with concomitant yield increases of 62.65 kg ha−1 under full irrigation (WW), 102.44 kg ha−1 under Striga non-infested (STRNO) conditions","org_types":["Agricultural research institutes","Development finance institutions","Government agriculture ministries"],"disclosure":null,"topic":"general","excluded_reason":null,"coherence_flag":true,"trl_estimate":"Concept (TRL 1-3)"},{"id":78,"title":"Development of two loop-mediated isothermal amplification (LAMP) genomics-informed diagnostic protocols for rapid detection of Pantoea species on rice","authors":"Kini, K.; Wonni, I.; Silué, D.; Koebnik, R.","collection":"CGIAR","abstract":"At least three species of Pantoea are responsible for bacterial blight disease and grain discoloration of rice in Sub-Saharan Africa. Thus, measures need to be taken to limit the pathogens' dispersion and robust diagnostic tools are required for rapid and cheap diagnosis in the field as well as for routine seed certification or control. Therefore, several diagnostic tools such as simplex and multiplex PCR schemes and a semi-selective medium have been developed and are being used. However, the use of these tools is time-consuming, expensive and therefore limited to laboratories that can afford the chemicals. We have therefore developed two isothermal loop amplification (LAMP) protocols, one of which detects all Pantoea species in the genus and another one that is specific for P. ananatis.\r\n•\r\nThe novel LAMP assays allow rapid and sensitive detection of these bacteria.\r\n\r\n•\r\nThey will help plant protection services in routine field and laboratory tests especially for monitoring the phytosanitary status of rice seeds.","year":"2021","semantic_score":0.608,"commercial_score":7,"reasoning":"Plausible detection methodology — commercial pathway exists but broader multi-context validation needed before licensing.","invention_description":"We have therefore developed two isothermal loop amplification (LAMP) protocols, one of which detects all Pantoea species in the genus and another one that is specific for P.","org_types":["Agri-diagnostic kit manufacturers","Plant health regulatory agencies","AgriTech startups"],"disclosure":null,"topic":"detection","excluded_reason":null,"coherence_flag":true,"trl_estimate":"Prototype (TRL 4-6)"},{"id":79,"title":"An integrated molecular and conventional breeding scheme for enhancing genetic gain in maize in Africa","authors":"Gedil, Melaku A; Menkir, A.","collection":"CGIAR Research Programme on Maize (CIMMYT)","abstract":"Maize production in West and Central Africa (WCA) is constrained by a wide range of interacting stresses that keep productivity below potential yields. Among the many problems afflicting maize production in WCA, drought, foliar diseases, and parasitic weeds are the most critical. Several decades of efforts devoted to the genetic improvement of maize have resulted in remarkable genetic gain, leading to increased yields of maize on farmers’ fields. The revolution unfolding in the areas of genomics, bioinformatics, and phenomics is generating innovative tools, resources, and technologies for transforming crop breeding programs. It is envisaged that such tools will be integrated within maize breeding programs, thereby advancing these programs and addressing current and future challenges. Accordingly, the maize improvement program within International Institute of Tropical Agriculture (IITA) is undergoing a process of modernization through the introduction of innovative tools and new schemes that are expected to enhance genetic gains and impact on smallholder farmers in the region. Genomic tools enable genetic dissections of complex traits and promote an understanding of the physiological basis of key agronomic and nutritional quality traits. Marker-aided selection and genome-wide selection schemes are being implemented to accelerate genetic gain relating to yield, resilience, and nutritional quality. Therefore, strategies that effectively combine genotypic information with data from field phenotyping and laboratory-based analysis are currently being optimized. Molecular breeding, guided by methodically defined product profiles tailored to different agroecological zones and conditions of climate change, supported by state-of-the-art decision-making tools, is pivotal for the advancement of modern, genomics-aided maize improvement programs. Accelerated genetic gain, in turn, catalyzes a faster variety replacement rate. It is critical to forge and strengthen partnerships for enhancing the impacts of breeding products on farmers’ livelihood. IITA has well-established channels for delivering its research products/technologies to partner organizations for further testing, multiplication, and dissemination across various countries within the subregion. Capacity building of national agricultural research system (NARS) will facilitate the smooth transfer of technologies and best practices from IITA and its partners.","year":"2019","semantic_score":0.6031,"commercial_score":5,"reasoning":"Early-stage or context-specific research — near-term licensing unlikely without further applied development and validation.","invention_description":"Molecular breeding, guided by methodically defined product profiles tailored to different agroecological zones and conditions of climate change, supported by state-of-the-art decision-making tools, is pivotal for the advancement of modern, genomics-aided maize improvement programs.","org_types":["Agricultural research institutes","Development finance institutions","Government agriculture ministries"],"disclosure":null,"topic":"general","excluded_reason":null,"coherence_flag":false,"trl_estimate":"Prototype (TRL 4-6)"},{"id":80,"title":"Approaches and progress in breeding drought-tolerant maize hybrids for tropical lowlands in west and central Africa","authors":"Menkir, A.; Dieng, I.; Gedil, M.; Mengesha Abera, W.; Oyekunle, M.; Riberio, P.F.; Adu, G.B.; Yacoubou, A.M.; Coulibaly, M.; Bankole, F.A.; Derera, J.; Bossey, B.; Unachukwu, N.; Ilesanmi, Y.; Meseka, S.","collection":"CGIAR Research Programme on Maize (CIMMYT)","abstract":"Drought represents a significant production challenge to maize farmers in West and Central Africa, causing substantial economic losses. Breeders at the International Institute of Tropical Agriculture have therefore been developing drought-tolerant maize varieties to attain high grain yields in rainfed maize production zones. The present review provides a historical overview of the approaches used and progress made in developing drought-tolerant hybrids over the years. Breeders made a shift from a wide area testing approach, to the use of managed screening sites, to precisely control the intensity, and timing of drought stress for developing drought-tolerant maize varieties. These sites coupled with the use of molecular markers allowed choosing suitable donors with drought-adaptive alleles for integration into existing elite maize lines to generate new drought-tolerant inbred lines. These elite maize inbred lines have then been used to develop hybrids with enhanced tolerance to drought. Genetic gains estimates were made using performance data of drought-tolerant maize hybrids evaluated in regional trials for 11 years under managed drought stress, well-watered conditions, and across diverse rainfed environments. The results found significant linear annual yield gains of 32.72 kg ha−1 under managed drought stress, 38.29 kg ha−1 under well-watered conditions, and 66.57 kg ha−1 across multiple rainfed field environments. Promising hybrids that deliver high grain yields were also identified for areas affected by drought and variable rainfed growing conditions. The significant genetic correlations found among the three growing conditions highlight the potential to exploit the available genetic resources and modern tools to further enhance tolerance to drought in hybrids.","year":"2024","semantic_score":0.6016,"commercial_score":4,"reasoning":"Early-stage or context-specific research — near-term licensing unlikely without further applied development and validation.","invention_description":"The results found significant linear annual yield gains of 32.72 kg ha−1 under managed drought stress, 38.29 kg ha−1 under well-watered conditions, and 66.57 kg ha−1 across multiple rainfed field environments.","org_types":["Agricultural research institutes","Development finance institutions","Government agriculture ministries"],"disclosure":null,"topic":"general","excluded_reason":null,"coherence_flag":true,"trl_estimate":"Concept (TRL 1-3)"},{"id":81,"title":"Detection and Characterization of Seed-Borne Bacterial Leaf Blight in Wheat","authors":"Kumari, Safaa; Moukahel, Abdulrahman; Abo Bakr, Abdo; Kassem, Mohammad","collection":"CGIAR","abstract":"Wheat is one of the most important crops which contributes toward global food security and\nrepresents a main source of food and income for millions of smallholder farmers worldwide.\nPseudomonas syringae pv. syringae (Pss) is the causal agent of bacterial leaf blight wheat\ndisease which can cause up to 50% yield loss or more depending on the time of infection\nand region. In addition, Pss is transmitted by wheat seeds, which can play a role in longdistance\nspread. Therefore, developing and implementing effective management strategies\nfor bacterial diseases is very important to reduce yield and quality loss. However, rapid and\naccurate detection of diseases is the first essential step for effective management strategies\nfor control of this disease. Even though molecular tools for Pss precise detection and\ncharacterization has been developed, the most practical approach for rapid diagnosis is the\nuse of serological assays using specific antibodies. A polyclonal antiserum against a Syrian\nisolate of Pss was produced and its quality was evaluated by Dot-blot Immunoassay using\nhomologous and heterologous antigens. Results revealed that the produced antiserum was\nable to detect Pss up to 1×103 CFU/ml dilution using raw antiserum at a dilution of 1/160 with\nno cross reactivity with other bacterial species (e.g. Xanthomonas).","year":"2023","semantic_score":0.6015,"commercial_score":7,"reasoning":"Plausible detection methodology — commercial pathway exists but broader multi-context validation needed before licensing.","invention_description":"However, rapid and\naccurate detection of diseases is the first essential step for effective management strategies\nfor control of this disease.","org_types":["Agri-diagnostic kit manufacturers","Plant health regulatory agencies","AgriTech startups"],"disclosure":null,"topic":"detection","excluded_reason":null,"coherence_flag":true,"trl_estimate":"Concept (TRL 1-3)"},{"id":82,"title":"Developing and deploying an efficient genotyping workflow for accelerating maize improvement in developing countries","authors":"Offornedo, Q.N.; Menkir, A.; Babalola, D.; Gedil, M.","collection":"CGIAR Research Programme on Maize (CIMMYT)","abstract":"Background: Molecular breeding is an essential tool for accelerating genetic gain in crop improvement towards meeting the need to feed an ever-growing world population. Establishing low-cost, flexible genotyping platforms in small, public and regional laboratories can stimulate the application of molecular breeding in developing countries. These laboratories can serve plant breeding projects requiring low- to medium-density markers for marker-assisted selection (MAS) and quality control (QC) activities.\r\nMethods: We performed two QC and MAS experiments consisting of 637 maize lines, using an optimised genotyping workflow involving an in-house competitive allele-specific PCR (KASP) genotyping system with an optimised sample collection, preparation, and DNA extraction and quantitation process. A smaller volume of leaf-disc size plant samples was collected directly in 96-well plates for DNA extraction, using a slightly modified CTAB-based DArT DNA extraction protocol. DNA quality and quantity analyses were performed using a microplate reader, and the KASP genotyping and data analysis was performed in our laboratory.\r\nResults: Applying the optimized genotyping workflow expedited the QC and MAS experiments from over five weeks (when outsourcing) to two weeks and eliminated the shipping cost. Using a set of 28 KASP single nucleotide polymorphisms (SNPs) validated for maize, the QC experiment revealed the genetic identity of four maize varieties taken from five seed sources. Another set of 10 KASP SNPs was sufficient in verifying the parentage of 390 F1 lines. The KASP-based MAS was successfully applied to a maize pro-vitamin A (PVA) breeding program and for introgressing the aflatoxin resistance gene into elite tropical maize lines.\r\nConclusion: This improved workflow has helped accelerate maize improvement activities of IITA's Maize Improvement Program and facilitated DNA fingerprinting for tracking improved crop varieties. National Agricultural Research Systems (NARS) in developing countries can adopt this workflow to fast-track molecular marker-based genotyping for crop improvement.","year":"2022","semantic_score":0.5989,"commercial_score":6,"reasoning":"Applied tool or model with identifiable industry interest — commercial pathway requires packaging and broader validation.","invention_description":"Establishing low-cost, flexible genotyping platforms in small, public and regional laboratories can stimulate the application of molecular breeding in developing countries.","org_types":["Agri-advisory platform companies","Precision agriculture software vendors","Development finance institutions requiring decision-support tools"],"disclosure":null,"topic":"software","excluded_reason":null,"coherence_flag":false,"trl_estimate":"Prototype (TRL 4-6)"},{"id":83,"title":"Genomic selection on a panel of elite Andean breeding lines of common bean (Phaseolus vulgaris L.)","authors":"Ariza-Suárez, Daniel; Hoz, Juan Fernando de la; Macea Choperena, Eliana del Pilar; Mayor, V.M.; Raatz, Bodo","collection":"CGIAR","abstract":"Common bean breeding in the tropics has benefited from the use of marker assisted selection to accelerate the breeding cycle. It uses individual markers previously identified to be significantly associated with targeted QTLs. However, some limitations arise when identifying and quantifying a large number of minor effect loci governing quantitative traits through standard QTL analysis and marker tagging. Genomic selection (GS) offers a promising approach for breeding by using many markers as predictors of the performance of individuals in a population1,2. This alternative strategy does not provide direct information about the underlying loci and genes that control quantitative traits, but instead offers a valuable selection criterion to be implemented in a breeding scheme. Different GS studies have been recently reported in plant breeding, targeting complex traits for many species with interesting results. In this study we want\r\nto assess the prediction accuracy of different genomic selection models in a collection of Andean bean breeding lines from CIAT.","year":"2018","semantic_score":0.5979,"commercial_score":5,"reasoning":"Early-stage or context-specific research — near-term licensing unlikely without further applied development and validation.","invention_description":"Genomic selection (GS) offers a promising approach for breeding by using many markers as predictors of the performance of individuals in a population1,2.","org_types":["Precision agriculture platforms","Crop insurance underwriters","National extension and early-warning services"],"disclosure":null,"topic":"model","excluded_reason":null,"coherence_flag":false,"trl_estimate":"Concept (TRL 1-3)"},{"id":84,"title":"Optimization of Genotyping-by-Sequencing (GBS) forGermplasm Fingerprinting and Trait Mapping in Faba Bean","authors":"Zhang, Hailin; Fechete, Lavinia; Himmelbach, Axel; Poehlein, Anja; Lohwasser, Ulrike; Börner, Andreas; Maalouf, Fouad; Agrawal, Shiv Kumar; Khazaei, Hamid; Stein, Nils; Jayakodi, Murukarthick","collection":"CGIAR","abstract":"Faba bean (Vicia faba L.) is an important pulse crop with a wide range of agroecological adaptations. The development of genomic tools and a comprehensive catalog of extant genetic diversity are crucial for developing improved faba bean cultivars. The lack of a cost-effective genotyping platform limits the characterization of large germplasm collections, understanding of genetic diversity across populations, and implementing breeder's tools like genomic selection. Genotyping-by-sequencing (GBS) offers high-resolution genotyping for both model and crop plant species, even without a reference genome sequence. The genome fragments targeted by GBS depend substantially on the restriction enzyme (RE) used for the complexity reduction step. Species with complex genomic architecture require optimization of GBS with proper RE to realize the full potential of GBS. Here, we evaluated various REs in the GBS method and identified that the combination of ApeKI/MseI proved to be the most appropriate for faba bean based on the best library quality, a high number of genomic loci spread across chromosomes, and high enrichment loci associated with the gene space. With the new optimized protocol, we constructed a genetic map using a recombinant inbred line (RIL) population and identified a QTL for seed hilum color on Chromosome 1. In addition, we also genotyped a diversity panel and performed a genome-wide association studies (GWAS) for important agronomic traits, including plant height (PH), flowering time (FT), and number of pods per plant (PPP). We identified six SNP markers significantly associated with these traits and listed potential candidate genes. The optimized faba bean-specific GBS procedure will facilitate access to the untapped genetic diversity for genetic research and breeding and may facilitate functional genomics.","year":"2024","semantic_score":0.5967,"commercial_score":6,"reasoning":"Promising germplasm with commercial potential — field-trial evidence base needs strengthening or multi-location confirmation.","invention_description":"The development of genomic tools and a comprehensive catalog of extant genetic diversity are crucial for developing improved faba bean cultivars.","org_types":["Commercial seed companies","Plant breeding programmes","National agricultural research systems (NARS)"],"disclosure":null,"topic":"variety","excluded_reason":null,"coherence_flag":true,"trl_estimate":"Concept (TRL 1-3)"},{"id":85,"title":"Development of a portable DNA extraction and cross-priming amplification (CPA) tool for rapid in-situ visual diagnosis of plant diseases","authors":"Li, J.; Du, J.; Li, S.; Dong, J.; Ying, J.; Gu, Y.; Lu, J.; Zeng, X.; Kear, P.; Dou, D.; Wang, X.","collection":"CGIAR","abstract":"Plant pathogens cause severe losses to crop yields and economic returns in agriculture. Despite plant tissue DNA extraction of typically constituting a preliminary step in nucleic acid-based molecular diagnostics, such lab-based methods can be time-consuming and arduous to complete many samples. To mitigate these challenges, we developed an inexpensive portable DNA extraction technique that is lightweight and suitable for deployment in sampling locations, such as fields. It includes a DNA extraction device fabricated with a Steel Microneedle Array (SMA) and a simple high-efficiency DNA extraction buffer. As a result, DNA extraction times can be reduced to within ~ 1 min, and the eluted DNA is demonstrated to be suitable for subsequent molecular biological analyses without requiring additional purification. Cross-priming amplification (CPA) technology was first established to detect Phytophthora infestans, which achieves sensitivity attainment of 10–7 ng/µL. The detection result can be conveniently estimated with naked-eye visual inspection using fluorescent dsDNA binding dye. CPA was demonstrated to be more feasible than PCR-based approaches and performed well in species-specific and practicability tests. This study elucidates a novel integrated pathogen detection technique coupled with SMA-Device extraction and a modified visual CPA assay to establish and verify various field-based samples infected with multiple pathogens. Altogether, the total sample-to-answer time for pathogen detection was reduced to ~ 1.5 h, making field-based analysis affordable and achievable for farmers or extension workers inside and outside the laboratory.","year":"2023","semantic_score":0.5925,"commercial_score":7,"reasoning":"Plausible detection methodology — commercial pathway exists but broader multi-context validation needed before licensing.","invention_description":"Cross-priming amplification (CPA) technology was first established to detect Phytophthora infestans, which achieves sensitivity attainment of 10–7 ng/µL.","org_types":["Agri-diagnostic kit manufacturers","Plant health regulatory agencies","AgriTech startups"],"disclosure":null,"topic":"detection","excluded_reason":null,"coherence_flag":true,"trl_estimate":"Prototype (TRL 4-6)"},{"id":86,"title":"Development of a lateral flow device for infield detection and evaluation of PCR based diagnostic methods for Xanthomonas campestris pathovar musacearum, the causal agent of banana Xanthomonas wilt","authors":"Hodgetts, J.; Karamura, G.; Johnson, G.; Hall, J.; Perkins, K.; Beed, Fenton D.; Nakato, V; Grant, M.; Studholme, David J.; Boonham, N.; Smith, J.","collection":"CGIAR Research Programme on Roots, Tubers and Bananas","abstract":"Xanthomonas campestris pathovar musacearum (Xcm) is the causal agent of bananaXanthomonas wilt, a major threat to banana production in eastern and central Africa. Thepathogen is present in very high levels within infected plants and can be transmitted by abroad range of mechanisms; therefore early specific detection is vital for effective diseasemanagement. In this study we have developed a polyclonal antibody (pAb) and deployed thisin a lateral flow device (LFD) format to allow rapid in-field detection of Xcm. We alsoindependently assessed published Xcm PCR assays: only two assays gave specificamplification of Xcm, whilst others cross-reacted with non-target Xanthomonas species. Purecultures of Xcm were used to immunise a rabbit, the IgG antibodies purified from the serumand the resulting polyclonal antibodies tested using ELISA and LFD. Testing against a widerange of bacterial species showed the pAb detected all strains of Xcm, representing isolatesfrom seven countries and the known genetic diversity of Xcm. The pAb also detected theclosely related Xanthomonas axonopodis pathovar vasculorum (Xav), primarily a sugarcanepathogen. Detection was successful in both naturally and experimentally infected bananaplants, and the LFD limit of detection was 105 cells/ml. Whilst the pAb is not fully specificfor Xcm, Xav has never been found in banana. Therefore the LFD can be used as a first linescreening tool to detect Xcm in the field. Testing by LFD requires no equipment, can beperformed by non-scientists and is cost-effective. Therefore this LFD provides a vital tool toaid in the management and control of Xcm.","year":"2015","semantic_score":0.5901,"commercial_score":7,"reasoning":"Plausible detection methodology — commercial pathway exists but broader multi-context validation needed before licensing.","invention_description":"The pAb also detected theclosely related Xanthomonas axonopodis pathovar vasculorum (Xav), primarily a sugarcanepathogen.","org_types":["Agri-diagnostic kit manufacturers","Plant health regulatory agencies","AgriTech startups"],"disclosure":null,"topic":"detection","excluded_reason":null,"coherence_flag":true,"trl_estimate":"Prototype (TRL 4-6)"},{"id":87,"title":"Multiplex polymerase chain reaction (PCR) with Nanopore sequencing for sequence-based detection of four tilapia pathogens","authors":"Delamare-Deboutteville, Jerome; Meemetta, Watcharachai; Pimsannil, Khaettareeya; Han Ming, Gan; Khor, Laura; Chadag, Vishnumurthy Mohan; Thanh, Dong Ha; Saengchan, Senapin","collection":"CGIAR","abstract":"Background: Tilapia aquaculture faces significant threats posed by four prominentpathogens: tilapia lake virus (TiLV), infectious spleen and kidney necrosis virus (ISKNV), Francisella orientalis, and Streptococcus agalactiae. Currently, employed molecular diagnostic methods for these pathogens rely on multiple singleplex polymerase chain reactions (PCR), which are time-consuming and expensive.\nMethods: In this study, we present an approach utilizing a multiplex PCR (mPCR) assay, coupled with rapid Nanopore sequencing, enabling the one-tube simultaneous detection and one-reaction Nanopore sequencing-based validation of four pathogens.\nResults: Our one-tube multiplex assay exhibits a detection limit of 1,000 copies per reaction for TiLV, ISKNV, and S. agalactiae, while for F. orientalis, the detection limit is 10,000 copies per reaction. This sensitivity is sufficient for diagnosing infections and co-infections in clinical samples from sick fish, enabling rapid confirmation of the presence of pathogens. Integrating multiplex PCR and Nanopore sequencing provides an alternative approach platform for fast and precise diagnostics of major tilapia pathogens in clinically sick animals, adding to the available toolbox for disease diagnostics.","year":"2025","semantic_score":0.5899,"commercial_score":6,"reasoning":"Plausible detection methodology — commercial pathway exists but broader multi-context validation needed before licensing.","invention_description":"Integrating multiplex PCR and Nanopore sequencing provides an alternative approach platform for fast and precise diagnostics of major tilapia pathogens in clinically sick animals, adding to the available toolbox for disease diagnostics.","org_types":["Agri-diagnostic kit manufacturers","Plant health regulatory agencies","AgriTech startups"],"disclosure":null,"topic":"detection","excluded_reason":null,"coherence_flag":true,"trl_estimate":"Prototype (TRL 4-6)"},{"id":88,"title":"Reverse Transcriptase Loop-Mediated Isothermal Amplification Assays (RTLAMP) for the Detection of Alfalfa Mosaic Virus from Forage Crops","authors":"Dawit, Woubit; Mulatu, Fikerte; Eshete, Yesuf; Negawo, Alemayehu T.; Muchugi, Alice; Jones, Christopher S.","collection":"CGIAR","abstract":"AMV is one of the most economically important plant viruses and has a very wide host range including forage crops.\nTo make sure that only seeds of satisfactory phytosanitary status are distributed to recipients in geographically diverse\nareas, the ILRI genebank routinely monitors seed-borne diseases during seed multiplication and in the field\ngenebank. Current detection techniques for AMV include a dot-blot assay and a two-step Reverse Transcription\nPolymerase Chain Reaction (RT-PCR), both of which are time consuming. In the present study we developed a one step Reverse Transcriptase Loop-Mediated Isothermal Amplification (RT-LAMP) method for the sensitive and rapid\ndetection of AMV from forage crops. For the assay, six different AMV specific primers were used, and a series of\nreactions were performed to identify optimal conditions. Amplicons were easily visualized by means of an in-tube\ncolour indicator (SYBR Green I dye) with no requirement to run gel electrophoresis. The sensitivity of the RT-LAMP\nassay was assessed by comparing the optimized AMV RT-LAMP assay with the conventional RT-PCR. In RT-LAMP,\nan amplicon was generated up to 100 ag/μl dilutions in contrast to the conventional RT-PCR, where no\namplification at 1 fg/μl and onwards, indicating that the detection limit of the AMV RT-LAMP assay is much lower\nthan for the conventional RT-PCR. Finally, the optimized RT-LAMP assay was further validated on 40 field samples\nof different forage species and other important forage viruses. The developed RT-LAMP assay was specific and\ndetected AMV from different forages with no cross reaction with other plant viruses (SBMV and potyvirus) tested in\nthe ILRI-genebank seed multiplication/regeneration fields. The optimized RT-LAMP assay is an effective tool for the\ndetection of AMV for field samples in diagnostic laboratories, and for quarantine applications.","year":"2023","semantic_score":0.5887,"commercial_score":6,"reasoning":"Plausible detection methodology — commercial pathway exists but broader multi-context validation needed before licensing.","invention_description":"Finally, the optimized RT-LAMP assay was further validated on 40 field samples\nof different forage species and other important forage viruses.","org_types":["Agri-diagnostic kit manufacturers","Plant health regulatory agencies","AgriTech startups"],"disclosure":null,"topic":"detection","excluded_reason":null,"coherence_flag":true,"trl_estimate":"Prototype (TRL 4-6)"},{"id":89,"title":"Investigating genomic prediction strategies for grain carotenoid traits in a tropical/subtropical maize panel","authors":"LaPorte, Mary-Francis; Suwarno, Willy Bayuardi; Hannok, Pattama; Koide, Akiyoshi; Bradbury, Peter; Crossa, José; Palacios-Rojas, Natalia; Diepenbrock, Christine","collection":"CGIAR","abstract":"Vitamin A deficiency remains prevalent on a global scale, including in regions where maize constitutes a high percentage of human diets. One solution for alleviating this deficiency has been to increase grain concentrations of provitamin A carotenoids in maize (Zea mays ssp. mays L.)-an example of biofortification. The International Maize and Wheat Improvement Center (CIMMYT) developed a Carotenoid Association Mapping panel of 380 inbred lines adapted to tropical and subtropical environments that have varying grain concentrations of provitamin A and other health-beneficial carotenoids. Several major genes have been identified for these traits, 2 of which have particularly been leveraged in marker-assisted selection. This project assesses the predictive ability of several genomic prediction strategies for maize grain carotenoid traits within and between 4 environments in Mexico. Ridge Regression-Best Linear Unbiased Prediction, Elastic Net, and Reproducing Kernel Hilbert Spaces had high predictive abilities for all tested traits (beta-carotene, beta-cryptoxanthin, provitamin A, lutein, and zeaxanthin) and outperformed Least Absolute Shrinkage and Selection Operator. Furthermore, predictive abilities were higher when using genome-wide markers rather than only the markers proximal to 2 or 13 genes. These findings suggest that genomic prediction models using genome-wide markers (and assuming equal variance of marker effects) are worthwhile for these traits even though key genes have already been identified, especially if breeding for additional grain carotenoid traits alongside beta-carotene. Predictive ability was maintained for all traits except lutein in between-environment prediction. The TASSEL (Trait Analysis by aSSociation, Evolution, and Linkage) Genomic Selection plugin performed as well as other more computationally intensive methods for within-environment prediction. The findings observed herein indicate the utility of genomic prediction methods for these traits and could inform their resource-efficient implementation in biofortification breeding programs.","year":"2024","semantic_score":0.587,"commercial_score":5,"reasoning":"Early-stage or context-specific research — near-term licensing unlikely without further applied development and validation.","invention_description":"Ridge Regression-Best Linear Unbiased Prediction, Elastic Net, and Reproducing Kernel Hilbert Spaces had high predictive abilities for all tested traits (beta-carotene, beta-cryptoxanthin, provitamin A, lutein, and zeaxanthin) and outperformed Least Absolute Shrinkage and Selection Operator.","org_types":["Precision agriculture platforms","Crop insurance underwriters","National extension and early-warning services"],"disclosure":null,"topic":"model","excluded_reason":null,"coherence_flag":true,"trl_estimate":"Concept (TRL 1-3)"},{"id":90,"title":"Evaluation of a lateral flow device for in-field detection of Banana Xanthomonas Wilt and its application in tracking the systemicity of Xanthomonas campestris pv. musacearum","authors":"Karamura, G.; Ochola, D.; Smith, J.; Kubiriba, Jerome; Karamura, E.B.","collection":"CGIAR Research Programme on Roots, Tubers and Bananas","abstract":"Early detection of Banana Xanthomonas Wilt (BXW) in the field and immediate destruction of infected plants or plant tissue are key control methods to prevent the introduction and spread of BXW. This requires rapid, cost effective and an on-site diagnostic tool to detect the bacterium, Xanthomonas campestris pv musacearum (Xcm). Polymerase chain reaction (PCR) detection technique for BXW is efficient but requires expensive equipment and knowledgeable expertise; this limits PCR application to the laboratory. This study therefore was carried out to evaluate the enzyme - linked immunosorbent assay (ELISA) tool configured as a lateral flow device (LFD) for detection of Xcm. Studies on the systemicity of Xcm in banana were carried out using the BXW - LFD in a field trial of 300 banana plants of Pisang Awak inoculated with the Xcm at Kiifu Forest, Mukono District, Uganda. Pseudo-stem samples from symptomatic and asymptomatic suckers were collected and tested with the LFD and the results compared with conventional PCR using the GspDm BXW primers. The LFD was able to detect Xcm3.","year":"2016","semantic_score":0.5864,"commercial_score":6,"reasoning":"Plausible detection methodology — commercial pathway exists but broader multi-context validation needed before licensing.","invention_description":"Therefore was carried out to evaluate the enzyme - linked immunosorbent assay (ELISA) tool configured as a lateral flow device (LFD) for detection of Xcm.","org_types":["Agri-diagnostic kit manufacturers","Plant health regulatory agencies","AgriTech startups"],"disclosure":null,"topic":"detection","excluded_reason":null,"coherence_flag":true,"trl_estimate":"Prototype (TRL 4-6)"},{"id":91,"title":"Rapid detection of Burkholderia glumae, causing panicle blight of rice, by colorimetric Loop-Mediated Isothermal Amplification (LAMP)","authors":"Catausan, Sheryl; Grande, Genelou; Schepler-Luu, Van; Castellion Martina","collection":"International Rice Research Institute","abstract":"Bacterial panicle blight (BPB), caused by Burkholderia glumae, is an emerging threat to rice production, leading to significant yield losses. The seedborne nature of B. glumae amplifies its threat to seed production, transboundary movement and plant quarantine. Rapid detection and accurate identification are critical in implementing effective containment measures and preventing the spread of the disease. However, existing diagnostic methods such as PCR and culture-based techniques using semi-selective medium are often complex, time consuming, and limited to well-equipped laboratories. This study aims to develop a rapid, cost-effective, and field-deployable detection method using loop-mediated isothermal amplification (LAMP). Unlike conventional PCR methods that require electrophoresis, LAMP results can be easily detected through turbidity, fluorescence, or color changes as in colorimetric LAMP (cLAMP), making it suitable for on-field diagnosis. Using primers designed based on the 16-23S rDNA ITS region of B. glumae, the cLAMP assay described here demonstrates high sensitivity and specificity, differentiating B. glumae strains from other common rice-infecting bacteria; and successfully detects B. glumae in DNA, cell cultures, and crude extracts of infected rice seeds, leaf sheath and panicle, with 105 CFU/ml and 0.1ng to 1pg DNA detection limit. The rapid, simple, and relatively low-cost detection of this method is particularly beneficial to laboratories in developing countries, where resources and equipment for sophisticated diagnostic testing are often limited.","year":"2025","semantic_score":0.5818,"commercial_score":7,"reasoning":"Plausible detection methodology — commercial pathway exists but broader multi-context validation needed before licensing.","invention_description":"Unlike conventional PCR methods that require electrophoresis, LAMP results can be easily detected through turbidity, fluorescence, or color changes as in colorimetric LAMP (cLAMP), making it suitable for on-field diagnosis.","org_types":["Agri-diagnostic kit manufacturers","Plant health regulatory agencies","AgriTech startups"],"disclosure":{"invention_title":"Rapid rice blight detection system for field-deployable early crop health diagnosis","problem_solved":"Bacterial panicle blight (BPB), caused by Burkholderia glumae, is an emerging threat to rice production, leading to significant yield losses.","technical_approach":"The seedborne nature of B. glumae amplifies its threat to seed production, transboundary movement and plant quarantine. Rapid detection and accurate identification are critical in implementing effective containment measures and preventing the spread of the disease.","novelty":"Unlike conventional PCR methods that require electrophoresis, LAMP results can be easily detected through turbidity, fluorescence, or color changes as in colorimetric LAMP (cLAMP), making it suitable for on-field diagnosis.","commercial_applications":"- Commercial blight disease early warning kit for farm-gate and agro-dealer use in smallholder farming systems in LMICs, licensed to diagnostic manufacturers\n- Integration into national seed certification and phytosanitary inspection workflows as a rapid field screening tool\n- Regulatory compliance tool for seed and planting material trade certification, reducing testing time from weeks to hours","licensing_model":"Non-exclusive technology licence to diagnostic manufacturers with milestone payments at product launch; open, royalty-free licence for public-health and NARS use in low-income countries. No restrictions on use by public-sector partners.","trl_estimate":"Prototype (TRL 4-6)","ip_risk_flags":"Prior art risk — published 2025; US 12-month grace period expires within 12 months. EPO/most jurisdictions apply immediate novelty bars. Verify whether a patent application was filed before or within 12 months of publication.\nSingle-location validation only — TRL may be overstated","legal_disclaimer":"MACHINE-GENERATED DRAFT — For internal screening only. Not validated by IP counsel. Not for external distribution without author confirmation and legal review.","inventor_names":"Catausan, Sheryl; Grande, Genelou; Schepler-Luu, Van; Castellion Martina","institutional_affiliation":"International Rice Research Institute","first_public_disclosure":"2025 (journal publication date — verify submission date for priority claim)","funding_source":"Not identified in abstract — requires manual completion before any IP filing","tto_contact":"Technology Transfer Office, IRRI — tto@irri.org"},"topic":"detection","excluded_reason":null,"coherence_flag":true,"trl_estimate":"Prototype (TRL 4-6)"},{"id":92,"title":"Comparative evaluation of LAMP, qPCR, conventional PCR, and ELISA to detect ralstonia solanacearum in Kenyan potato fields","authors":"Okiro, L.A.; Tancos, M.A.; Nyanjom, S.G.; Smart, C.D.; Parker, M.","collection":"CGIAR Research Programme on Roots, Tubers and Bananas","abstract":"Bacterial wilt caused by Ralstonia solanacearum is considered among the most damaging diseases of potato in Sub-Saharan Africa and the most significant biotic constraint of potato production alongside late blight. Unlike late blight, which can be managed by chemical means, R. solanacearum can only be managed through cultural methods and clean seed. Laboratory testing to certify seed before planting is required to confirm the absence of the pathogen in Kenya. A loop-mediated isothermal amplification (LAMP) assay was developed using the UDP-(3-O-acyl)-N-acetylglucosamine deacetylase gene (IpxC) to screen seed potato for R. solanacearum strains. The assay was assessed using DNA extracted from R. solanacearum and other soil and potato pathogens to demonstrate specificity and sensitivity. The LAMP assay was validated using field samples from different potato growing regions of Kenya collected over two growing seasons and compared with established nucleic acid and protein-based assays. The IpxC LAMP assay was found to be specific and sensitive to R. solanacearum, detecting as low as 2.5 pg/µl of R. solanacearum DNA. Of the 47 potentially infected field samples collected, both IpxC LAMP and quantitative polymerase chain reaction (PCR) detected R. solanacearum DNA in 90% of the samples, followed by conventional PCR (86%) and ELISA (75%). This IpxC LAMP assay is a promising diagnostic tool to rapidly screen for R. solanacearum in seed potato with high sensitivity in Kenya.","year":"2019","semantic_score":0.576,"commercial_score":6,"reasoning":"Plausible detection methodology — commercial pathway exists but broader multi-context validation needed before licensing.","invention_description":"The LAMP assay was validated using field samples from different potato growing regions of Kenya collected over two growing seasons and compared with established nucleic acid and protein-based assays.","org_types":["Agri-diagnostic kit manufacturers","Plant health regulatory agencies","AgriTech startups"],"disclosure":null,"topic":"detection","excluded_reason":null,"coherence_flag":true,"trl_estimate":"Prototype (TRL 4-6)"},{"id":93,"title":"Development of a FER0.4K SNP array for genomic predication of Fusarium ear rot resistance in maize","authors":"Wang, Zhao; Zhang, Haoqiang; Ye, Wenchao; Han, Yuchen; Li, Huan; Zhou, Zijian; Li, Chunhui; Zhang, Xuecai; Zhang, Jianan; Chen, Jiafa; Wu, Jianyu","collection":"CGIAR","abstract":"Fusarium ear rot (FER) caused by Fusarium species severely reduces grain yield and quality of maize. Genome prediction (GP), a promising tool for quantitative trait breeding in plants and animals, uses molecular markers for capturing quantitative trait loci and predicting the genetic value of candidates for selection. In the present study, different subsets of markers and statistical methods for GP accuracy were tested in diverse inbred populations for FER resistance using a five-fold cross-validation approach. The prediction accuracy increased with an increase in the number of random markers; however, an increase in number beyond 10K did not increase the prediction accuracy. The prediction accuracy of selected markers was higher than that of random markers, and 500–1000 selected markers had the highest prediction accuracy, beyond which it slowly decreased. Although there was no difference among statistical methods when using selected markers at high prediction accuracy, significant differences were observed when using random markers. On this basis, a liquid chip named FER0.4K (liquid chip for genomic prediction of FER) containing 381 SNPs was developed for low-cost, high-throughput genotyping, with a prediction of approximately 0.82. The statistical method of genome prediction was compiled into a web-based, easy-to-use statistical analysis software using the “shiny” package in R. In summary, this study provides a foundation for FER resistance breeding in maize and offers new insights into the genetic improvement of other complex quantitative traits in plants.","year":"2025","semantic_score":0.5751,"commercial_score":7,"reasoning":"Applied tool or model with identifiable industry interest — commercial pathway requires packaging and broader validation.","invention_description":"The statistical method of genome prediction was compiled into a web-based, easy-to-use statistical analysis software using the “shiny” package in R.","org_types":["Agri-advisory platform companies","Precision agriculture software vendors","Development finance institutions requiring decision-support tools"],"disclosure":{"invention_title":"High-density maize SNP genotyping array for genomic prediction of fusarium resistance","problem_solved":"Fusarium ear rot (FER) caused by Fusarium species severely reduces grain yield and quality of maize.","technical_approach":"Genome prediction (GP), a promising tool for quantitative trait breeding in plants and animals, uses molecular markers for capturing quantitative trait loci and predicting the genetic value of candidates for selection. In the present study, different subsets of markers and statistical methods for GP accuracy were tested in diverse inbred populations for FER resistance using a five-fold cross-validation approach. The prediction accuracy increased with an increase in the number of random markers; however, an increase in number beyond 10K did not increase the prediction accuracy.","novelty":"The tool or algorithm addresses a documented need in agricultural decision-support; novelty relative to prior art requires assessment — not determinable from abstract alone.","commercial_applications":"- Licenced genotyping service to maize breeding programmes and seed companies requiring high-density SNP data for genomic prediction of Fusarium ear rot\n- Integration into CGIAR and NARS genomic selection pipelines as a validated, crop-specific genotyping platform replacing expensive whole-genome sequencing\n- Commercial genotyping-as-a-service offering to regional breeding hubs and biotech companies developing maize varieties with improved pathogen tolerance","licensing_model":"Open-source core licence (e.g. MIT or Apache 2.0) consistent with CGIAR open-access obligations; commercial SaaS or embedded-module licence for enterprise deployments. Free access maintained for public research institutions and smallholder-focused NGOs.","trl_estimate":"Concept (TRL 1-3)","ip_risk_flags":"Prior art risk — published 2025; US 12-month grace period expires within 12 months. EPO/most jurisdictions apply immediate novelty bars. Verify whether a patent application was filed before or within 12 months of publication.\nSoftware/data tool — check CGIAR open-access licensing obligations","legal_disclaimer":"MACHINE-GENERATED DRAFT — For internal screening only. Not validated by IP counsel. Not for external distribution without author confirmation and legal review.","inventor_names":"Wang, Zhao; Zhang, Haoqiang; Ye, Wenchao; Han, Yuchen; Li, Huan; Zhou, Zijian; Li, Chunhui; Zhang, Xuecai; Zhang, Jianan; Chen, Jiafa; Wu, Jianyu","institutional_affiliation":"CGIAR","first_public_disclosure":"2025 (journal publication date — verify submission date for priority claim)","funding_source":"Not identified in abstract — requires manual completion before any IP filing","tto_contact":"Centre affiliation unclear from metadata — contact the corresponding author directly or email cgiar-ip@cgiar.org for routing assistance"},"topic":"software","excluded_reason":null,"coherence_flag":true,"trl_estimate":"Concept (TRL 1-3)"},{"id":94,"title":"The rice Trait Development Pipeline: A systematic framework guiding upstream research for impact in breeding, with examples from root biology","authors":"Platten, J. Damien; Henry, Amelia; Chebotarov, Dmytro; Schepler-Luu, Van; Cobb, Joshua N.","collection":"CGIAR","abstract":"\"Background\nIn crop breeding, ‘trait development’ is the improvement of specific characteristics, typically using landraces as a source for introduction into elite lines. Trait development exists upstream of ‘breeding,’ which generates new varieties to be grown by farmers. While both are active areas of research, trait development is often overlooked, despite being a critical step in linking upstream research with breeding. The field of root biology provides many excellent examples of upstream research that requires further trait development to generate new varieties. Scope\nHere, we describe the IRRI rice Trait Development Pipeline which provides a framework of clear protocols to discover, test and validate research outputs and maximize their potential for impact in mainstream breeding. We recommend specific steps in the context of further trait development for several rice root biology studies based on the guidelines established in the IRRI rice Trait Development Pipeline. Common trait development recommendations for areas such as root biology include ensuring the relevance of studied traits to field performance, rigorous testing to ensure reliability of genes and marker systems in elite backgrounds, and the packaging of those genes into elite material that can be easily used in breeding.\nConclusion: \nIn implementing the Trait Development Pipeline, it is expected that recurrent selection-based breeding strategies will benefit more from linkages with upstream research areas, such as root biology, by implementing marker-assisted selection to increase the frequency of large-effect rare alleles that currently exist outside the elite gene pool without hindering the genetic improvement that comes from quantitative breeding methods.\"","year":"2025","semantic_score":0.5689,"commercial_score":6,"reasoning":"Promising germplasm with commercial potential — field-trial evidence base needs strengthening or multi-location confirmation.","invention_description":"An improved crop germplasm or variety with enhanced performance characteristics developed through systematic breeding.","org_types":["Commercial seed companies","Plant breeding programmes","National agricultural research systems (NARS)"],"disclosure":null,"topic":"variety","excluded_reason":null,"coherence_flag":true,"trl_estimate":"Concept (TRL 1-3)"},{"id":95,"title":"Implementing marker covariates and multi‐trait genomic selection models to improve grain milling, appearance, cooking, and edible quality in rice (<i>Oryza sativa</i> L.)","authors":"Dhakal, Anup; Cruz, Maribel; Loaiza, Katherine; Cuasquer, Juan; Rosas, Juan; Graterol, Eduardo; Arbelaez, Juan David","collection":"CGIAR","abstract":"Abstract Rice ( Oryza sativa L.) is a staple food for over half of the world's population. With population growth, socioeconomic changes, and shifting consumer lifestyles, the demand for high‐quality rice has surged. Understanding consumer preferences for rice quality traits is crucial for breeders to effectively address evolving market needs. Rice breeding programs assess various quality aspects, including grain shape, appearance, milling efficiency, and cooking and eating qualities. Molecular‐based approaches like marker‐assisted selection and genomic selection (GS) offer promising opportunities to enhance breeding efficiency. In this study, our goal was to build upon our previous findings and improve the predictive ability of GS for primary grain milling and cooking and eating quality traits by incorporating trait marker covariates and highly heritable, high‐throughput secondary traits in multi‐trait genomic selection strategies (MT‐GS). By including amylose content and gelatinization temperature functional markers as covariates in GS models, we improved the predictive ability for primary cooking and eating traits from 21% to 44%. Additionally, integrating secondary traits into MT‐GS increased the predictive ability for milling quality traits from 13.5% to 18% and for cooking and eating traits from 4.6% to 50%. Overall, our study demonstrates the feasibility of incorporating whole‐genome markers, trait markers, and secondary trait information to enhance the predictive ability of GS for grain milling, cooking, and eating qualities in rice.","year":"2
