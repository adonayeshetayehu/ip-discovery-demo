025","semantic_score":0.567,"commercial_score":6,"reasoning":"Applied tool or model with identifiable industry interest — commercial pathway requires packaging and broader validation.","invention_description":"By including amylose content and gelatinization temperature functional markers as covariates in GS models, we improved the predictive ability for primary cooking and eating traits from 21% to 44%.","org_types":["Precision agriculture platforms","Crop insurance underwriters","National extension and early-warning services"],"disclosure":null,"topic":"model","excluded_reason":null,"coherence_flag":true,"trl_estimate":"Concept (TRL 1-3)"},{"id":96,"title":"Rapid Ragi: A speed breeding protocol for finger millet","authors":"Sajja, Sobhan; Pranati, Jwala; Shyamala, S.; Vinutha, K.S.; Reddy, Ramya; Joshi, Priyanka; Pannem, Srinivasulu; Rakshit, P.; Jadhav, Yashoda; Kumar, C.V. Sameer; Mayes, Sean","collection":"CGIAR","abstract":"Background\nClimate change is gradually increasing demand for resilient, nutritious crops like finger millet or ragi. Ensuring food security requires researchers to develop improved and adapted cultivars rapidly. Modern techniques such as genomics-assisted breeding have emerged in the previous decade and combined with rapid generation advancement they will offer a step change in the speed of cultivar development.\n\nResults\nIn this study, we developed a repeatable and cost-effective speed breeding protocol for finger millet by modulating the agronomic and physiological components for early generation advancement. A photoperiod of 9-hours, 29 ± 2℃ temperature, 70% relative humidity, 105 plants per 1.5 sq. ft., 0.17% Hoagland’s No. 2 solution spray, restricted irrigation and harvesting at physiological maturity successfully reduced 28–54 days across the maturity groups of finger millet. The advantage was validated in segregating populations confirming up to 4–5 generations a year, instead of 1–2 under field conditions.\n\nConclusion\nThe speed breeding protocol developed reduces the breeding cycle time significantly allowing increased genetic gain. The protocol provides the advantage of rapid development of recombinant inbred lines (RILs), high-throughput phenotyping for biotic and abiotic stresses, and genotyping for early generation selections.","year":"2025","semantic_score":0.5627,"commercial_score":7,"reasoning":"Promising germplasm with commercial potential — field-trial evidence base needs strengthening or multi-location confirmation.","invention_description":"Ensuring food security requires researchers to develop improved and adapted cultivars rapidly.","org_types":["Commercial seed companies","Plant breeding programmes","National agricultural research systems (NARS)"],"disclosure":{"invention_title":"Speed breeding and rapid generation advancement protocol for millet improvement programmes","problem_solved":"Traditional millet breeding programmes require multiple growing seasons per generation cycle, creating a critical bottleneck that delays delivery of improved varieties to smallholder farmers. Accelerating generational turnover is essential to meet the pace of climate change and evolving pest pressures.","technical_approach":"Ensuring food security requires researchers to develop improved and adapted cultivars rapidly. Modern techniques such as genomics-assisted breeding have emerged in the previous decade and combined with rapid generation advancement they will offer a step change in the speed of cultivar development. Results\nIn this study, we developed a repeatable and cost-effective speed breeding protocol for finger millet by modulating the agronomic and physiological components for early generation advancement.","novelty":"Modern techniques such as genomics-assisted breeding have emerged in the previous decade and combined with rapid generation advancement they will offer a step change in the speed of cultivar development.","commercial_applications":"- Licensed speed breeding protocol to NARS and private seed companies seeking to compress millet generation time from 2–3 seasons to 4–6 cycles per year\n- Breeding-as-a-service offering to agritech and agribusiness companies seeking faster millet variety development pipelines without internal infrastructure investment\n- Adoption by CGIAR centres and regional breeding networks as a standard accelerated generation advancement protocol, reducing variety development cycles by 50–60%","licensing_model":"Plant Variety Protection (PVP) or equivalent national protection, with tiered royalty licensing — open access for subsistence farmers and NARS in LMICs; revenue-sharing commercial licence for seed companies in middle- and high-income markets. All use subject to CGIAR IA Principles and applicable SMTA obligations.","trl_estimate":"Concept (TRL 1-3)","ip_risk_flags":"Prior art risk — published 2025; US 12-month grace period expires within 12 months. EPO/most jurisdictions apply immediate novelty bars. Verify whether a patent application was filed before or within 12 months of publication.","legal_disclaimer":"MACHINE-GENERATED DRAFT — For internal screening only. Not validated by IP counsel. Not for external distribution without author confirmation and legal review.","inventor_names":"Sajja, Sobhan; Pranati, Jwala; Shyamala, S.; Vinutha, K.S.; Reddy, Ramya; Joshi, Priyanka; Pannem, Srinivasulu; Rakshit, P.; Jadhav, Yashoda; Kumar, C.V. Sameer; Mayes, Sean","institutional_affiliation":"CGIAR","first_public_disclosure":"2025 (journal publication date — verify submission date for priority claim)","funding_source":"Not identified in abstract — requires manual completion before any IP filing","tto_contact":"Centre affiliation unclear from metadata — contact the corresponding author directly or email cgiar-ip@cgiar.org for routing assistance"},"topic":"variety","excluded_reason":null,"coherence_flag":true,"trl_estimate":"Concept (TRL 1-3)"},{"id":97,"title":"Breedbase: a digital ecosystem for modern plant breeding","authors":"Morales, Nicolas; Ogbonna, Alex C.; Ellerbrock, Bryan J.; Bauchet, Guillaume J.; Tantikanjana, Titima; Tecle, Isaak Y.; Powell, Adrian F.; Lyon, David; Menda, Naama; Simoes, Christiano C.; Saha, Surya; Hosmani, Prashant; Flores, Mirella; Panitz, Naftali; Preble, Ryan S.; Agbona, Afolabi; Rabbi, Ismail; Kulakow, Peter A.; Peteti, Prasad; Kawuki, Robert; Esuma, Williams; Kanaabi, Micheal; Chelangat, Doreen M.; Uba, Ezenwanyi; Olojede, Adeyemi; Onyeka, Joseph; Shah, Trushar; Karanja, Margaret; Egesi, Chiedozie N.; Tufan, Hale Ann; Paterne, Agre; Asfaw, Asrat; Jannink, Jean-Luc; Wolfe, Marnin; Birkett, Clay L.; Waring, David J.; Hershberger, Jenna M.; Gore, Michael A.; Robbins, Kelly R.; Rife, Trevor; Courtney, Chaney; Poland, Jesse A.; Arnaud, Elizabeth; Laporte, Marie-Angélique; Kulembeka, Heneriko; Salum, Kasele; Mrema, Emmanuel; Brown, Allan; Bayo, Stanley; Uwimana, Brigitte; Akech, Violet; Yencho, Craig; Boeck, Bert de; Campos, Hugo; Swennen, Rony L.; Edwards, Jeremy D.; Mueller, Lukas A.","collection":"CGIAR Initiative on Digital Innovation (Alliance/CIMMYT)","abstract":"Modern breeding methods integrate next-generation sequencing (NGS) and phenomics to identify plants with the best characteristics and greatest genetic merit for use as parents in subsequent breeding cycles to ultimately create improved cultivars able to sustain high adoption rates by farmers. This data-driven approach hinges on strong foundations in data management, quality control, and analytics. Of crucial importance is a central database able to 1) track breeding materials, 2) store experimental evaluations, 3) record phenotypic measurements using consistent ontologies, 4) store genotypic information, and 5) implement algorithms for analysis, prediction and selection decisions. Because of the complexity of the breeding process, breeding databases also tend to be complex, difficult, and expensive to implement and maintain. Here, we present a breeding database system, Breedbase (https://breedbase.org/). Originally initiated as Cassavabase (https://cassavabase.org/) with the NextGen Cassava project (https://www.nextgencassava.org/), and later developed into a crop-agnostic system, it is presently used by dozens of different crops and projects. The system is web-based and is available as open source software. It is available on GitHub (https://github.com/solgenomics/) and packaged in a Docker image for deployment (https://dockerhub.com/breedbase/). The Breedbase system enables breeding programs to better manage and leverage their data for decision making within a fully integrated digital ecosystem.","year":"2022","semantic_score":0.5621,"commercial_score":7,"reasoning":"Applied tool or model with identifiable industry interest — commercial pathway requires packaging and broader validation.","invention_description":"The system is web-based and is available as open source software.","org_types":["Agri-advisory platform companies","Precision agriculture software vendors","Development finance institutions requiring decision-support tools"],"disclosure":{"invention_title":"Integrated plant breeding data management and genomic decision-support platform","problem_solved":"Because of the complexity of the breeding process, breeding databases also tend to be complex, difficult, and expensive to implement and maintain.","technical_approach":"This data-driven approach hinges on strong foundations in data management, quality control, and analytics. Of crucial importance is a central database able to 1) track breeding materials, 2) store experimental evaluations, 3) record phenotypic measurements using consistent ontologies, 4) store genotypic information, and 5) implement algorithms for analysis, prediction and selection decisions. Because of the complexity of the breeding process, breeding databases also tend to be complex, difficult, and expensive to implement and maintain.","novelty":"The tool or algorithm addresses a documented need in agricultural decision-support; novelty relative to prior art requires assessment — not determinable from abstract alone.","commercial_applications":"- Open-source, multi-crop breeding management platform licensed to NARS and regional breeding programmes as a SaaS subscription with commercial data-hosting tiers\n- Integration partnerships with seed companies, agritech firms, and genomic service providers seeking CGIAR-standard trial data management and analysis infrastructure\n- Development-funded deployment to national wheat, rice, maize, and cassava programmes requiring scalable digital breeding infrastructure without high internal IT investment","licensing_model":"Open-source core licence (e.g. MIT or Apache 2.0) consistent with CGIAR open-access obligations; commercial SaaS or embedded-module licence for enterprise deployments. Free access maintained for public research institutions and smallholder-focused NGOs.","trl_estimate":"Concept (TRL 1-3)","ip_risk_flags":"Prior art risk — published 2022; US 12-month grace period has expired. EPO/most jurisdictions apply immediate novelty bars. Verify whether a patent application was filed before or within 12 months of publication.\nSoftware/data tool — check CGIAR open-access licensing obligations","legal_disclaimer":"MACHINE-GENERATED DRAFT — For internal screening only. Not validated by IP counsel. Not for external distribution without author confirmation and legal review.","inventor_names":"Morales, Nicolas; Ogbonna, Alex C.; Ellerbrock, Bryan J.; Bauchet, Guillaume J.; Tantikanjana, Titima; Tecle, Isaak Y.; Powell, Adrian F.; Lyon, David; Menda, Naama; Simoes, Christiano C.; Saha, Surya; Hosmani, Prashant; Flores, Mirella; Panitz, Naftali; Preble, Ryan S.; Agbona, Afolabi; Rabbi, Ismail; Kulakow, Peter A.; Peteti, Prasad; Kawuki, Robert; Esuma, Williams; Kanaabi, Micheal; Chelangat, Doreen M.; Uba, Ezenwanyi; Olojede, Adeyemi; Onyeka, Joseph; Shah, Trushar; Karanja, Margaret; Egesi, Chiedozie N.; Tufan, Hale Ann; Paterne, Agre; Asfaw, Asrat; Jannink, Jean-Luc; Wolfe, Marnin; Birkett, Clay L.; Waring, David J.; Hershberger, Jenna M.; Gore, Michael A.; Robbins, Kelly R.; Rife, Trevor; Courtney, Chaney; Poland, Jesse A.; Arnaud, Elizabeth; Laporte, Marie-Angélique; Kulembeka, Heneriko; Salum, Kasele; Mrema, Emmanuel; Brown, Allan; Bayo, Stanley; Uwimana, Brigitte; Akech, Violet; Yencho, Craig; Boeck, Bert de; Campos, Hugo; Swennen, Rony L.; Edwards, Jeremy D.; Mueller, Lukas A.","institutional_affiliation":"CGIAR Initiative on Digital Innovation (Alliance/CIMMYT)","first_public_disclosure":"2022 (journal publication date — verify submission date for priority claim)","funding_source":"Not identified in abstract — requires manual completion before any IP filing","tto_contact":"IP & Licensing Manager, CIMMYT — intellectualassets@cimmyt.org"},"topic":"software","excluded_reason":null,"coherence_flag":true,"trl_estimate":"Concept (TRL 1-3)"},{"id":98,"title":"Trait profile of maize varieties preferred by farmers and value chain actors in northern Ghana","authors":"Adu, G.B.; Badu-Apraku, Baffour; Akromah, R.; Amegbor, I.K.; Adogoba, D.S.; Haruna, A.; Manigben, K.A.; Aboyadana, P.A.; Wiredu, A.","collection":"CGIAR Research Programme on Maize (CIMMYT)","abstract":"Plant breeders’ knowledge of precise traits preferred by variety users would accelerate varietal turnover and widen adoption of newly developed maize varieties in Ghana. The objective of this research was to provide empirical evidence of trait preferences of farmers and other actors in the maize value chain in northern Ghana, based on which research strategies for maize improvement could be formulated. Participatory rural appraisal was conducted in 2016 to determine key traits preferred by maize value chain actors across the three regions in northern Ghana. A total of 279 maize value chain actors were interviewed. Different scoring and ranking techniques were used to assess the maize traits preferred by the different actors. Participatory variety selection trials were also conducted in the Tolon, West Gonja, Binduri, and Sissala East districts in northern Ghana from 2014 to 2016. The mother-baby trial approach was used to evaluate eight hybrids with 3000 farmers. Data on yield and agronomic performance of the hybrids and farmer’s selection criteria were collected. Data analyses were performed using GenStat Edition 16 and SPSS Edition 20 statistical packages. The participatory rural appraisal method identified farmers, input dealers, traders, and processors as the primary maize value chain actors in the study areas. Trait preferences of the different actors overlapped and revolved around grain quality including nutritional value, and stress tolerance and grain yield. Results of the participatory variety selection study revealed that across districts, farmers preferred high-yielding varieties with multiple cobs per plant, white grain endosperm color, and bigger and fully filled cobs. For the first time, our holistic assessment of the trait preferences of key actors of the maize value chain in northern Ghana revealed a comprehensive list of traits, which could be used by breeders to develop varieties that may be preferred by all value chain actors in northern Ghana.","year":"2021","semantic_score":0.5556,"commercial_score":4,"reasoning":"Early-stage or context-specific research — near-term licensing unlikely without further applied development and validation.","invention_description":"Results of the participatory variety selection study revealed that across districts, farmers preferred high-yielding varieties with multiple cobs per plant, white grain endosperm color, and bigger and fully filled cobs.","org_types":["Development finance institutions","Government agriculture ministries","NGO programme designers"],"disclosure":null,"topic":"social_science","excluded_reason":null,"coherence_flag":false,"trl_estimate":"Concept (TRL 1-3)"},{"id":99,"title":"Reverse transcription-polymerase chain reaction (RT-PCR) assay for detection and characterization of Alfalfa mosaic virus (AMV) in legume crops applied by ICARDA’s Seed Health and Virology Laboratory","authors":"Kumari, Safaa; Moukahel, Abdulrahman","collection":"International Center for Agricultural Research in the Dry Areas","abstract":"Alfalfa mosaic virus (AMV, genus Alfamovirus, family Bromoviridae) is a significant plant pathogen affecting a wide range of legume crops across various regions of the world including West Asia and North Africa (WANA) countries. AMV is transmitted by aphids in a non-persistent manner and via seeds of several hosts (including faba bean, chickpea, and lentil). Seed transmission makes managing AMV more challenging, as infected seeds can introduce the virus into new areas and lead to infections in the next growing season, even before aphid vectors are active. Accordingly, seed testing and the use of certified seeds are key strategies to mitigate the spread of AMV as a seed-borne virus. Early detection and accurate diagnosis of viral diseases is critical for the application of appropriate control measures. However, the accuracy and reliability of molecular methods is a fact beyond dispute. This report describes a validated molecular tool for AMV detection and characterization applied by ICARDA’s Seed Health and Virology Laboratory.","year":"2024","semantic_score":0.555,"commercial_score":4,"reasoning":"Early-stage or context-specific research — near-term licensing unlikely without further applied development and validation.","invention_description":"However, the accuracy and reliability of molecular methods is a fact beyond dispute.","org_types":["Agricultural research institutes","Development finance institutions","Government agriculture ministries"],"disclosure":null,"topic":"general","excluded_reason":null,"coherence_flag":true,"trl_estimate":"Prototype (TRL 4-6)"},{"id":100,"title":"Accelerated Wheat Breeding and Production in the Face of Climate Change: The Case of Morocco","authors":"Tadesse, Wuletaw; Zakaria, EL Gataa; Rachdad, Fatima Ezzahra; Lahrichi, Khaoula; Diria, Ghizlan; Amamou, Ali; Jlibene, Mohammed; Al-Shamaa, Khaled; Kehel, Zakaria","collection":"CGIAR","abstract":"Wheat is the most important food crop which originated in the Fertile Crescent, the cradle of human civilization. Currently, it grows an average of 220 million hectares globally with an annual production level of 810 million tons. In Morocco, wheat is grown on 3.2 million hectares, with production levels ranging from 3 to 7 million tons/year, depending on the amount and distribution of rainfall. Like many other countries in the \nCWANA region, wheat production in Morocco is affected by climate change, drought, heat, diseases (rusts, septoria, fusarium), and insect pests such as Hessian fly. Wheat breeding in Morocco started in the late 1920s, and since 1980, the National Institute of Agronomic Research (INRA) has released more than 52 varieties of bread wheat. This paper reviews and summarizes the wheat production and challenges, including the seed system, the wheat breeding history and methodologies, achievements, and prospects of accelerated wheat breeding, including modified shuttle breeding, doubled haploids, speed breeding, genomic selection, and hybrid wheat, which shorten breeding cycles and enhance the precision of trait selection. Rapid development and deployment of climate-smart wheat varieties, along with improved crop management technologies, are important to increase wheat production and ensure food security in the face of climate change.","year":"2024","semantic_score":0.554,"commercial_score":7,"reasoning":"Promising germplasm with commercial potential — field-trial evidence base needs strengthening or multi-location confirmation.","invention_description":"An improved crop germplasm or variety with enhanced performance characteristics developed through systematic breeding.","org_types":["Commercial seed companies","Plant breeding programmes","National agricultural research systems (NARS)"],"disclosure":null,"topic":"variety","excluded_reason":null,"coherence_flag":true,"trl_estimate":"Concept (TRL 1-3)"},{"id":101,"title":"Bayesian divergence-based approach for genomic multitrait ordinal selection","authors":"Villar-Hernández, Bartolo de Jesús; Singh, Pawan Kumar; Lozano, Nerida; Vitale, Paolo; Gerard, Guillermo Sebastián; Breseghello, Flavio; Dreisigacker, Susanne; Crossa, Jose","collection":"CGIAR","abstract":"Effective genomic selection for ordinal traits, such as disease resistance scores, is a persistent challenge in plant breeding due to the discrete, ordered nature of these phenotypes. This study presents a novel Bayesian divergence-based framework for multitrait ordinal selection, implemented in the extended Multitrait Parental Selection R package (MPS-R). By leveraging decision-theoretic loss functions, including the Kullback–Leibler (KL) divergence, Bhattacharyya distance, and Hellinger distance, our approach quantifies the distance between candidate distributions and breeder-defined target distributions. Through extensive simulations under 6 scenarios combining different genetic correlation structures and heritability levels, we demonstrate the comparative performance of each loss function. KL divergence consistently yielded superior genetic gains, especially in moderate heritability settings. Additionally, random sampling validation using real wheat disease resistance data confirmed the utility of these methods in practical breeding contexts. The MPS-R package implements this methodology through user-friendly functions tailored for ordinal trait selection in breeding applications. Our results demonstrate that this toolset provides a flexible, robust, and biologically grounded framework to enhance selection efficiency in breeding programs targeting complex, multitrait ordinal phenotypes. A couple of limitations employed by the simulation scheme used on the study are also discussed.","year":"2025","semantic_score":0.5521,"commercial_score":7,"reasoning":"Applied tool or model with identifiable industry interest — commercial pathway requires packaging and broader validation.","invention_description":"Our results demonstrate that this toolset provides a flexible, robust, and biologically grounded framework to enhance selection efficiency in breeding programs targeting complex, multitrait ordinal phenotypes.","org_types":["Agri-advisory platform companies","Precision agriculture software vendors","Development finance institutions requiring decision-support tools"],"disclosure":null,"topic":"software","excluded_reason":null,"coherence_flag":false,"trl_estimate":"Concept (TRL 1-3)"},{"id":102,"title":"Smart breeding driven by big data, artificial intelligence, and integrated genomic-enviromic prediction","authors":"Yunbi Xu; Zhang Xingping; Huihui Li; Hongjian Zheng; Jianan Zhang; Olsen, Michael; Varshney, Rajeev K.; Boddupalli, P.M.; Qian Qian","collection":"CGIAR Research Programme on Maize (CIMMYT)","abstract":"The first paradigm of plant breeding involves direct selection-based phenotypic observation, followed by predictive breeding using statistical models for quantitative traits constructed based on genetic experimental design and, more recently, by incorporation of molecular marker genotypes. However, plant performance or phenotype (P) is determined by the combined effects of genotype (G), envirotype (E), and genotype by environment interaction (GEI). Phenotypes can be predicted more precisely by training a model using data collected from multiple sources, including spatiotemporal omics (genomics, phenomics, and enviromics across time and space). Integration of 3D information profiles (G-P-E), each with multidimensionality, provides predictive breeding with both tremendous opportunities and great challenges. Here, we first review innovative technologies for predictive breeding. We then evaluate multidimensional information profiles that can be integrated with a predictive breeding strategy, particularly envirotypic data, which have largely been neglected in data collection and are nearly untouched in model construction. We propose a smart breeding scheme, integrated genomic-enviromic prediction (iGEP), as an extension of genomic prediction, using integrated multiomics information, big data technology, and artificial intelligence (mainly focused on machine and deep learning). We discuss how to implement iGEP, including spatiotemporal models, environmental indices, factorial and spatiotemporal structure of plant breeding data, and cross-species prediction. A strategy is then proposed for prediction-based crop redesign at both the macro (individual, population, and species) and micro (gene, metabolism, and network) scales. Finally, we provide perspectives on translating smart breeding into genetic gain through integrative breeding platforms and open-source breeding initiatives. We call for coordinated efforts in smart breeding through iGEP, institutional partnerships, and innovative technological support.","year":"2022","semantic_score":0.552,"commercial_score":6,"reasoning":"Applied tool or model with identifiable industry interest — commercial pathway requires packaging and broader validation.","invention_description":"We then evaluate multidimensional information profiles that can be integrated with a predictive breeding strategy, particularly envirotypic data, which have largely been neglected in data collection and are nearly untouched in model construction.","org_types":["Precision agriculture platforms","Crop insurance underwriters","National extension and early-warning services"],"disclosure":null,"topic":"model","excluded_reason":null,"coherence_flag":false,"trl_estimate":"Concept (TRL 1-3)"},{"id":103,"title":"Loop-Mediated Isothermal Amplification assays for on-site detection of the main sweetpotato infecting viruses","authors":"Wanjala, Bramwel W.; Ateka, E.M.; Miano, D.W.; Fuentes, S.; Pérez, A.; Low, Jan W.; Kreuze, Jan F.","collection":"CGIAR Research Programme on Roots, Tubers and Bananas","abstract":"Globally, Sweet potato feathery mottle virus (SPFMV) and Sweet potato chlorotic stunt virus (SPCSV) occur frequently and in combination cause sweetpotato virus disease (SPVD). Many viral diseases are economically important and negatively impact the production and movement of germplasm across regions. Rapid detection of viruses is critical for effective control. Detection and quantification of viruses directly from sweetpotato remains a challenge. Current diagnostic tests are not sensitive enough to reliably detect viruses directly from the plant or require expensive laboratory equipment and expertise to perform. We developed a simple and rapid loop‐mediated isothermal amplification (LAMP) assay for the detection of SPFMV, SPCSV and begomoviruses related to sweet potato leaf curl virus (SPLCV). Laboratory validation recorded 100% diagnostic sensitivity for all three viruses. The LAMP assays were customized for field testing using a lyophilized thermostable isothermal master mix in a ready-to-use form that required no cold chain. The average time to positivity (TTP) was: SPFMV 5-30 min., SPCSV 15-43 mins and begomoviruses 28-45 mins. LAMP on-site testing results were comparable to PCR and RT-PCR confirmatory laboratory tests. The LAMP assay is a powerful tool for rapid sweetpotato virus detection at a reasonable cost and thus could serve as quality control systems for planting materials.","year":"2021","semantic_score":0.551,"commercial_score":8,"reasoning":"Validated detection or diagnostic method with demonstrated accuracy — clear commercial pathway to a kit or sensor product.","invention_description":"A simple and rapid loop‐mediated isothermal amplification (LAMP) assay for the detection of SPFMV, SPCSV and begomoviruses related to sweet potato leaf curl virus (SPLCV).","org_types":["Agri-diagnostic kit manufacturers","Plant health regulatory agencies","AgriTech startups"],"disclosure":null,"topic":"detection","excluded_reason":null,"coherence_flag":true,"trl_estimate":"Prototype (TRL 4-6)"},{"id":104,"title":"Envirome-wide associations enhance multi-year genome-based prediction of historical wheat breeding data","authors":"Costa Neto, Germano; Crespo-Herrera, Leonardo A.; Fradgley, Nick; Gardner, Keith A.; Bentley, Alison R.; Dreisigacker, Susanne; Fritsche-Neto, Roberto; Montesinos López, Osval A.; Crossa, José","collection":"CGIAR Research Programme on Maize (CIMMYT)","abstract":"Linking high-throughput environmental data (enviromics) to genomic prediction (GP) is a cost-effective strategy for increasing selection intensity under genotype-by-environment interactions (G × E). This study developed a data-driven approach based on Environment-Phenotype Associations (EPA) aimed at recycling important G × E information from historical breeding data. EPA was developed in two applications: (1) scanning a secondary source of genetic variation, weighted from the shared reaction-norms of past-evaluated genotypes; (2) pinpointing weights of the similarity among trial-sites (locations), given the historical impact of each envirotyping data variable for a given site. These results were then used as a dimensionality reduction strategy, integrating historical data to feed multi-environment GP models, which led to development of four new G × E kernels considering genomics, enviromics and EPA outcomes. The wheat trial data used included 36 locations, eight years and three target populations of environments (TPE) in India. Four prediction scenarios and six kernel-models within/across TPEs were tested. Our results suggest that the conventional GBLUP, without enviromic data or when omitting EPA, is inefficient in predicting the performance of wheat lines in future years. Nevertheless, when EPA was introduced as an intermediary learning step to reduce the dimensionality of the G × E kernels while connecting phenotypic and environmental-wide variation, a significant enhancement of G × E prediction accuracy was evident. EPA revealed that the effect of seasonality makes strategies such as “covariable selection” unfeasible because G × E is year-germplasm specific. We propose that the EPA effectively serves as a “reinforcement learner” algorithm capable of uncovering the effect of seasonality over the reaction-norms, with the benefits of better forecasting the similarities between past and future trialing sites. EPA combines the benefits of dimensionality reduction while reducing the uncertainty of genotype-by-year predictions and increasing the resolution of GP for the genotype-specific level.","year":"2023","semantic_score":0.5497,"commercial_score":4,"reasoning":"Early-stage or context-specific research — near-term licensing unlikely without further applied development and validation.","invention_description":"Our results suggest that the conventional GBLUP, without enviromic data or when omitting EPA, is inefficient in predicting the performance of wheat lines in future years.","org_types":["Agricultural research institutes","Development finance institutions","Government agriculture ministries"],"disclosure":null,"topic":"general","excluded_reason":null,"coherence_flag":true,"trl_estimate":"Prototype (TRL 4-6)"}];

/* ── Helpers ── */
function scoreClass(s){
  if (s >= 8) return "score-high";
  if (s >= 5) return "score-mid";
  if (s >= 3) return "score-low";
  return "score-xlow";
}

function trlClass(trl){
  if (!trl) return "trl-concept";
  const t = trl.toLowerCase();
  if (t.includes("validated")) return "trl-validated";
  if (t.includes("prototype")) return "trl-prototype";
  return "trl-concept";
}

function trlShort(trl){
  if (!trl) return "—";
  if (trl.toLowerCase().includes("validated")) return "Validated";
  if (trl.toLowerCase().includes("prototype")) return "Prototype";
  return "Concept";
}

function trlPillClass(trl){
  if (!trl) return "trl-pill-concept";
  const t = trl.toLowerCase();
  if (t.includes("validated")) return "trl-pill-validated";
  if (t.includes("prototype")) return "trl-pill-prototype";
  return "trl-pill-concept";
}

function flagPills(flagText){
  if (!flagText) return '<span class="flag-pill flag-ok">No flags — standard IP review recommended</span>';
  return flagText.split("\n").map(f => {
    const isOk = f.toLowerCase().includes("no flags");
    return `<span class="flag-pill ${isOk ? "flag-ok" : "flag-warn"}">${f.trim()}</span>`;
  }).join("");
}

/* ── Sort + filter ── */
function sortRows(rows, order){
  const r = [...rows];
  if (order === "score-desc")    r.sort((a,b) => b.commercial_score - a.commercial_score);
  if (order === "score-asc")     r.sort((a,b) => a.commercial_score - b.commercial_score);
  if (order === "semantic-desc") r.sort((a,b) => b.semantic_score   - a.semantic_score);
  if (order === "title-asc")     r.sort((a,b) => a.title.localeCompare(b.title));
  return r;
}

function filterRows(rows, q){
  if (!q) return rows;
  const lq = q.toLowerCase();
  return rows.filter(r =>
    r.title.toLowerCase().includes(lq) ||
    (r.abstract || "").toLowerCase().includes(lq) ||
    (r.collection || "").toLowerCase().includes(lq) ||
    (r.authors || "").toLowerCase().includes(lq) ||
    (r.invention_description || "").toLowerCase().includes(lq) ||
    (r.trl_estimate || "").toLowerCase().includes(lq) ||
    (trlShort(r.trl_estimate) || "").toLowerCase().includes(lq)
  );
}

    </div>

    <div class="disc-grid">
      <div class="disc-card"><h4>Problem it solves</h4><p>${d.problem_solved}</p></div>
      <div class="disc-card"><h4>Technical approach</h4><p>${d.technical_approach}</p></div>
      <div class="disc-card"><h4>What makes it novel</h4><p>${d.novelty}</p></div>
      <div class="disc-card"><h4>Commercial reasoning</h4><p>${r.reasoning}</p></div>
      <div class="disc-card"><h4>Potential commercial applications</h4>
        <p>${d.commercial_applications}</p></div>
      <div class="disc-card"><h4>Suggested licensing model</h4>
        <p>${d.licensing_model}</p></div>
    </div>

    <div class="mandatory-section">
      <h3>&#128203; Mandatory fields for IP process — complete before any external use</h3>
      <div class="disc-grid">
        <div class="disc-card">
          <h4>Inventors</h4>
          <p class="${d.inventor_names && d.inventor_names.includes('manual') ? 'field-incomplete' : ''}">${d.inventor_names || '—'}</p>
        </div>
        <div class="disc-card">
          <h4>Institutional affiliation</h4>
          <p>${d.institutional_affiliation || '—'}</p>
        </div>
        <div class="disc-card">
          <h4>First public disclosure</h4>
          <p class="${d.first_public_disclosure && d.first_public_disclosure.includes('verify') ? 'field-incomplete' : ''}">${d.first_public_disclosure || '—'}</p>
        </div>
        <div class="disc-card">
          <h4>Funding source</h4>
          <p class="${d.funding_source && d.funding_source.includes('manual') ? 'field-incomplete' : ''}">${d.funding_source || '—'}</p>
        </div>
        <div class="disc-card full">
          <h4>Technology Transfer Office contact</h4>
          <p>${d.tto_contact || '—'}</p>
        </div>
      </div>
    </div>`;
}

/* ── Main render ── */
function render(){
  const q     = document.getElementById("search").value.trim();
  const order = document.getElementById("sort-select").value;
  const rows  = sortRows(filterRows(PAPERS, q), order);
  const tbody = document.getElementById("tbody");
  const empty = document.getElementById("empty-state");
  const count = document.getElementById("result-count");

  count.textContent = `Showing ${rows.length} of ${PAPERS.length} papers`;
  tbody.innerHTML   = "";
  empty.style.display = rows.length ? "none" : "block";

  rows.forEach(r => {
    const isExcluded = r.topic === "excluded";
    const hasDisc    = !!r.disclosure;

    const dataRow = document.createElement("tr");
    dataRow.className = "paper-row" + (isExcluded ? " excluded-row" : "");
    dataRow.dataset.id = r.id;

    const authParts = (r.authors || "").split(";");
    const authorsShort = authParts.slice(0,2).join(";").trim()
      + (authParts.length > 2 ? " ..." : "");

    /* TRL cell */
    const trlHtml = isExcluded
      ? `<span class="trl-badge trl-concept">—</span>`
      : `<span class="trl-badge ${trlClass(r.trl_estimate)}">${trlShort(r.trl_estimate)}</span>`;

    /* Coherence cell */
    let cohHtml = "";
    if (isExcluded){
      cohHtml = `<span class="excl-badge">Not an invention</span>`;
    } else if (r.coherence_flag === true || r.coherence_flag === 1){
      cohHtml = `<span class="coherence-badge coherence-ok">&#10003; Coherent</span>`;
    } else if (r.coherence_flag === false || r.coherence_flag === 0){
      cohHtml = `<span class="coherence-badge coherence-warn">&#9651; Flagged</span>`;
    } else {
      cohHtml = `<span class="coherence-badge coherence-warn">—</span>`;
    }

    dataRow.innerHTML = `
      <td><span class="row-toggle" id="tog-${r.id}">${isExcluded ? "" : "&#9658;"}</span></td>
      <td>
        <div class="title-text">
          ${r.title}
          ${hasDisc ? '<span class="disc-badge">DISCLOSURE</span>' : ""}
          ${isExcluded ? '<span class="excl-badge">Excluded</span>' : ""}
        </div>
        <div class="authors-text">${authorsShort}</div>
      </td>
      <td><span class="center-badge" title="${r.collection}">${r.collection}</span></td>
      <td class="score-cell">
        <span class="score-circle ${scoreClass(r.commercial_score)}">${r.commercial_score}</span>
        <div class="score-label">/ 10</div>
      </td>
      <td>${trlHtml}</td>
      <td>${cohHtml}</td>
      <td><div class="summary-text">${r.invention_description}</div></td>
      <td style="font-size:.78rem;color:#6b7280">${(r.org_types||[]).join(" | ")}</td>
    `;

    /* Disclosure / detail row */
    const discRow = document.createElement("tr");
    discRow.className = "disc-row";
    const td = document.createElement("td");
    td.colSpan = 8;
    const panel = document.createElement("div");
    panel.className = "disc-panel";
    panel.id = `disc-${r.id}`;
    panel.innerHTML = `<div class="disc-inner">${disclosureHTML(r)}</div>`;
    td.appendChild(panel);
    discRow.appendChild(td);

    if (!isExcluded){
      dataRow.addEventListener("click", () => {
        const p   = document.getElementById(`disc-${r.id}`);
        const tog = document.getElementById(`tog-${r.id}`);
        const row = document.querySelector(`.paper-row[data-id="${r.id}"]`);
        const open = p.classList.toggle("open");
        tog.classList.toggle("open", open);
        row.classList.toggle("expanded", open);
      });
    }

    tbody.appendChild(dataRow);
    tbody.appendChild(discRow);
  });
}

document.getElementById("search").addEventListener("input", render);
document.getElementById("sort-select").addEventListener("change", render);
render();
</script>
</body>
</html>
